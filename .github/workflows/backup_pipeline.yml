name: Backup Pipeline

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'اجرای اجباری بدون بررسی زمان'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  schedule:
    - cron: '0 * * * *'   # هر ساعت – بررسی زمان‌بندی در پایتون انجام می‌شود

concurrency:
  group: backup-loop
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      # ─── دریافت کد ───────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ─── نصب Python ──────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ─── نصب وابستگی‌ها (یک‌بار برای کل job) ──────────────────────────────
      - name: Install dependencies
        run: pip install --upgrade pip requests cryptography

      # ─── اجرای پایپ‌لاین اصلی (شامل بک‌آپ + ارسال پیام فیلم در صورت موفقیت) ───
      - name: Run backup pipeline
        env:
          RESULTS_PASSWORD:   ${{ secrets.RESULTS_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:  ${{ github.repository }}
          GITHUB_ACTOR:       ${{ github.actor }}
          WEEKLY_REPOS:       "now-test-repo"
          FORCE_RUN:          ${{ github.event.inputs.force || 'false' }}
        run: |
          FORCE_FLAG=""
          if [ "$FORCE_RUN" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          python backup_system.py run $FORCE_FLAG

      # ─── commit فایل‌های metadata + دیتابیس فیلم ───────────────────────────────
      - name: Commit metadata files
        run: |
          git config user.name  "GitHub Actions – Backup Bot"
          git config user.email "actions@github.com"

          META_FILES=(
            "auto_mapping.json"
            "backup_ledger.json"
            "schedule_times.json"
            "integrity_pass.flag"
          )

          for f in "${META_FILES[@]}"; do
            [ -f "$f" ] && git add "$f"
          done

          # ثبت حذف فایل‌های analysis_results که پاک شده‌اند
          git add -u analysis_results/ 2>/dev/null || true

          # ثبت تغییر فلگ used در دیتابیس فیلم/سریال
          git add -u movie_messages/ 2>/dev/null || true

          if ! git diff --cached --quiet; then
            git commit -m "chore: backup metadata $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            git push
          else
            echo "تغییری برای commit وجود ندارد"
          fi

      # ─── گزارش خطا (از backup_system.py استفاده می‌کند) ─────────────────────
      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python backup_system.py notify-failure

      # ─── چرخه: فراخوانی loop_backup (همیشه، حتی در صورت شکست) ───────────────
      - name: Trigger loop (always)
        if: always()
        env:
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python backup_system.py trigger-loop --workflow loop_backup.yml
