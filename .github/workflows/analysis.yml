name: Complete Analysis Pipeline

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      analysis_module:
        description: 'نام ماژول (fixed_batch | golden | portfolios | correlation)'
        required: true
        default: ''
      chunk_start:
        description: 'شماره شروع چانک (اختیاری)'
        required: false
        default: ''
      chunk_end:
        description: 'شماره پایان چانک (اختیاری)'
        required: false
        default: ''

concurrency:
  group: analysis-runner
  cancel-in-progress: false

jobs:
  # ================================================================
  # generate-matrix: تقسیم all_combinations.json به چانک‌ها
  # ================================================================
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix_items: ${{ steps.fetch_batch.outputs.matrix_items }}
      empty: ${{ steps.fetch_batch.outputs.empty }}
      total_combos: ${{ steps.fetch_batch.outputs.total_combos }}
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: دانلود all_combinations.json و تقسیم به فایل‌های چانک محلی
        id: fetch_batch
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          unalias curl 2>/dev/null || true
          CURL="/usr/bin/curl"
          echo "========== [DEBUG] شروع generate-matrix =========="
          mkdir -p /tmp/chunks

          TIMESTAMP=${{ github.run_id }}
          HTTP_CODE=$($CURL -s -o /tmp/all_combinations.json -w "%{http_code}" \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/$THIRD_REPO/contents/all_combinations.json?t=$TIMESTAMP")

          echo "[DEBUG] HTTP status code: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ] || [ ! -s /tmp/all_combinations.json ] || ! jq empty /tmp/all_combinations.json 2>/dev/null; then
            echo "❌ فایل all_combinations.json نامعتبر یا یافت نشد (کد $HTTP_CODE)"
            echo "empty=true" >> $GITHUB_OUTPUT
            echo "matrix_items=[]" >> $GITHUB_OUTPUT
            echo "total_combos=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          TOTAL_COMBOS=$(jq length /tmp/all_combinations.json)
          echo "[DEBUG] تعداد کل ترکیب‌ها: $TOTAL_COMBOS"
          echo "total_combos=$TOTAL_COMBOS" >> $GITHUB_OUTPUT

          CHUNK_SIZE=500
          CHUNK_COUNT=$(( (TOTAL_COMBOS + CHUNK_SIZE - 1) / CHUNK_SIZE ))
          if [ "$CHUNK_COUNT" -gt 256 ]; then
            CHUNK_SIZE=$(( (TOTAL_COMBOS + 255) / 256 ))
            CHUNK_COUNT=$(( (TOTAL_COMBOS + CHUNK_SIZE - 1) / CHUNK_SIZE ))
          fi
          echo "[DEBUG] chunk_size=$CHUNK_SIZE chunk_count=$CHUNK_COUNT"

          if [ "$TOTAL_COMBOS" -eq 0 ]; then
            echo "empty=true" >> $GITHUB_OUTPUT
            echo "matrix_items=[]" >> $GITHUB_OUTPUT
            echo "total_combos=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          INDICES="["
          for ((i=0; i<CHUNK_COUNT; i++)); do
            START=$((i * CHUNK_SIZE))
            END=$((START + CHUNK_SIZE))
            jq ".[$START:$END]" /tmp/all_combinations.json > /tmp/chunks/chunk_${i}.json
            if [ $i -gt 0 ]; then INDICES+=", "; fi
            INDICES+="$i"
          done
          INDICES+="]"
          echo "[DEBUG] INDICES=$INDICES"
          echo "matrix_items=$INDICES" >> $GITHUB_OUTPUT
          echo "empty=false" >> $GITHUB_OUTPUT
          echo "========== [DEBUG] پایان fetch_batch =========="

      - name: آپلود چانک‌ها به‌صورت یک artifact مشترک برای job های batch
        if: steps.fetch_batch.outputs.empty == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: combo-chunks-${{ github.run_id }}
          path: /tmp/chunks/
          retention-days: 1

  # ================================================================
  # batch: اجرای موازی روی چانک‌ها و تولید CSV + JSONL امضاها
  # ================================================================
  batch:
    needs: [generate-matrix]
    runs-on: ubuntu-latest
    timeout-minutes: 340
    if: ${{ inputs.analysis_module == 'fixed_batch' && needs.generate-matrix.outputs.empty == 'false' }}
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        chunk_index: ${{ fromJson(needs.generate-matrix.outputs.matrix_items || '[0]') }}
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: دانلود artifact مشترک چانک‌ها
        uses: actions/download-artifact@v4
        with:
          name: combo-chunks-${{ github.run_id }}
          path: /tmp/chunks

      - name: انتخاب فایل chunk مخصوص این job
        id: chunk_params
        run: |
          CHUNK_INDEX=${{ matrix.chunk_index }}
          cp /tmp/chunks/chunk_${CHUNK_INDEX}.json /tmp/chunk.json
          CHUNK_LENGTH=$(jq length /tmp/chunk.json)
          echo "[DEBUG] chunk $CHUNK_INDEX شامل $CHUNK_LENGTH ترکیب است."
          echo "chunk_length=$CHUNK_LENGTH" >> $GITHUB_OUTPUT

      - name: 0. بررسی artifact اجرای قبلی برای این chunk
        id: check_previous
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: chunk-done-${{ matrix.chunk_index }}
          path: /tmp/prev_artifact

      - name: 0.5. بارگذاری نتایج قبلی در صورت وجود
        id: prev_check
        run: |
          mkdir -p /tmp/results /tmp/errors /tmp/signatures
          if [ -f /tmp/prev_artifact/done_items.json ] && [ -f /tmp/prev_artifact/chunk_completed.flag ]; then
            echo "⏭️ chunk ${{ matrix.chunk_index }} قبلاً کامل شده. بارگذاری نتایج..."
            cp /tmp/prev_artifact/done_items.json /tmp/done_items.json
            cp /tmp/prev_artifact/failed_items.json /tmp/failed_items.json 2>/dev/null || echo "[]" > /tmp/failed_items.json
            [ -d /tmp/prev_artifact/results ] && cp -r /tmp/prev_artifact/results/. /tmp/results/
            echo "already_done=true" >> $GITHUB_OUTPUT
          else
            echo "already_done=false" >> $GITHUB_OUTPUT
          fi

      - name: 1. بررسی interrupt.flag
        if: steps.prev_check.outputs.already_done != 'true'
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$THIRD_REPO/contents/interrupt.flag")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "🛑 interrupt.flag یافت شد — job با وضعیت interrupted خاتمه می‌یابد."
            echo '{"status":"interrupted","chunk":${{ matrix.chunk_index }},"run_id":"${{ github.run_id }}"}' \
              > /tmp/batch_status.json
            exit 0
          fi
          echo "✅ interrupt.flag یافت نشد — ادامه پردازش."

      - name: 2. دانلود فایل یکپارچه معاملات
        if: steps.prev_check.outputs.already_done != 'true'
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD || secrets.DATA_PASSWORD }}
        run: |
          if [ ! -f /tmp/chunk.json ]; then
            echo "❌ /tmp/chunk.json یافت نشد."
            exit 1
          fi
          STRAT=$(jq -r '.[0].strat' /tmp/chunk.json 2>/dev/null || echo "")
          if [ -z "$STRAT" ]; then
            echo "❌ استراتژی در قطعه یافت نشد. خروج."
            exit 1
          fi
          AGG_FILE="aggregated/${STRAT}/${STRAT}_trades.enc"
          META_FLAG_PATH="aggregated/${STRAT}/metadata_injected.flag"
          ERROR_FILE="analysis_errors/${STRAT}_download_error.txt"
          mkdir -p /tmp/prep

          upload_error() {
            local msg="$1"
            echo "$msg" > /tmp/prep/error_msg.txt
            ERROR_SHA=$(gh api "repos/$THIRD_REPO/contents/$ERROR_FILE" -q '.sha' 2>/dev/null || echo "")
            if [ -n "$ERROR_SHA" ]; then
              gh api "repos/$THIRD_REPO/contents/$ERROR_FILE" \
                -X PUT \
                -F message="update download error for $STRAT" \
                -F content="$(base64 -w0 < /tmp/prep/error_msg.txt)" \
                -F sha="$ERROR_SHA" \
                -F branch="main" 2>&1 || echo "⚠️ نتوانستیم فایل خطا را آپلود کنیم."
            else
              gh api "repos/$THIRD_REPO/contents/$ERROR_FILE" \
                -X PUT \
                -F message="create download error for $STRAT" \
                -F content="$(base64 -w0 < /tmp/prep/error_msg.txt)" \
                -F branch="main" 2>&1 || echo "⚠️ نتوانستیم فایل خطا را آپلود کنیم."
            fi
          }

          DOWNLOAD_URL=$(gh api "repos/$THIRD_REPO/contents/$AGG_FILE" -q '.download_url' 2>/tmp/prep/dl_error.log)
          DL_EXIT=$?
          if [ $DL_EXIT -ne 0 ] || [ -z "$DOWNLOAD_URL" ]; then
            upload_error "Failed to get download_url for $AGG_FILE. Exit: $DL_EXIT. Log: $(cat /tmp/prep/dl_error.log)"
            exit 1
          fi

          /usr/bin/curl -L -o /tmp/prep/trades.enc "$DOWNLOAD_URL" 2>/tmp/prep/curl_error.log
          if [ $? -ne 0 ] || [ ! -s /tmp/prep/trades.enc ]; then
            upload_error "curl failed or empty file for $AGG_FILE."
            exit 1
          fi

          node -e "
            const crypto=require('crypto'),fs=require('fs');
            const pass=process.env.RESULTS_PASSWORD;
            const data=fs.readFileSync('/tmp/prep/trades.enc');
            const key=crypto.scryptSync(pass,'salt',32);
            const iv=data.slice(0,16),enc=data.slice(16);
            const decipher=crypto.createDecipheriv('aes-256-cbc',key,iv);
            const dec=Buffer.concat([decipher.update(enc),decipher.final()]);
            fs.writeFileSync('/tmp/prep/all_trades.json',dec);
          " 2>/tmp/prep/decrypt_error.log
          if [ $? -ne 0 ]; then
            upload_error "Decryption failed. Error: $(cat /tmp/prep/decrypt_error.log)"
            exit 1
          fi

          FLAG_HTTP=$(gh api "repos/$THIRD_REPO/contents/$META_FLAG_PATH" -i 2>/dev/null | head -n1 | cut -d' ' -f2 || echo "")
          if [ "$FLAG_HTTP" = "200" ]; then
            echo "✅ metadata قبلاً inject شده — رد می‌شود."
            exit 0
          fi

          HAS_METADATA=$(node -e "
            const fs=require('fs');
            const data=JSON.parse(fs.readFileSync('/tmp/prep/all_trades.json','utf8'));
            const hasMeta=data && typeof data==='object' && !Array.isArray(data)
                          && 'metadata' in data && data.metadata !== null;
            console.log(hasMeta?'true':'false');
          " 2>/dev/null || echo "false")

          if [ "$HAS_METADATA" = "true" ]; then
            FLAG_CONTENT=$(echo "injected" | base64 -w0)
            gh api "repos/$THIRD_REPO/contents/$META_FLAG_PATH" \
              -X PUT -F message="mark metadata as injected for $STRAT" \
              -F content="$FLAG_CONTENT" -F branch="main" 2>/dev/null || true
            exit 0
          fi

          META_FILE_REMOTE="strategies/${STRAT}/1.json"
          META_CONTENT=$(gh api "repos/$THIRD_REPO/contents/$META_FILE_REMOTE" \
            -H "Accept: application/vnd.github.v3.raw" 2>/dev/null || echo "")

          if [ -z "$META_CONTENT" ]; then
            JS_FILE_REMOTE="strategies/${STRAT}.js"
            JS_CONTENT=$(gh api "repos/$THIRD_REPO/contents/$JS_FILE_REMOTE" \
              -H "Accept: application/vnd.github.v3.raw" 2>/dev/null || echo "")
            if [ -z "$JS_CONTENT" ]; then
              META_CONTENT='{"move_percents":[],"stop_loss_initial":-2.0,"max_move_percent":null}'
            else
              echo "$JS_CONTENT" > /tmp/prep/strat.js
              META_CONTENT=$(node -e "
                const fs=require('fs');
                const js=fs.readFileSync('/tmp/prep/strat.js','utf8');
                let mm=js.match(/movePercent\s*:\s*\[(.*?)\]/s);
                let mp=[];
                if(mm){let n=mm[1].match(/[\d.]+/g);if(n)mp=n.map(Number);}
                let sl=js.match(/stopLossInitial\s*:\s*([\d.-]+)/);
                let stop=sl?parseFloat(sl[1]):-2.0;
                let max=mp.length?mp[mp.length-1]:null;
                console.log(JSON.stringify({move_percents:mp,stop_loss_initial:stop,max_move_percent:max}));
              " 2>/dev/null || echo '{"move_percents":[],"stop_loss_initial":-2.0,"max_move_percent":null}')
            fi
          fi

          echo "$META_CONTENT" > /tmp/prep/meta.json
          node -e "
            const fs=require('fs');
            const trades=JSON.parse(fs.readFileSync('/tmp/prep/all_trades.json','utf8'));
            const meta=JSON.parse(fs.readFileSync('/tmp/prep/meta.json','utf8'));
            const tradeList=Array.isArray(trades)?trades:trades.trades;
            fs.writeFileSync('/tmp/prep/all_trades.json',JSON.stringify({
              trades:tradeList,
              metadata:{
                move_percents:meta.move_percents||[],
                stop_loss_initial:meta.stop_loss_initial||-2.0,
                max_move_percent:meta.max_move_percent||null
              }
            }));
          " 2>/tmp/prep/inject_error.log
          if [ $? -ne 0 ]; then
            echo "❌ خطا در inject metadata: $(cat /tmp/prep/inject_error.log)"; exit 1
          fi
          FLAG_CONTENT=$(echo "injected" | base64 -w0)
          gh api "repos/$THIRD_REPO/contents/$META_FLAG_PATH" \
            -X PUT -F message="mark metadata as injected for $STRAT" \
            -F content="$FLAG_CONTENT" -F branch="main" 2>/dev/null || true
          echo "✅ فایل یکپارچه آماده شد."

      - name: 3. راه‌اندازی پایتون و نصب کتابخانه‌ها
        if: steps.prev_check.outputs.already_done != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install pandas requests
        if: steps.prev_check.outputs.already_done != 'true'

      - name: 3b. دانلود داده‌های قیمت OHLC از مخزن دوم (اختیاری)
        if: steps.prev_check.outputs.already_done != 'true'
        id: ohlc_fetch
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          OHLC_REPO: ${{ secrets.OHLC_REPO }}
        run: |
          set +e
          if [ -z "$OHLC_REPO" ]; then
            echo "ℹ️ OHLC_REPO تنظیم نشده — صرف‌نظر از دانلود داده‌های قیمت."
            exit 0
          fi

          mkdir -p /tmp/ohlc
          LIST_JSON=$(gh api "repos/$OHLC_REPO/contents/data/All_Coins_Combined" 2>/tmp/ohlc_list_error.log)
          if [ -z "$LIST_JSON" ] || ! echo "$LIST_JSON" | jq empty 2>/dev/null; then
            echo "⚠️ دریافت لیست فایل‌های OHLC ناموفق بود — ادامه بدون داده‌های قیمت."
            echo "$(cat /tmp/ohlc_list_error.log)"
            exit 0
          fi

          CSV_COUNT=$(echo "$LIST_JSON" | jq '[.[] | select(.name | endswith(".csv"))] | length')
          if [ "$CSV_COUNT" -eq 0 ]; then
            echo "⚠️ هیچ فایل CSV در data/All_Coins_Combined یافت نشد — ادامه بدون داده‌های قیمت."
            exit 0
          fi

          DOWNLOAD_FAILED=0
          echo "$LIST_JSON" | jq -c '.[] | select(.name | endswith(".csv"))' | while read -r ITEM; do
            FNAME=$(echo "$ITEM" | jq -r '.name')
            FPATH=$(echo "$ITEM" | jq -r '.path')
            CONTENT=$(gh api "repos/$OHLC_REPO/contents/$FPATH" -q '.content' 2>/tmp/ohlc_item_error.log)
            if [ -z "$CONTENT" ]; then
              echo "   ⚠️ دانلود $FNAME ناموفق بود."
              echo "1" >> /tmp/ohlc_fail_flag
              continue
            fi
            echo "$CONTENT" | tr -d '\n' | base64 -d > "/tmp/ohlc/$FNAME" 2>/tmp/ohlc_decode_error.log
            if [ $? -ne 0 ] || [ ! -s "/tmp/ohlc/$FNAME" ]; then
              echo "   ⚠️ دیکد $FNAME ناموفق بود."
              echo "1" >> /tmp/ohlc_fail_flag
              rm -f "/tmp/ohlc/$FNAME"
            fi
          done

          DOWNLOADED_COUNT=$(find /tmp/ohlc -name '*.csv' 2>/dev/null | wc -l)
          if [ "$DOWNLOADED_COUNT" -eq 0 ]; then
            echo "⚠️ هیچ فایل OHLC با موفقیت دانلود نشد — ادامه بدون داده‌های قیمت."
            exit 0
          fi

          echo "✅ تعداد $DOWNLOADED_COUNT فایل OHLC دانلود شد."
          echo "OHLC_DIR=/tmp/ohlc" >> $GITHUB_ENV

      - name: 4. اجرای ماژول تحلیلی و استخراج امضا
        if: steps.prev_check.outputs.already_done != 'true'
        id: execute_batch
        run: |
          mkdir -p /tmp/results /tmp/errors /tmp/signatures
          echo "[]" > /tmp/done_items.json
          echo "[]" > /tmp/failed_items.json

          LENGTH=$(jq length /tmp/chunk.json)
          echo "🚀 شروع پردازش $LENGTH ترکیب در chunk ${{ matrix.chunk_index }}"

          for i in $(seq 0 $((LENGTH-1))); do
            ITEM=$(jq -c ".[$i]" /tmp/chunk.json)
            MODULE=$(echo "$ITEM"   | jq -r '.module')
            STRAT=$(echo "$ITEM"    | jq -r '.strat')
            COIN=$(echo "$ITEM"     | jq -r '.coin')
            SAFE_COIN=$(echo "$COIN" | tr '+' '_')
            INTERVAL=$(echo "$ITEM" | jq -r '.interval')
            MODEL=$(echo "$ITEM"    | jq -r '.model')
            CHUNK_START="${{ github.event.inputs.chunk_start }}"
            CHUNK_END="${{ github.event.inputs.chunk_end }}"

            echo "   📊 پردازش: $STRAT / $COIN / $INTERVAL / $MODEL"

            # ============================================================
            # ماژول deep پارامترهای متفاوتی دارد – فعلاً اسکیپ می‌شود
            # ============================================================
            if [ "$MODULE" == "deep" ]; then
              echo "   ⚠️ ماژول deep پشتیبانی نمی‌شود – رد می‌شود."
              jq --arg m "$MODULE" --arg s "$STRAT" --arg c "$COIN" --arg iv "$INTERVAL" --arg mo "$MODEL" \
                '. + [{"module":$m,"strat":$s,"coin":$c,"interval":$iv,"model":$mo}]' \
                /tmp/failed_items.json > /tmp/failed_items.json.tmp && mv /tmp/failed_items.json.tmp /tmp/failed_items.json
              continue
            fi

            CMD="python modules/${MODULE}.py \
              --trades-json /tmp/prep/all_trades.json \
              --news-dir data/news \
              --strategy-folder $STRAT \
              --coin $COIN \
              --interval $INTERVAL \
              --model $MODEL"
            if [ -n "$CHUNK_START" ] && [ -n "$CHUNK_END" ]; then
              CMD="$CMD --chunk-start $CHUNK_START --chunk-end $CHUNK_END"
            fi
            : > /tmp/item_output.log
            set -o pipefail
            eval $CMD 2>&1 | tee /tmp/item_output.log
            EXIT_CODE=${PIPESTATUS[0]}
            set +o pipefail

            if [ $EXIT_CODE -ne 0 ]; then
              echo "   ❌ خطا در ترکیب $COIN $INTERVAL $MODEL"
              SAFE_STRAT=$(echo "$STRAT" | sed 's/[^a-zA-Z0-9._-]/_/g')
              cp /tmp/item_output.log "/tmp/errors/error_${MODULE}_${SAFE_COIN}_${SAFE_STRAT}_${INTERVAL}_${MODEL}.log"
              jq --arg m "$MODULE" --arg s "$STRAT" --arg c "$COIN" --arg iv "$INTERVAL" --arg mo "$MODEL" \
                '. + [{"module":$m,"strat":$s,"coin":$c,"interval":$iv,"model":$mo}]' \
                /tmp/failed_items.json > /tmp/failed_items.json.tmp && mv /tmp/failed_items.json.tmp /tmp/failed_items.json
              continue
            fi

            OUTPUT_FILE="${STRAT}_${COIN}_${INTERVAL}_${MODEL}.csv"
            if [ -f "$OUTPUT_FILE" ]; then
              DEST_DIR="/tmp/results/${MODULE}/${STRAT}/${SAFE_COIN}"
              mkdir -p "$DEST_DIR"
              mv "$OUTPUT_FILE" "$DEST_DIR/${INTERVAL}_${MODEL}.csv"

              if [[ "$MODULE" == "combo_10day" || "$MODULE" == "combo_monthly" ]]; then
                EXTRACT_SCRIPT="modules/extract_signatures_10day.py"
                [ "$MODULE" == "combo_monthly" ] && EXTRACT_SCRIPT="modules/extract_signatures_monthly.py"
                SIG_OUT="/tmp/results/signatures/${MODULE}/${STRAT}/${SAFE_COIN}/${INTERVAL}_${MODEL}.jsonl"
                mkdir -p "$(dirname $SIG_OUT)"
                EXTRACT_CMD="python $EXTRACT_SCRIPT \
                  --trades-json /tmp/prep/all_trades.json \
                  --news-dir data/news \
                  --interval $INTERVAL \
                  --strategy-folder $STRAT \
                  --coin $COIN \
                  --model $MODEL \
                  --min-sample-count 5 \
                  --out $SIG_OUT"
                if [ -n "$OHLC_DIR" ]; then
                  EXTRACT_CMD="$EXTRACT_CMD --ohlc-dir $OHLC_DIR"
                fi
                eval $EXTRACT_CMD 2>&1 | tee -a /tmp/item_output.log
                [ $? -eq 0 ] && echo "      ✅ امضا استخراج شد." || echo "      ⚠️ استخراج امضا ناموفق بود (ادامه)."
              fi

              jq --arg m "$MODULE" --arg s "$STRAT" --arg c "$COIN" --arg iv "$INTERVAL" --arg mo "$MODEL" \
                '. + [{"module":$m,"strat":$s,"coin":$c,"interval":$iv,"model":$mo}]' \
                /tmp/done_items.json > /tmp/done_items.json.tmp && mv /tmp/done_items.json.tmp /tmp/done_items.json
            else
              echo "   ⚠️ فایل خروجی $OUTPUT_FILE یافت نشد."
              jq --arg m "$MODULE" --arg s "$STRAT" --arg c "$COIN" --arg iv "$INTERVAL" --arg mo "$MODEL" \
                '. + [{"module":$m,"strat":$s,"coin":$c,"interval":$iv,"model":$mo}]' \
                /tmp/failed_items.json > /tmp/failed_items.json.tmp && mv /tmp/failed_items.json.tmp /tmp/failed_items.json
            fi
          done

          DONE_COUNT=$(jq length /tmp/done_items.json)
          FAILED_COUNT=$(jq length /tmp/failed_items.json)
          echo "✅ موفق: $DONE_COUNT   ❌ ناموفق: $FAILED_COUNT"
          echo "done_count=$DONE_COUNT" >> $GITHUB_OUTPUT
          echo "failed_count=$FAILED_COUNT" >> $GITHUB_OUTPUT

      - name: 4.5. ذخیره نتایج این chunk به‌عنوان artifact مستقل
        if: always()
        run: |
          mkdir -p /tmp/chunk_artifact/results
          [ -f /tmp/done_items.json ] && cp /tmp/done_items.json /tmp/chunk_artifact/done_items.json || echo "[]" > /tmp/chunk_artifact/done_items.json
          [ -f /tmp/failed_items.json ] && cp /tmp/failed_items.json /tmp/chunk_artifact/failed_items.json || echo "[]" > /tmp/chunk_artifact/failed_items.json
          [ -d /tmp/results ] && cp -r /tmp/results/. /tmp/chunk_artifact/results/ || true
          DONE_COUNT=$(jq length /tmp/chunk_artifact/done_items.json 2>/dev/null || echo 0)
          FAILED_COUNT=$(jq length /tmp/chunk_artifact/failed_items.json 2>/dev/null || echo 0)
          TOTAL=$(jq length /tmp/chunk.json 2>/dev/null || echo 0)
          if [ "$DONE_COUNT" -gt 0 ] && [ "$((DONE_COUNT + FAILED_COUNT))" -ge "$TOTAL" ]; then
            touch /tmp/chunk_artifact/chunk_completed.flag
            echo "✅ chunk ${{ matrix.chunk_index }} کامل شد ($DONE_COUNT موفق، $FAILED_COUNT ناموفق) — پرچم ثبت شد."
          else
            echo "ℹ️ chunk ${{ matrix.chunk_index }} ناقص ($DONE_COUNT/$TOTAL) — پرچم ثبت نشد."
          fi

      - name: 4.6. آپلود artifact مستقل این chunk (نتایج + پرچم)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chunk-done-${{ matrix.chunk_index }}
          path: /tmp/chunk_artifact/
          retention-days: 7
          if-no-files-found: warn

      - name: 5. آپلود نتایج (CSV + signatures) به‌عنوان artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: batch-results-${{ github.run_id }}
          path: /tmp/results/
          retention-days: 3
          if-no-files-found: warn

      - name: 5.5. آپلود signatures رمزنگاری‌شده به مخزن سوم (پایدار)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD || secrets.DATA_PASSWORD }}
        run: |
          SIG_DIR="/tmp/results/signatures"
          if [ ! -d "$SIG_DIR" ] || [ "$(find "$SIG_DIR" -name '*.jsonl' | wc -l)" -eq 0 ]; then
            echo "ℹ️ هیچ فایل signature برای آپلود به مخزن سوم وجود ندارد."
            exit 0
          fi
          UPLOADED=0
          FAILED=0
          find "$SIG_DIR" -name '*.jsonl' | while read -r SIG_FILE; do
            # ساختار نسبی: signatures/module/strat/coin/interval_model.jsonl
            REL="${SIG_FILE#$SIG_DIR/}"
            DEST="analysis_results/signatures/${REL}.enc"

            # رمزنگاری
            node -e "
              const crypto=require('crypto'),fs=require('fs');
              const pass=process.env.RESULTS_PASSWORD;
              const data=fs.readFileSync('$SIG_FILE');
              const key=crypto.scryptSync(pass,'salt',32);
              const iv=crypto.randomBytes(16);
              const cipher=crypto.createCipheriv('aes-256-cbc',key,iv);
              const enc=Buffer.concat([cipher.update(data),cipher.final()]);
              fs.writeFileSync('${SIG_FILE}.enc',Buffer.concat([iv,enc]));
            " 2>/dev/null || { echo "⚠️ رمزنگاری ناموفق: $REL"; FAILED=$((FAILED+1)); continue; }

            EXISTING_SHA=$(gh api "repos/$THIRD_REPO/contents/$DEST" -q '.sha' 2>/dev/null || echo "")
            if [ -n "$EXISTING_SHA" ]; then
              gh api "repos/$THIRD_REPO/contents/$DEST" \
                -X PUT \
                -F message="update signature $REL (chunk ${{ matrix.chunk_index }} run ${{ github.run_id }})" \
                -F content="$(base64 -w0 < "${SIG_FILE}.enc")" \
                -F sha="$EXISTING_SHA" \
                -F branch="main" 2>/dev/null && UPLOADED=$((UPLOADED+1)) || FAILED=$((FAILED+1))
            else
              gh api "repos/$THIRD_REPO/contents/$DEST" \
                -X PUT \
                -F message="upload signature $REL (chunk ${{ matrix.chunk_index }} run ${{ github.run_id }})" \
                -F content="$(base64 -w0 < "${SIG_FILE}.enc")" \
                -F branch="main" 2>/dev/null && UPLOADED=$((UPLOADED+1)) || FAILED=$((FAILED+1))
            fi
            rm -f "${SIG_FILE}.enc"
          done
          echo "✅ signatures آپلود‌شده: $UPLOADED  ناموفق: $FAILED"

      - name: 6. آپلود لیست ترکیبات موفق این قطعه
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: done-items-${{ matrix.chunk_index }}-${{ github.run_id }}
          path: /tmp/done_items.json
          retention-days: 1

  # ================================================================
  # cleanup: حذف دقیق ترکیبات موفق از all_combinations.json
  # ================================================================
  cleanup:
    runs-on: ubuntu-latest
    needs: [generate-matrix, batch]
    if: ${{ always() && needs.batch.result != 'skipped' && inputs.analysis_module == 'fixed_batch' && needs.generate-matrix.outputs.empty == 'false' }}
    steps:
      - name: دانلود همه‌ی artifact های done-items این run
        uses: actions/download-artifact@v4
        with:
          pattern: done-items-*-${{ github.run_id }}
          path: /tmp/done_artifacts
          merge-multiple: false

      - name: ادغام لیست‌های done و حذف دقیق از all_combinations.json
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          CURL="/usr/bin/curl"
          find /tmp/done_artifacts -name 'done_items.json' -print0 \
            | xargs -0 jq -s 'add' > /tmp/merged_done.json 2>/dev/null || echo "[]" > /tmp/merged_done.json
          [ -s /tmp/merged_done.json ] || echo "[]" > /tmp/merged_done.json

          MERGED_COUNT=$(jq length /tmp/merged_done.json)
          echo "[DEBUG] تعداد کل ترکیبات موفق این run: $MERGED_COUNT"
          if [ "$MERGED_COUNT" -eq 0 ]; then
            echo "ℹ️ هیچ ترکیب موفقی برای حذف وجود ندارد."
            exit 0
          fi

          RETRY=0; MAX=15
          while [ $RETRY -lt $MAX ]; do
            $CURL -s -o /tmp/current.json \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3.raw" \
              "https://api.github.com/repos/$THIRD_REPO/contents/all_combinations.json?t=$(date +%s)"
            if [ ! -s /tmp/current.json ] || ! jq empty /tmp/current.json 2>/dev/null; then
              echo "ERROR: دریافت فایل فعلی ناموفق."; exit 1
            fi
            SHA=$($CURL -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/$THIRD_REPO/contents/all_combinations.json" | jq -r '.sha')
            [ -z "$SHA" ] || [ "$SHA" = "null" ] && { echo "ERROR: SHA نامعتبر."; exit 1; }

            jq -s '.[0] as $c | .[1] as $d
              | $c - ($c | map(select(. as $i | $d | any(. == $i))))
            ' /tmp/current.json /tmp/merged_done.json > /tmp/new_content.json

            BEFORE=$(jq length /tmp/current.json)
            AFTER=$(jq length /tmp/new_content.json)
            echo "[DEBUG] قبل: $BEFORE  بعد: $AFTER  (حذف‌شده: $((BEFORE-AFTER)))"

            base64 -w0 /tmp/new_content.json > /tmp/new_content_base64.txt
            cat > /tmp/payload.json <<EOF
          {
            "message": "remove $((BEFORE-AFTER)) processed combinations (run ${{ github.run_id }})",
            "content": "$(cat /tmp/new_content_base64.txt)",
            "sha": "$SHA",
            "branch": "main"
          }
          EOF
            HTTP_CODE=$($CURL -s -X PUT -o /tmp/upload_response.txt -w "%{http_code}" \
              -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/json" \
              --data-binary @/tmp/payload.json \
              "https://api.github.com/repos/$THIRD_REPO/contents/all_combinations.json")

            if [ "$HTTP_CODE" -eq 200 ] || [ "$HTTP_CODE" -eq 201 ]; then
              echo "✅ $((BEFORE-AFTER)) ترکیب با موفقیت حذف شدند."
              break
            elif [ "$HTTP_CODE" -eq 409 ] || [ "$HTTP_CODE" -eq 422 ]; then
              echo "⚠️ تداخل SHA (کد $HTTP_CODE) — تلاش مجدد..."
              RETRY=$((RETRY+1)); sleep $(( (RANDOM % 5) + 2 )); continue
            else
              echo "ERROR: آپلود ناموفق ($HTTP_CODE)"; cat /tmp/upload_response.txt; exit 1
            fi
          done
          [ $RETRY -ge $MAX ] && { echo "ERROR: پس از $MAX تلاش ناموفق."; exit 1; }
          rm -f /tmp/current.json /tmp/new_content.json /tmp/new_content_base64.txt /tmp/payload.json /tmp/upload_response.txt

      - name: فراخوانی مجدد loop_analysis.yml
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/actions/workflows/loop_analysis.yml/dispatches \
            -X POST -f ref="main"

  # ================================================================
  # golden: امتیازدهی استراتژی‌ها بر اساس signatures
  # ================================================================
  golden:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    if: ${{ inputs.analysis_module == 'golden' }}
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 1. بررسی interrupt.flag
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$THIRD_REPO/contents/interrupt.flag")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "🛑 interrupt.flag یافت شد — job با وضعیت interrupted خاتمه می‌یابد."
            echo '{"status":"interrupted","module":"golden","run_id":"${{ github.run_id }}"}' \
              > /tmp/golden_status.json
            gh api "repos/$THIRD_REPO/contents/analysis_results/golden_status.json" \
              -X PUT -F message="golden interrupted" \
              -F content="$(base64 -w0 < /tmp/golden_status.json)" \
              -F branch="main" 2>/dev/null || true
            exit 0
          fi
          echo "✅ interrupt.flag یافت نشد — ادامه پردازش."

      - name: 2. راه‌اندازی پایتون و نصب کتابخانه‌ها
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install pandas numpy scipy pyarrow

      - name: 3. دانلود signatures از مخزن سوم
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD || secrets.DATA_PASSWORD }}
        run: |
          mkdir -p /tmp/signatures
          echo "🔍 دریافت لیست فایل‌های signatures از مخزن سوم..."

          TREE=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$THIRD_REPO/git/trees/main?recursive=1")

          SIG_FILES=$(echo "$TREE" | jq -r '.tree[] | select(.path | startswith("analysis_results/signatures/")) | select(.path | endswith(".jsonl.enc")) | .path')

          if [ -z "$SIG_FILES" ]; then
            echo "❌ هیچ فایل signature رمزنگاری‌شده در مخزن سوم یافت نشد."
            exit 1
          fi

          SIG_COUNT=$(echo "$SIG_FILES" | wc -l)
          echo "📦 تعداد فایل‌های signature یافت شده: $SIG_COUNT"

          FAILED=0
          while IFS= read -r SIG_PATH; do
            REL_PATH="${SIG_PATH#analysis_results/signatures/}"
            LOCAL_DIR="/tmp/signatures/$(dirname "$REL_PATH")"
            LOCAL_FILE="$LOCAL_DIR/$(basename "$REL_PATH" .enc)"
            mkdir -p "$LOCAL_DIR"

            DL_URL=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/$THIRD_REPO/contents/$SIG_PATH" | jq -r '.download_url')

            if [ -z "$DL_URL" ] || [ "$DL_URL" = "null" ]; then
              echo "⚠️ دریافت URL ناموفق: $SIG_PATH"
              FAILED=$((FAILED+1))
              continue
            fi

            curl -s -L -H "Authorization: token $GH_TOKEN" -o "${LOCAL_FILE}.enc" "$DL_URL"
            if [ ! -s "${LOCAL_FILE}.enc" ]; then
              echo "⚠️ دانلود ناموفق: $SIG_PATH"
              FAILED=$((FAILED+1))
              continue
            fi

            node -e "
              const crypto=require('crypto'),fs=require('fs');
              const pass=process.env.RESULTS_PASSWORD;
              const data=fs.readFileSync('${LOCAL_FILE}.enc');
              const key=crypto.scryptSync(pass,'salt',32);
              const iv=data.slice(0,16),enc=data.slice(16);
              const decipher=crypto.createDecipheriv('aes-256-cbc',key,iv);
              const dec=Buffer.concat([decipher.update(enc),decipher.final()]);
              fs.writeFileSync('${LOCAL_FILE}',dec);
            " 2>/dev/null && rm -f "${LOCAL_FILE}.enc" || {
              echo "⚠️ رمزگشایی ناموفق: $SIG_PATH"
              FAILED=$((FAILED+1))
            }
          done <<< "$SIG_FILES"

          JSONL_COUNT=$(find /tmp/signatures -name '*.jsonl' | wc -l)
          echo "✅ تعداد فایل‌های JSONL رمزگشایی‌شده: $JSONL_COUNT  (ناموفق: $FAILED)"
          if [ "$JSONL_COUNT" -eq 0 ]; then
            echo "❌ هیچ signature‌ای با موفقیت دریافت نشد."
            exit 1
          fi

      - name: 4. دریافت strategies_metadata.json از مخزن سوم
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          HTTP_CODE=$(curl -s -o /tmp/strategies_metadata.json -w "%{http_code}" \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/$THIRD_REPO/contents/strategies_metadata.json")
          if [ "$HTTP_CODE" != "200" ] || [ ! -s /tmp/strategies_metadata.json ]; then
            echo "❌ strategies_metadata.json یافت نشد (HTTP $HTTP_CODE)."
            exit 1
          fi
          echo "✅ strategies_metadata.json دریافت شد."

      - name: 5. اجرای golden.py
        run: |
          python modules/golden.py \
            --signatures-dir /tmp/signatures \
            --strategies-json /tmp/strategies_metadata.json \
            --output-dir /tmp/golden_output \
            --alpha 0.1
          if [ ! -f /tmp/golden_output/golden_scores.parquet ]; then
            echo "❌ golden_scores.parquet تولید نشد."
            exit 1
          fi
          echo "✅ golden_scores.parquet با موفقیت تولید شد."

      - name: 6. آپلود golden_scores.parquet به‌عنوان artifact
        uses: actions/upload-artifact@v4
        with:
          name: golden-scores-${{ github.run_id }}
          path: /tmp/golden_output/golden_scores.parquet
          retention-days: 3

      - name: 7. رمزنگاری و آپلود golden_scores.parquet به مخزن سوم
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD || secrets.DATA_PASSWORD }}
        run: |
          node -e "
            const crypto=require('crypto'),fs=require('fs');
            const pass=process.env.RESULTS_PASSWORD;
            const data=fs.readFileSync('/tmp/golden_output/golden_scores.parquet');
            const key=crypto.scryptSync(pass,'salt',32);
            const iv=crypto.randomBytes(16);
            const cipher=crypto.createCipheriv('aes-256-cbc',key,iv);
            const enc=Buffer.concat([cipher.update(data),cipher.final()]);
            fs.writeFileSync('/tmp/golden_scores.parquet.enc',Buffer.concat([iv,enc]));
          "
          DEST="analysis_results/golden_scores.parquet.enc"
          EXISTING_SHA=$(gh api "repos/$THIRD_REPO/contents/$DEST" -q '.sha' 2>/dev/null || echo "")
          if [ -n "$EXISTING_SHA" ]; then
            gh api "repos/$THIRD_REPO/contents/$DEST" \
              -X PUT \
              -F message="update golden_scores (run ${{ github.run_id }})" \
              -F content="$(base64 -w0 < /tmp/golden_scores.parquet.enc)" \
              -F sha="$EXISTING_SHA" \
              -F branch="main"
          else
            gh api "repos/$THIRD_REPO/contents/$DEST" \
              -X PUT \
              -F message="upload golden_scores (run ${{ github.run_id }})" \
              -F content="$(base64 -w0 < /tmp/golden_scores.parquet.enc)" \
              -F branch="main"
          fi
          echo "✅ golden_scores.parquet.enc آپلود شد."

      - name: 8. فراخوانی مجدد loop_analysis.yml
        if: always()
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/actions/workflows/loop_analysis.yml/dispatches \
            -X POST -f ref="main"

  # ================================================================
  # portfolios: ساخت پرتفولیوهای بهینه بر اساس golden scores
  # ================================================================
  portfolios:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    if: ${{ inputs.analysis_module == 'portfolios' }}
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 1. بررسی interrupt.flag
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$THIRD_REPO/contents/interrupt.flag")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "🛑 interrupt.flag یافت شد — job با وضعیت interrupted خاتمه می‌یابد."
            echo '{"status":"interrupted","module":"portfolios","run_id":"${{ github.run_id }}"}' \
              > /tmp/portfolios_status.json
            gh api "repos/$THIRD_REPO/contents/analysis_results/portfolios_status.json" \
              -X PUT -F message="portfolios interrupted" \
              -F content="$(base64 -w0 < /tmp/portfolios_status.json)" \
              -F branch="main" 2>/dev/null || true
            exit 0
          fi
          echo "✅ interrupt.flag یافت نشد — ادامه پردازش."

      - name: 2. راه‌اندازی پایتون و نصب کتابخانه‌ها
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install pandas numpy scipy pyarrow

      - name: 3. دانلود signatures از مخزن سوم
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD || secrets.DATA_PASSWORD }}
        run: |
          mkdir -p /tmp/signatures
          echo "🔍 دریافت لیست فایل‌های signatures از مخزن سوم..."

          TREE=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$THIRD_REPO/git/trees/main?recursive=1")

          SIG_FILES=$(echo "$TREE" | jq -r '.tree[] | select(.path | startswith("analysis_results/signatures/")) | select(.path | endswith(".jsonl.enc")) | .path')

          if [ -z "$SIG_FILES" ]; then
            echo "❌ هیچ فایل signature رمزنگاری‌شده در مخزن سوم یافت نشد."
            exit 1
          fi

          SIG_COUNT=$(echo "$SIG_FILES" | wc -l)
          echo "📦 تعداد فایل‌های signature یافت شده: $SIG_COUNT"

          FAILED=0
          while IFS= read -r SIG_PATH; do
            REL_PATH="${SIG_PATH#analysis_results/signatures/}"
            LOCAL_DIR="/tmp/signatures/$(dirname "$REL_PATH")"
            LOCAL_FILE="$LOCAL_DIR/$(basename "$REL_PATH" .enc)"
            mkdir -p "$LOCAL_DIR"

            DL_URL=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/$THIRD_REPO/contents/$SIG_PATH" | jq -r '.download_url')

            if [ -z "$DL_URL" ] || [ "$DL_URL" = "null" ]; then
              echo "⚠️ دریافت URL ناموفق: $SIG_PATH"
              FAILED=$((FAILED+1))
              continue
            fi

            curl -s -L -H "Authorization: token $GH_TOKEN" -o "${LOCAL_FILE}.enc" "$DL_URL"
            if [ ! -s "${LOCAL_FILE}.enc" ]; then
              echo "⚠️ دانلود ناموفق: $SIG_PATH"
              FAILED=$((FAILED+1))
              continue
            fi

            node -e "
              const crypto=require('crypto'),fs=require('fs');
              const pass=process.env.RESULTS_PASSWORD;
              const data=fs.readFileSync('${LOCAL_FILE}.enc');
              const key=crypto.scryptSync(pass,'salt',32);
              const iv=data.slice(0,16),enc=data.slice(16);
              const decipher=crypto.createDecipheriv('aes-256-cbc',key,iv);
              const dec=Buffer.concat([decipher.update(enc),decipher.final()]);
              fs.writeFileSync('${LOCAL_FILE}',dec);
            " 2>/dev/null && rm -f "${LOCAL_FILE}.enc" || {
              echo "⚠️ رمزگشایی ناموفق: $SIG_PATH"
              FAILED=$((FAILED+1))
            }
          done <<< "$SIG_FILES"

          JSONL_COUNT=$(find /tmp/signatures -name '*.jsonl' | wc -l)
          echo "✅ تعداد فایل‌های JSONL رمزگشایی‌شده: $JSONL_COUNT  (ناموفق: $FAILED)"
          if [ "$JSONL_COUNT" -eq 0 ]; then
            echo "❌ هیچ signature‌ای با موفقیت دریافت نشد."
            exit 1
          fi

      - name: 4. دانلود golden_scores.parquet از مخزن سوم
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD || secrets.DATA_PASSWORD }}
        run: |
          mkdir -p /tmp/golden_scores
          HTTP_CODE=$(curl -s -o /tmp/golden_scores.parquet.enc -w "%{http_code}" \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/$THIRD_REPO/contents/analysis_results/golden_scores.parquet.enc")
          if [ "$HTTP_CODE" != "200" ] || [ ! -s /tmp/golden_scores.parquet.enc ]; then
            echo "❌ golden_scores.parquet.enc در مخزن سوم یافت نشد (HTTP $HTTP_CODE)."
            exit 1
          fi
          node -e "
            const crypto=require('crypto'),fs=require('fs');
            const pass=process.env.RESULTS_PASSWORD;
            const data=fs.readFileSync('/tmp/golden_scores.parquet.enc');
            const key=crypto.scryptSync(pass,'salt',32);
            const iv=data.slice(0,16),enc=data.slice(16);
            const decipher=crypto.createDecipheriv('aes-256-cbc',key,iv);
            const dec=Buffer.concat([decipher.update(enc),decipher.final()]);
            fs.writeFileSync('/tmp/golden_scores/golden_scores.parquet',dec);
          "
          if [ ! -f /tmp/golden_scores/golden_scores.parquet ]; then
            echo "❌ رمزگشایی golden_scores.parquet ناموفق بود."
            exit 1
          fi
          echo "✅ golden_scores.parquet از مخزن سوم دریافت و رمزگشایی شد."

      - name: 5. دریافت strategies_metadata.json از مخزن سوم
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          HTTP_CODE=$(curl -s -o /tmp/strategies_metadata.json -w "%{http_code}" \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/$THIRD_REPO/contents/strategies_metadata.json")
          if [ "$HTTP_CODE" != "200" ] || [ ! -s /tmp/strategies_metadata.json ]; then
            echo "❌ strategies_metadata.json یافت نشد (HTTP $HTTP_CODE)."
            exit 1
          fi
          echo "✅ strategies_metadata.json دریافت شد."

      - name: 6. اجرای portfolios.py
        run: |
          python modules/portfolios.py \
            --signatures-dir /tmp/signatures \
            --golden-scores /tmp/golden_scores/golden_scores.parquet \
            --strategies-json /tmp/strategies_metadata.json \
            --output-dir /tmp/portfolios_output \
            --top-n 15
          if [ ! -f /tmp/portfolios_output/portfolios.parquet ]; then
            echo "❌ portfolios.parquet تولید نشد."
            exit 1
          fi
          echo "✅ portfolios.parquet با موفقیت تولید شد."

      - name: 7. آپلود portfolios.parquet به‌عنوان artifact
        uses: actions/upload-artifact@v4
        with:
          name: portfolios-${{ github.run_id }}
          path: /tmp/portfolios_output/portfolios.parquet
          retention-days: 3

      - name: 8. رمزنگاری و آپلود portfolios.parquet به مخزن سوم
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD || secrets.DATA_PASSWORD }}
        run: |
          node -e "
            const crypto=require('crypto'),fs=require('fs');
            const pass=process.env.RESULTS_PASSWORD;
            const data=fs.readFileSync('/tmp/portfolios_output/portfolios.parquet');
            const key=crypto.scryptSync(pass,'salt',32);
            const iv=crypto.randomBytes(16);
            const cipher=crypto.createCipheriv('aes-256-cbc',key,iv);
            const enc=Buffer.concat([cipher.update(data),cipher.final()]);
            fs.writeFileSync('/tmp/portfolios.parquet.enc',Buffer.concat([iv,enc]));
          "
          DEST="analysis_results/portfolios.parquet.enc"
          EXISTING_SHA=$(gh api "repos/$THIRD_REPO/contents/$DEST" -q '.sha' 2>/dev/null || echo "")
          if [ -n "$EXISTING_SHA" ]; then
            gh api "repos/$THIRD_REPO/contents/$DEST" \
              -X PUT \
              -F message="update portfolios (run ${{ github.run_id }})" \
              -F content="$(base64 -w0 < /tmp/portfolios.parquet.enc)" \
              -F sha="$EXISTING_SHA" \
              -F branch="main"
          else
            gh api "repos/$THIRD_REPO/contents/$DEST" \
              -X PUT \
              -F message="upload portfolios (run ${{ github.run_id }})" \
              -F content="$(base64 -w0 < /tmp/portfolios.parquet.enc)" \
              -F branch="main"
          fi
          echo "✅ portfolios.parquet.enc آپلود شد."

      - name: 9. فراخوانی مجدد loop_analysis.yml
        if: always()
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/actions/workflows/loop_analysis.yml/dispatches \
            -X POST -f ref="main"

  # ================================================================
  # correlation: (اختیاری) محاسبه همبستگی‌ها
  # ================================================================
  correlation:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    if: ${{ inputs.analysis_module == 'correlation' }}
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 1. بررسی interrupt.flag
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$THIRD_REPO/contents/interrupt.flag")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "🛑 interrupt.flag یافت شد — job خاتمه می‌یابد."
            echo '{"status":"interrupted","module":"correlation","run_id":"${{ github.run_id }}"}' \
              > /tmp/correlation_status.json
            gh api "repos/$THIRD_REPO/contents/analysis_results/correlation_status.json" \
              -X PUT -F message="correlation interrupted" \
              -F content="$(base64 -w0 < /tmp/correlation_status.json)" \
              -F branch="main" 2>/dev/null || true
            exit 0
          fi

      - name: 2. راه‌اندازی پایتون و نصب کتابخانه‌ها
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install pandas numpy scipy pyarrow

      - name: 3. دانلود signatures از مخزن سوم
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD || secrets.DATA_PASSWORD }}
        run: |
          mkdir -p /tmp/signatures
          echo "🔍 دریافت لیست فایل‌های signatures از مخزن سوم..."

          TREE=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$THIRD_REPO/git/trees/main?recursive=1")

          SIG_FILES=$(echo "$TREE" | jq -r '.tree[] | select(.path | startswith("analysis_results/signatures/")) | select(.path | endswith(".jsonl.enc")) | .path')

          if [ -z "$SIG_FILES" ]; then
            echo "❌ هیچ فایل signature رمزنگاری‌شده در مخزن سوم یافت نشد."
            exit 1
          fi

          SIG_COUNT=$(echo "$SIG_FILES" | wc -l)
          echo "📦 تعداد فایل‌های signature یافت شده: $SIG_COUNT"

          FAILED=0
          while IFS= read -r SIG_PATH; do
            REL_PATH="${SIG_PATH#analysis_results/signatures/}"
            LOCAL_DIR="/tmp/signatures/$(dirname "$REL_PATH")"
            LOCAL_FILE="$LOCAL_DIR/$(basename "$REL_PATH" .enc)"
            mkdir -p "$LOCAL_DIR"

            DL_URL=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/$THIRD_REPO/contents/$SIG_PATH" | jq -r '.download_url')

            if [ -z "$DL_URL" ] || [ "$DL_URL" = "null" ]; then
              echo "⚠️ دریافت URL ناموفق: $SIG_PATH"
              FAILED=$((FAILED+1))
              continue
            fi

            curl -s -L -H "Authorization: token $GH_TOKEN" -o "${LOCAL_FILE}.enc" "$DL_URL"
            if [ ! -s "${LOCAL_FILE}.enc" ]; then
              echo "⚠️ دانلود ناموفق: $SIG_PATH"
              FAILED=$((FAILED+1))
              continue
            fi

            node -e "
              const crypto=require('crypto'),fs=require('fs');
              const pass=process.env.RESULTS_PASSWORD;
              const data=fs.readFileSync('${LOCAL_FILE}.enc');
              const key=crypto.scryptSync(pass,'salt',32);
              const iv=data.slice(0,16),enc=data.slice(16);
              const decipher=crypto.createDecipheriv('aes-256-cbc',key,iv);
              const dec=Buffer.concat([decipher.update(enc),decipher.final()]);
              fs.writeFileSync('${LOCAL_FILE}',dec);
            " 2>/dev/null && rm -f "${LOCAL_FILE}.enc" || {
              echo "⚠️ رمزگشایی ناموفق: $SIG_PATH"
              FAILED=$((FAILED+1))
            }
          done <<< "$SIG_FILES"

          JSONL_COUNT=$(find /tmp/signatures -name '*.jsonl' | wc -l)
          echo "✅ تعداد فایل‌های JSONL رمزگشایی‌شده: $JSONL_COUNT  (ناموفق: $FAILED)"
          if [ "$JSONL_COUNT" -eq 0 ]; then
            echo "❌ هیچ signature‌ای با موفقیت دریافت نشد."
            exit 1
          fi

      - name: 4. دریافت news.pickle از مخزن سوم
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD || secrets.DATA_PASSWORD }}
        run: |
          HTTP_CODE=$(curl -s -o /tmp/news.pickle.enc -w "%{http_code}" \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/$THIRD_REPO/contents/data/news.pickle.enc")
          if [ "$HTTP_CODE" != "200" ] || [ ! -s /tmp/news.pickle.enc ]; then
            echo "⚠️ news.pickle.enc یافت نشد (HTTP $HTTP_CODE) — ادامه بدون آن."
          else
            node -e "
              const crypto=require('crypto'),fs=require('fs');
              const pass=process.env.RESULTS_PASSWORD;
              const data=fs.readFileSync('/tmp/news.pickle.enc');
              const key=crypto.scryptSync(pass,'salt',32);
              const iv=data.slice(0,16),enc=data.slice(16);
              const decipher=crypto.createDecipheriv('aes-256-cbc',key,iv);
              const dec=Buffer.concat([decipher.update(enc),decipher.final()]);
              fs.writeFileSync('/tmp/news.pickle',dec);
            "
            echo "✅ news.pickle رمزگشایی شد."
          fi

      - name: 5. اجرای correlation.py
        run: |
          EXTRA_ARGS=""
          [ -f /tmp/news.pickle ] && EXTRA_ARGS="--news-pickle /tmp/news.pickle"
          python modules/correlation.py \
            --signatures-dir /tmp/signatures \
            --output-dir /tmp/correlation_output \
            $EXTRA_ARGS
          if [ ! -f /tmp/correlation_output/correlations.parquet ]; then
            echo "❌ correlations.parquet تولید نشد."
            exit 1
          fi
          echo "✅ correlations.parquet با موفقیت تولید شد."

      - name: 6. آپلود correlations.parquet به‌عنوان artifact
        uses: actions/upload-artifact@v4
        with:
          name: correlations-${{ github.run_id }}
          path: /tmp/correlation_output/correlations.parquet
          retention-days: 3

      - name: 7. رمزنگاری و آپلود correlations.parquet به مخزن سوم
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD || secrets.DATA_PASSWORD }}
        run: |
          node -e "
            const crypto=require('crypto'),fs=require('fs');
            const pass=process.env.RESULTS_PASSWORD;
            const data=fs.readFileSync('/tmp/correlation_output/correlations.parquet');
            const key=crypto.scryptSync(pass,'salt',32);
            const iv=crypto.randomBytes(16);
            const cipher=crypto.createCipheriv('aes-256-cbc',key,iv);
            const enc=Buffer.concat([cipher.update(data),cipher.final()]);
            fs.writeFileSync('/tmp/correlations.parquet.enc',Buffer.concat([iv,enc]));
          "
          DEST="analysis_results/correlations.parquet.enc"
          EXISTING_SHA=$(gh api "repos/$THIRD_REPO/contents/$DEST" -q '.sha' 2>/dev/null || echo "")
          if [ -n "$EXISTING_SHA" ]; then
            gh api "repos/$THIRD_REPO/contents/$DEST" \
              -X PUT \
              -F message="update correlations (run ${{ github.run_id }})" \
              -F content="$(base64 -w0 < /tmp/correlations.parquet.enc)" \
              -F sha="$EXISTING_SHA" \
              -F branch="main"
          else
            gh api "repos/$THIRD_REPO/contents/$DEST" \
              -X PUT \
              -F message="upload correlations (run ${{ github.run_id }})" \
              -F content="$(base64 -w0 < /tmp/correlations.parquet.enc)" \
              -F branch="main"
          fi
          echo "✅ correlations.parquet.enc آپلود شد."
