name: Complete Analysis Pipeline

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      analysis_module:
        description: 'نام ماژول (مثلاً combo_10day یا fixed_batch یا golden یا portfolios)'
        required: true
        default: ''
      analysis_coin:
        description: 'ترکیب ارز (مثلاً BTCUSDT) - در حالت batch استفاده نمی‌شود'
        required: false
        default: ''
      analysis_strategy:
        description: 'نام پوشه استراتژی - در حالت batch استفاده نمی‌شود'
        required: false
        default: ''
      analysis_interval:
        description: 'نوع بازه (مثلاً CPI_post_7d) - در حالت batch استفاده نمی‌شود'
        required: false
        default: ''
      analysis_model:
        description: 'مدل محاسبه (simple_hybrid, fibonacci_full, fibonacci_hybrid) - در حالت batch استفاده نمی‌شود'
        required: false
        default: ''
      chunk_start:
        description: 'شماره شروع چانک (اختیاری)'
        required: false
        default: ''
      chunk_end:
        description: 'شماره پایان چانک (اختیاری)'
        required: false
        default: ''

concurrency:
  group: analysis-and-aggregation
  cancel-in-progress: false

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix_items: ${{ steps.fetch_batch.outputs.matrix_items }}
      empty: ${{ steps.fetch_batch.outputs.empty }}
      total_combos: ${{ steps.fetch_batch.outputs.total_combos }}
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # تنها تماس API گیت‌هاب در کل مرحله‌ی batch -- فقط همین یک‌بار، نه به ازای هر job
      - name: دانلود all_combinations.json و تقسیم به فایل‌های چانک محلی
        id: fetch_batch
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          unalias curl 2>/dev/null || true
          CURL="/usr/bin/curl"
          echo "========== [DEBUG] شروع generate-matrix =========="
          mkdir -p /tmp/chunks

          TIMESTAMP=${{ github.run_id }}
          HTTP_CODE=$($CURL -s -o /tmp/all_combinations.json -w "%{http_code}" \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/$THIRD_REPO/contents/all_combinations.json?t=$TIMESTAMP")

          echo "[DEBUG] HTTP status code: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ] || [ ! -s /tmp/all_combinations.json ] || ! jq empty /tmp/all_combinations.json 2>/dev/null; then
            echo "❌ فایل all_combinations.json نامعتبر یا یافت نشد (کد $HTTP_CODE)"
            echo "empty=true" >> $GITHUB_OUTPUT
            echo "matrix_items=[]" >> $GITHUB_OUTPUT
            echo "total_combos=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          TOTAL_COMBOS=$(jq length /tmp/all_combinations.json)
          echo "[DEBUG] تعداد کل ترکیب‌ها: $TOTAL_COMBOS"
          echo "total_combos=$TOTAL_COMBOS" >> $GITHUB_OUTPUT

          # chunk_size=80 -> حداکثر 102 job برای 8100 آیتم (زیر سقف 256 ماتریس)
          CHUNK_SIZE=80
          CHUNK_COUNT=$(( (TOTAL_COMBOS + CHUNK_SIZE - 1) / CHUNK_SIZE ))
          if [ "$CHUNK_COUNT" -gt 256 ]; then
            CHUNK_SIZE=$(( (TOTAL_COMBOS + 255) / 256 ))
            CHUNK_COUNT=$(( (TOTAL_COMBOS + CHUNK_SIZE - 1) / CHUNK_SIZE ))
          fi
          echo "[DEBUG] chunk_size=$CHUNK_SIZE چانک_count=$CHUNK_COUNT"

          if [ "$TOTAL_COMBOS" -eq 0 ]; then
            echo "empty=true" >> $GITHUB_OUTPUT
            echo "matrix_items=[]" >> $GITHUB_OUTPUT
            echo "total_combos=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          INDICES="["
          for ((i=0; i<CHUNK_COUNT; i++)); do
            START=$((i * CHUNK_SIZE))
            END=$((START + CHUNK_SIZE))
            jq ".[$START:$END]" /tmp/all_combinations.json > /tmp/chunks/chunk_${i}.json
            if [ $i -gt 0 ]; then INDICES+=", "; fi
            INDICES+="$i"
          done
          INDICES+="]"
          echo "[DEBUG] INDICES=$INDICES"
          echo "matrix_items=$INDICES" >> $GITHUB_OUTPUT
          echo "empty=false" >> $GITHUB_OUTPUT
          echo "========== [DEBUG] پایان fetch_batch =========="

      # به‌جای آپلود chunk_meta.json به مخزن سوم: همه چانک‌ها در یک artifact واحد
      # (artifact = Actions storage داخلی، هیچ تماسی با api.github.com ندارد)
      - name: آپلود چانک‌ها به‌صورت یک artifact مشترک برای job های batch
        if: steps.fetch_batch.outputs.empty == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: combo-chunks-${{ github.run_id }}
          path: /tmp/chunks/
          retention-days: 1

  batch:
    needs: [generate-matrix]
    runs-on: ubuntu-latest
    timeout-minutes: 340
    if: ${{ inputs.analysis_module == 'fixed_batch' && needs.generate-matrix.outputs.empty == 'false' }}
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        chunk_index: ${{ fromJson(needs.generate-matrix.outputs.matrix_items || '[0]') }}
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # جایگزین تماس API قبلی: دیگر هیچ curl/gh api به مخزن سوم برای ترکیب‌ها لازم نیست
      - name: دانلود artifact مشترک چانک‌ها
        uses: actions/download-artifact@v4
        with:
          name: combo-chunks-${{ github.run_id }}
          path: /tmp/chunks

      - name: انتخاب فایل chunk مخصوص این job
        id: chunk_params
        run: |
          CHUNK_INDEX=${{ matrix.chunk_index }}
          cp /tmp/chunks/chunk_${CHUNK_INDEX}.json /tmp/chunk.json
          CHUNK_LENGTH=$(jq length /tmp/chunk.json)
          echo "[DEBUG] chunk $CHUNK_INDEX شامل $CHUNK_LENGTH ترکیب است (بدون تماس API)."
          echo "chunk_length=$CHUNK_LENGTH" >> $GITHUB_OUTPUT

      # ================================================================
      # استپ ۱: دانلود و آماده‌سازی فایل یکپارچه معاملات (بدون تغییر)
      # ================================================================
      - name: 1. دانلود فایل یکپارچه معاملات (یک بار برای کل قطعه)
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD || secrets.DATA_PASSWORD }}
        run: |
          CHUNK_JSON=$(cat /tmp/chunk.json)
          STRAT=$(echo "$CHUNK_JSON" | jq -r '.[0].strat' 2>/dev/null || echo "")
          if [ -z "$STRAT" ]; then
            echo "❌ استراتژی در قطعه یافت نشد. خروج."
            exit 1
          fi
          AGG_FILE="aggregated/${STRAT}/${STRAT}_trades.enc"
          META_FLAG_PATH="aggregated/${STRAT}/metadata_injected.flag"
          ERROR_FILE="analysis_errors/${STRAT}_download_error.txt"
          mkdir -p /tmp/prep

          upload_error() {
            local msg="$1"
            echo "$msg" > /tmp/prep/error_msg.txt
            ERROR_SHA=$(gh api "repos/$THIRD_REPO/contents/$ERROR_FILE" -q '.sha' 2>/dev/null || echo "")
            if [ -n "$ERROR_SHA" ]; then
              gh api "repos/$THIRD_REPO/contents/$ERROR_FILE" \
                -X PUT \
                -F message="update download error for $STRAT" \
                -F content="$(base64 -w0 < /tmp/prep/error_msg.txt)" \
                -F sha="$ERROR_SHA" \
                -F branch="main" 2>&1 || echo "⚠️ نتوانستیم فایل خطا را آپلود کنیم."
            else
              gh api "repos/$THIRD_REPO/contents/$ERROR_FILE" \
                -X PUT \
                -F message="create download error for $STRAT" \
                -F content="$(base64 -w0 < /tmp/prep/error_msg.txt)" \
                -F branch="main" 2>&1 || echo "⚠️ نتوانستیم فایل خطا را آپلود کنیم."
            fi
          }

          echo "📥 در حال دریافت لینک دانلود مستقیم برای $STRAT ..."
          DOWNLOAD_URL=$(gh api "repos/$THIRD_REPO/contents/$AGG_FILE" -q '.download_url' 2>/tmp/prep/dl_error.log)
          DL_EXIT=$?
          if [ $DL_EXIT -ne 0 ] || [ -z "$DOWNLOAD_URL" ]; then
            echo "❌ دریافت لینک دانلود ناموفق بود."
            upload_error "Failed to get download_url for $AGG_FILE. gh exit code: $DL_EXIT. Error log: $(cat /tmp/prep/dl_error.log)"
            exit 1
          fi

          echo "⬇️ دانلود فایل از لینک مستقیم..."
          CURL="/usr/bin/curl"
          $CURL -L -o /tmp/prep/trades.enc "$DOWNLOAD_URL" 2>/tmp/prep/curl_error.log
          CURL_EXIT=$?
          if [ $CURL_EXIT -ne 0 ]; then
            echo "❌ دانلود فایل خام با شکست مواجه شد."
            upload_error "curl failed to download $DOWNLOAD_URL. Exit code: $CURL_EXIT. Error: $(cat /tmp/prep/curl_error.log)"
            exit 1
          fi

          if [ ! -s /tmp/prep/trades.enc ]; then
            echo "❌ فایل دانلود شده خالی است."
            upload_error "Downloaded file is empty for $AGG_FILE."
            exit 1
          fi

          echo "🔓 رمزگشایی فایل یکپارچه..."
          node -e "
            const crypto=require('crypto'),fs=require('fs');
            const pass=process.env.RESULTS_PASSWORD;
            const data=fs.readFileSync('/tmp/prep/trades.enc');
            const key=crypto.scryptSync(pass,'salt',32);
            const iv=data.slice(0,16),enc=data.slice(16);
            const decipher=crypto.createDecipheriv('aes-256-cbc',key,iv);
            const dec=Buffer.concat([decipher.update(enc),decipher.final()]);
            fs.writeFileSync('/tmp/prep/all_trades.json',dec);
          " 2>/tmp/prep/decrypt_error.log
          NODE_EXIT=$?
          if [ $NODE_EXIT -ne 0 ]; then
            echo "❌ رمزگشایی فایل شکست خورد."
            upload_error "Decryption failed for $AGG_FILE. Node exit code: $NODE_EXIT. Error: $(cat /tmp/prep/decrypt_error.log)"
            exit 1
          fi

          echo "🔍 بررسی پرچم metadata_injected برای $STRAT ..."
          FLAG_HTTP=$(gh api "repos/$THIRD_REPO/contents/$META_FLAG_PATH" -i 2>/dev/null | head -n1 | cut -d' ' -f2 || echo "")
          if [ "$FLAG_HTTP" = "200" ]; then
            echo "✅ پرچم metadata_injected موجود است — متادیتا قبلاً تزریق شده، مرحله injection رد می‌شود."
            echo "✅ فایل یکپارچه آماده شد (بدون نیاز به injection مجدد)."
            exit 0
          fi

          echo "ℹ️ پرچم metadata_injected یافت نشد — بررسی وجود metadata در فایل..."

          HAS_METADATA=$(node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('/tmp/prep/all_trades.json', 'utf8'));
            const hasMeta = data && typeof data === 'object' && !Array.isArray(data)
                            && 'metadata' in data && data.metadata !== null
                            && typeof data.metadata === 'object';
            console.log(hasMeta ? 'true' : 'false');
          " 2>/dev/null || echo "false")

          if [ "$HAS_METADATA" = "true" ]; then
            echo "✅ فایل یکپارچه قبلاً metadata دارد."
            echo "🚩 ذخیره پرچم metadata_injected..."
            FLAG_CONTENT=$(echo "injected" | base64 -w0)
            gh api "repos/$THIRD_REPO/contents/$META_FLAG_PATH" \
              -X PUT \
              -F message="mark metadata as injected for $STRAT" \
              -F content="$FLAG_CONTENT" \
              -F branch="main" 2>/dev/null || echo "⚠️ ذخیره پرچم ناموفق بود (ادامه می‌دهیم)."
            echo "✅ فایل یکپارچه آماده شد."
            exit 0
          fi

          echo "⚙️ فایل یکپارچه metadata ندارد (فرمت قدیمی) — در حال inject metadata..."

          META_FILE_REMOTE="strategies/${STRAT}/1.json"
          META_CONTENT=$(gh api "repos/$THIRD_REPO/contents/$META_FILE_REMOTE" \
            -H "Accept: application/vnd.github.v3.raw" 2>/dev/null || echo "")

          if [ -z "$META_CONTENT" ]; then
            echo "⚠️ فایل 1.json برای $STRAT در مخزن سوم یافت نشد."
            echo "   تلاش برای ساخت از روی فایل ${STRAT}.js ..."

            JS_FILE_REMOTE="strategies/${STRAT}.js"
            JS_CONTENT=$(gh api "repos/$THIRD_REPO/contents/$JS_FILE_REMOTE" \
              -H "Accept: application/vnd.github.v3.raw" 2>/dev/null || echo "")

            if [ -z "$JS_CONTENT" ]; then
              echo "❌ فایل استراتژی ${STRAT}.js نیز یافت نشد."
              echo "   ادامه با move_percents خالی (استراتژی simple_hybrid فرض می‌شود)."
              META_CONTENT='{"move_percents":[],"stop_loss_initial":-2.0,"max_move_percent":null}'
            else
              echo "$JS_CONTENT" > /tmp/prep/strat.js
              META_CONTENT=$(node -e "
                const fs = require('fs');
                const jsContent = fs.readFileSync('/tmp/prep/strat.js', 'utf8');
                let moveMatch = jsContent.match(/movePercent\s*:\s*\[(.*?)\]/s);
                let move_percents = [];
                if (moveMatch) {
                  let numbers = moveMatch[1].match(/[\d.]+/g);
                  if (numbers) move_percents = numbers.map(Number);
                }
                let slMatch = jsContent.match(/stopLossInitial\s*:\s*([\d.-]+)/);
                let stop_loss = slMatch ? parseFloat(slMatch[1]) : -2.0;
                let max_move = move_percents.length ? move_percents[move_percents.length-1] : null;
                console.log(JSON.stringify({
                  move_percents: move_percents,
                  stop_loss_initial: stop_loss,
                  max_move_percent: max_move
                }));
              " 2>/dev/null || echo '{"move_percents":[],"stop_loss_initial":-2.0,"max_move_percent":null}')
              echo "✅ متادیتا از فایل .js استخراج شد."
            fi
          fi

          echo "$META_CONTENT" > /tmp/prep/meta.json

          node -e "
            const fs = require('fs');
            const trades = JSON.parse(fs.readFileSync('/tmp/prep/all_trades.json', 'utf8'));
            const meta = JSON.parse(fs.readFileSync('/tmp/prep/meta.json', 'utf8'));
            const tradeList = Array.isArray(trades) ? trades : trades.trades;
            const output = {
              trades: tradeList,
              metadata: {
                move_percents: meta.move_percents || [],
                stop_loss_initial: meta.stop_loss_initial || -2.0,
                max_move_percent: meta.max_move_percent || null
              }
            };
            fs.writeFileSync('/tmp/prep/all_trades.json', JSON.stringify(output));
          " 2>/tmp/prep/inject_error.log
          INJECT_EXIT=$?
          if [ $INJECT_EXIT -ne 0 ]; then
            echo "❌ خطا در inject metadata: $(cat /tmp/prep/inject_error.log)"
            exit 1
          fi
          echo "✅ metadata با موفقیت به فایل یکپارچه اضافه شد."

          echo "🚩 ذخیره پرچم metadata_injected برای $STRAT..."
          FLAG_CONTENT=$(echo "injected" | base64 -w0)
          gh api "repos/$THIRD_REPO/contents/$META_FLAG_PATH" \
            -X PUT \
            -F message="mark metadata as injected for $STRAT" \
            -F content="$FLAG_CONTENT" \
            -F branch="main" 2>/dev/null || echo "⚠️ ذخیره پرچم ناموفق بود (ادامه می‌دهیم)."

          echo "✅ فایل یکپارچه آماده شد."

      - name: 2. راه‌اندازی پایتون و نصب کتابخانه‌ها
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: نصب کتابخانه‌های پایتون
        run: pip install pandas requests

      # ================================================================
      # استپ ۳ (بازنویسی‌شده): اجرای همه‌ی ترکیبات قطعه، بدون آپلود تکی
      # هیچ gh api ای داخل حلقه نیست. همه‌چیز محلی جمع می‌شود و در پایان
      # حلقه فقط در یک یا دو درخواست API آپلود می‌شود.
      # ================================================================
      - name: 3. اجرای ماژول تحلیلی برای هر آیتم در قطعه (بدون آپلود تکی)
        id: execute_batch
        run: |
          mkdir -p /tmp/results /tmp/errors
          echo "[]" > /tmp/done_items.json
          echo "[]" > /tmp/failed_items.json

          CHUNK_JSON=$(cat /tmp/chunk.json)
          LENGTH=$(echo "$CHUNK_JSON" | jq length)
          echo "🚀 شروع پردازش $LENGTH ترکیب در job ${{ matrix.chunk_index }} (بدون تماس API داخل حلقه)"

          for i in $(seq 0 $((LENGTH-1))); do
            ITEM=$(echo "$CHUNK_JSON" | jq -c ".[$i]")
            MODULE=$(echo "$ITEM"   | jq -r '.module')
            STRAT=$(echo "$ITEM"    | jq -r '.strat')
            COIN=$(echo "$ITEM"     | jq -r '.coin')
            SAFE_COIN=$(echo "$COIN" | tr '+' '_')
            INTERVAL=$(echo "$ITEM" | jq -r '.interval')
            MODEL=$(echo "$ITEM"    | jq -r '.model')
            CHUNK_START="${{ github.event.inputs.chunk_start }}"
            CHUNK_END="${{ github.event.inputs.chunk_end }}"

            echo "   📊 پردازش ترکیب: $STRAT, $COIN, $INTERVAL, $MODEL"
            CMD="python modules/${MODULE}.py \
              --trades-json /tmp/prep/all_trades.json \
              --news-dir data/news \
              --strategy-folder $STRAT \
              --coin $COIN \
              --interval $INTERVAL \
              --model $MODEL"
            if [ -n "$CHUNK_START" ] && [ -n "$CHUNK_END" ]; then
              CMD="$CMD --chunk-start $CHUNK_START --chunk-end $CHUNK_END"
            fi
            : > /tmp/item_output.log
            set -o pipefail
            eval $CMD 2>&1 | tee /tmp/item_output.log
            EXIT_CODE=${PIPESTATUS[0]}
            set +o pipefail

            if [ $EXIT_CODE -ne 0 ]; then
              echo "   ❌ خطا در اجرای ماژول برای ترکیب $COIN $INTERVAL $MODEL (پردازش بقیه‌ی قطعه ادامه می‌یابد)"
              SAFE_STRAT=$(echo "$STRAT" | sed 's/[^a-zA-Z0-9._-]/_/g')
              ERR_NAME="error_${MODULE}_${SAFE_COIN}_${SAFE_STRAT}_${INTERVAL}_${MODEL}.log"
              cp /tmp/item_output.log "/tmp/errors/${ERR_NAME}"

              jq --arg m "$MODULE" --arg s "$STRAT" --arg c "$COIN" --arg iv "$INTERVAL" --arg mo "$MODEL" \
                '. + [{"module":$m,"strat":$s,"coin":$c,"interval":$iv,"model":$mo}]' \
                /tmp/failed_items.json > /tmp/failed_items.json.tmp && mv /tmp/failed_items.json.tmp /tmp/failed_items.json
              continue
            fi

            OUTPUT_FILE="${STRAT}_${COIN}_${INTERVAL}_${MODEL}.csv"
            if [ -f "$OUTPUT_FILE" ]; then
              DEST_DIR="/tmp/results/${MODULE}/${STRAT}/${SAFE_COIN}"
              mkdir -p "$DEST_DIR"
              mv "$OUTPUT_FILE" "$DEST_DIR/${INTERVAL}_${MODEL}.csv"

              jq --arg m "$MODULE" --arg s "$STRAT" --arg c "$COIN" --arg iv "$INTERVAL" --arg mo "$MODEL" \
                '. + [{"module":$m,"strat":$s,"coin":$c,"interval":$iv,"model":$mo}]' \
                /tmp/done_items.json > /tmp/done_items.json.tmp && mv /tmp/done_items.json.tmp /tmp/done_items.json
            else
              echo "   ⚠️ فایل خروجی $OUTPUT_FILE وجود ندارد! به‌عنوان شکست ثبت می‌شود."
              jq --arg m "$MODULE" --arg s "$STRAT" --arg c "$COIN" --arg iv "$INTERVAL" --arg mo "$MODEL" \
                '. + [{"module":$m,"strat":$s,"coin":$c,"interval":$iv,"model":$mo}]' \
                /tmp/failed_items.json > /tmp/failed_items.json.tmp && mv /tmp/failed_items.json.tmp /tmp/failed_items.json
            fi
          done

          DONE_COUNT=$(jq length /tmp/done_items.json)
          FAILED_COUNT=$(jq length /tmp/failed_items.json)
          echo "✅ موفق: $DONE_COUNT   ❌ ناموفق: $FAILED_COUNT"
          echo "done_count=$DONE_COUNT" >> $GITHUB_OUTPUT
          echo "failed_count=$FAILED_COUNT" >> $GITHUB_OUTPUT

      # ================================================================
      # استپ ۴ (جدید): آپلود یک‌جای نتایج این قطعه — حداکثر ۲ تماس API
      # برای کل قطعه (یکی برای نتایج، یکی برای خطاها)، نه per-item.
      # نام و فرمت خروجی (chunk_X_runid.enc حاوی tar.gz) دقیقاً همان چیزی
      # است که job های golden و portfolios از پوشه‌ی batch_results انتظار دارند.
      # ================================================================
      - name: 4. آپلود یک‌جای نتایج و خطاهای قطعه (batch upload)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD || secrets.DATA_PASSWORD }}
        run: |
          upload_with_retry() {
            local dest="$1"
            local file_b64="$2"
            local msg="$3"
            local retry=0
            local max=30
            while [ $retry -lt $max ]; do
              if gh api "repos/$THIRD_REPO/contents/$dest" \
                -X PUT \
                -F message="$msg" \
                -F content="@$file_b64" \
                -F branch="main" >/tmp/upload_resp.json 2>&1; then
                echo "   ✅ آپلود موفق: $dest"
                return 0
              else
                retry=$((retry+1))
                echo "   ⚠️ تلاش $retry از $max برای $dest ناموفق بود. پاسخ: $(cat /tmp/upload_resp.json)"
                sleep $(( (RANDOM % 8) + 2 ))
              fi
            done
            echo "   ❌ آپلود $dest پس از $max تلاش ناموفق ماند."
            return 1
          }

          RUN_TAG="chunk_${{ matrix.chunk_index }}_${{ github.run_id }}_${{ github.run_attempt }}"
          UPLOAD_FAILED=0

          # --- نتایج موفق: یک tar.gz، رمزنگاری‌شده، یک آپلود ---
          if [ -d /tmp/results ] && [ "$(find /tmp/results -type f | wc -l)" -gt 0 ]; then
            tar czf /tmp/results_bundle.tar.gz -C /tmp/results .
            node -e "
              const crypto=require('crypto'),fs=require('fs');
              const pass=process.env.RESULTS_PASSWORD;
              const data=fs.readFileSync('/tmp/results_bundle.tar.gz');
              const key=crypto.scryptSync(pass,'salt',32);
              const iv=crypto.randomBytes(16);
              const cipher=crypto.createCipheriv('aes-256-cbc',key,iv);
              const enc=Buffer.concat([cipher.update(data),cipher.final()]);
              fs.writeFileSync('/tmp/results_bundle.enc', Buffer.concat([iv,enc]));
            "
            base64 -w0 < /tmp/results_bundle.enc > /tmp/results_bundle_b64.txt
            DEST="batch_results/${RUN_TAG}.enc"
            upload_with_retry "$DEST" "/tmp/results_bundle_b64.txt" "batch results ${RUN_TAG}" || UPLOAD_FAILED=1
          else
            echo "ℹ️ هیچ خروجی موفقی برای آپلود در این قطعه وجود ندارد."
          fi

          # --- خطاها: یک tar.gz، رمزنگاری‌شده، یک آپلود ---
          if [ -d /tmp/errors ] && [ "$(find /tmp/errors -type f | wc -l)" -gt 0 ]; then
            tar czf /tmp/errors_bundle.tar.gz -C /tmp/errors .
            node -e "
              const crypto=require('crypto'),fs=require('fs');
              const pass=process.env.RESULTS_PASSWORD;
              const data=fs.readFileSync('/tmp/errors_bundle.tar.gz');
              const key=crypto.scryptSync(pass,'salt',32);
              const iv=crypto.randomBytes(16);
              const cipher=crypto.createCipheriv('aes-256-cbc',key,iv);
              const enc=Buffer.concat([cipher.update(data),cipher.final()]);
              fs.writeFileSync('/tmp/errors_bundle.enc', Buffer.concat([iv,enc]));
            "
            base64 -w0 < /tmp/errors_bundle.enc > /tmp/errors_bundle_b64.txt
            DEST="analysis_errors/${RUN_TAG}_errors.enc"
            upload_with_retry "$DEST" "/tmp/errors_bundle_b64.txt" "batch errors ${RUN_TAG}" || true
          fi

          if [ "$UPLOAD_FAILED" -eq 1 ]; then
            echo "❌ آپلود نتایج موفق این قطعه شکست خورد — این job fail می‌شود تا cleanup این ترکیبات را به‌اشتباه done علامت نزند."
            exit 1
          fi

      # ================================================================
      # استپ ۵ (جدید): ذخیره‌ی لیست ترکیبات «موفق این قطعه» به‌صورت artifact
      # هیچ تماس API ندارد. این جایگزین حذف per-item از فایل مشترک است و
      # کاملاً race-free است چون هر job فقط artifact خودش را می‌نویسد.
      # ================================================================
      - name: 5. آپلود artifact لیست ترکیبات موفق این قطعه
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: done-items-${{ matrix.chunk_index }}-${{ github.run_id }}
          path: /tmp/done_items.json
          retention-days: 1

  # ================================================================
  # cleanup (بازنویسی‌شده): به‌جای حذف بر اساس شمارش (که با شکست بخشی از
  # آیتم‌ها هماهنگ نیست)، فقط دقیقاً همان ترکیباتی که در artifact های
  # done-items-* آمده‌اند حذف می‌شوند. این کار race-free است چون هر بسته
  # artifact مستقل خودش را نوشته و اینجا فقط یک‌بار، در یک job، با یک GET
  # و یک PUT، merge و حذف انجام می‌شود.
  # ================================================================
  cleanup:
    runs-on: ubuntu-latest
    needs: [generate-matrix, batch]
    if: ${{ always() && needs.batch.result == 'success' && inputs.analysis_module == 'fixed_batch' && needs.generate-matrix.outputs.empty == 'false' }}
    steps:
      - name: دانلود همه‌ی artifact های done-items این run
        uses: actions/download-artifact@v4
        with:
          pattern: done-items-*-${{ github.run_id }}
          path: /tmp/done_artifacts
          merge-multiple: false

      - name: ادغام لیست‌های done و حذف دقیق همان ترکیبات از all_combinations.json
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          CURL="/usr/bin/curl"

          # ادغام همه‌ی فایل‌های done_items.json در یک آرایه‌ی واحد
          find /tmp/done_artifacts -name 'done_items.json' -print0 \
            | xargs -0 jq -s 'add' > /tmp/merged_done.json 2>/dev/null || echo "[]" > /tmp/merged_done.json
          [ -s /tmp/merged_done.json ] || echo "[]" > /tmp/merged_done.json

          MERGED_COUNT=$(jq length /tmp/merged_done.json)
          echo "[DEBUG] تعداد کل ترکیبات موفقِ این run (از همه‌ی بسته‌ها): $MERGED_COUNT"

          if [ "$MERGED_COUNT" -eq 0 ]; then
            echo "ℹ️ هیچ ترکیب موفقی برای حذف وجود ندارد. خروج بدون تغییر فایل."
            exit 0
          fi

          # تلاش با optimistic locking: اگر sha هنگام PUT منقضی شده بود
          # (مثلاً به‌خاطر اضافه‌شدن آیتم جدید توسط فرآیند دیگر)، دوباره
          # فایل را می‌خوانیم، دوباره فیلتر می‌کنیم و retry می‌کنیم.
          RETRY=0
          MAX=15
          while [ $RETRY -lt $MAX ]; do
            $CURL -s -o /tmp/current.json \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3.raw" \
              "https://api.github.com/repos/$THIRD_REPO/contents/all_combinations.json?t=$(date +%s)"
            if [ ! -s /tmp/current.json ] || ! jq empty /tmp/current.json 2>/dev/null; then
              echo "ERROR: دریافت فایل فعلی ناموفق بود."; exit 1
            fi

            SHA=$($CURL -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/$THIRD_REPO/contents/all_combinations.json" | jq -r '.sha')
            if [ -z "$SHA" ] || [ "$SHA" = "null" ]; then
              echo "ERROR: دریافت SHA ناموفق بود."; exit 1
            fi

            # حذف دقیق آیتم‌هایی که در merged_done.json هستند (تطبیق روی همه‌ی فیلدها)
            jq -s '
              .[0] as $current | .[1] as $done
              | $current - ($current | map(select(. as $item | $done | any(. == $item))))
            ' /tmp/current.json /tmp/merged_done.json > /tmp/new_content.json

            BEFORE=$(jq length /tmp/current.json)
            AFTER=$(jq length /tmp/new_content.json)
            echo "[DEBUG] قبل از حذف: $BEFORE  بعد از حذف: $AFTER  (حذف‌شده: $((BEFORE-AFTER)))"

            base64 -w0 /tmp/new_content.json > /tmp/new_content_base64.txt
            cat > /tmp/payload.json <<EOF
          {
            "message": "remove $((BEFORE-AFTER)) processed combinations (run ${{ github.run_id }})",
            "content": "$(cat /tmp/new_content_base64.txt)",
            "sha": "$SHA",
            "branch": "main"
          }
          EOF

            HTTP_CODE=$($CURL -s -X PUT -o /tmp/upload_response.txt -w "%{http_code}" \
              -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/json" \
              --data-binary @/tmp/payload.json \
              "https://api.github.com/repos/$THIRD_REPO/contents/all_combinations.json")

            if [ "$HTTP_CODE" -eq 200 ] || [ "$HTTP_CODE" -eq 201 ]; then
              echo "✅ $((BEFORE-AFTER)) ترکیب پردازش‌شده با موفقیت حذف شدند."
              break
            elif [ "$HTTP_CODE" -eq 409 ] || [ "$HTTP_CODE" -eq 422 ]; then
              echo "⚠️ تداخل sha (کد $HTTP_CODE) — فایل توسط فرآیند دیگری تغییر کرده. تلاش مجدد..."
              RETRY=$((RETRY+1))
              sleep $(( (RANDOM % 5) + 2 ))
              continue
            else
              echo "ERROR: آپلود ناموفق ($HTTP_CODE)"; cat /tmp/upload_response.txt; exit 1
            fi
          done

          if [ $RETRY -ge $MAX ]; then
            echo "ERROR: پس از $MAX تلاش، حذف به‌خاطر تداخل sha انجام نشد."
            exit 1
          fi

          rm -f /tmp/current.json /tmp/new_content.json /tmp/new_content_base64.txt /tmp/payload.json /tmp/upload_response.txt

      - name: فراخوانی مجدد loop_analysis.yml
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/actions/workflows/loop_analysis.yml/dispatches -X POST -f ref="main"

  golden:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    if: ${{ inputs.analysis_module == 'golden' }}
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: بارگذاری تمام نتایج بسته‌ها (batch_results) از مخزن سوم
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD || secrets.DATA_PASSWORD }}
        run: |
          mkdir -p /tmp/all_batches
          BATCH_FILES=$(gh api "repos/$THIRD_REPO/contents/batch_results" --jq '.[].name' 2>/dev/null || echo "")
          for BF in $BATCH_FILES; do
            gh api "repos/$THIRD_REPO/contents/batch_results/$BF" --jq '.content' | base64 -d > /tmp/all_batches/$BF
            node -e "
              const crypto=require('crypto'),fs=require('fs');
              const pass=process.env.RESULTS_PASSWORD;
              const data=fs.readFileSync('/tmp/all_batches/$BF');
              const key=crypto.scryptSync(pass,'salt',32);
              const iv=data.slice(0,16),enc=data.slice(16);
              const decipher=crypto.createDecipheriv('aes-256-cbc',key,iv);
              const dec=Buffer.concat([decipher.update(enc),decipher.final()]);
              fs.writeFileSync('/tmp/all_batches/${BF%.enc}.tar.gz',dec);
            "
            tar -xzf "/tmp/all_batches/${BF%.enc}.tar.gz" -C /tmp/all_batches
          done

      - name: 2. اجرای golden.py با داده‌های تجمیع‌شده
        id: execute_golden
        env:
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD || secrets.DATA_PASSWORD }}
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          python modules/golden.py --results-base /tmp/all_batches --returns-cache /tmp/returns_cache.json --news-pickle /tmp/news.pkl --output-dir /tmp/golden_output --mode both

      - name: 3. آپلود نتایج golden به مخزن سوم (با skip if exists)
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD || secrets.DATA_PASSWORD }}
        run: |
          for f in /tmp/golden_output/*.csv; do
            [ -f "$f" ] || continue
            node -e "
              const crypto=require('crypto'),fs=require('fs');
              const pass=process.env.RESULTS_PASSWORD;
              const data=fs.readFileSync('$f');
              const key=crypto.scryptSync(pass,'salt',32);
              const iv=crypto.randomBytes(16);
              const cipher=crypto.createCipheriv('aes-256-cbc',key,iv);
              const enc=Buffer.concat([cipher.update(data),cipher.final()]);
              fs.writeFileSync('$f.enc', Buffer.concat([iv,enc]));
            "
            DEST="analysis_results/golden/$(basename $f).enc"
            set +e
            HTTP_CODE=$(gh api "repos/$THIRD_REPO/contents/$DEST" -i 2>/dev/null | head -n 1 | cut -d' ' -f2)
            set -e
            if [ "$HTTP_CODE" != "200" ]; then
              gh api "repos/$THIRD_REPO/contents/$DEST" \
                -X PUT \
                -F message="upload golden output" \
                -F content="$(base64 -w0 < "$f.enc")" \
                -F branch="main"
            fi
          done

      - name: فراخوانی مجدد loop_analysis.yml
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/actions/workflows/loop_analysis.yml/dispatches -X POST -f ref="main"

  portfolios:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    if: ${{ inputs.analysis_module == 'portfolios' }}
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: بارگذاری نتایج تمام بسته‌ها (مانند golden)
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD || secrets.DATA_PASSWORD }}
        run: |
          mkdir -p /tmp/all_batches_port
          BATCH_FILES=$(gh api "repos/$THIRD_REPO/contents/batch_results" --jq '.[].name' 2>/dev/null || echo "")
          for BF in $BATCH_FILES; do
            gh api "repos/$THIRD_REPO/contents/batch_results/$BF" --jq '.content' | base64 -d > /tmp/all_batches_port/$BF
            node -e "
              const crypto=require('crypto'),fs=require('fs');
              const pass=process.env.RESULTS_PASSWORD;
              const data=fs.readFileSync('/tmp/all_batches_port/$BF');
              const key=crypto.scryptSync(pass,'salt',32);
              const iv=data.slice(0,16),enc=data.slice(16);
              const decipher=crypto.createDecipheriv('aes-256-cbc',key,iv);
              const dec=Buffer.concat([decipher.update(enc),decipher.final()]);
              fs.writeFileSync('/tmp/all_batches_port/${BF%.enc}.tar.gz',dec);
            "
            tar -xzf "/tmp/all_batches_port/${BF%.enc}.tar.gz" -C /tmp/all_batches_port
          done

      - name: اجرای portfolios.py با منطق افزایشی (checkpoint)
        run: |
          python modules/portfolios.py --results-base /tmp/all_batches_port --returns-cache /tmp/returns_cache.json --output-dir /tmp/portfolios_output --top 15

      - name: آپلود نتایج portfolios (با skip if exists)
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD || secrets.DATA_PASSWORD }}
        run: |
          for f in /tmp/portfolios_output/*.csv; do
            [ -f "$f" ] || continue
            node -e "
              const crypto=require('crypto'),fs=require('fs');
              const pass=process.env.RESULTS_PASSWORD;
              const data=fs.readFileSync('$f');
              const key=crypto.scryptSync(pass,'salt',32);
              const iv=crypto.randomBytes(16);
              const cipher=crypto.createCipheriv('aes-256-cbc',key,iv);
              const enc=Buffer.concat([cipher.update(data),cipher.final()]);
              fs.writeFileSync('$f.enc', Buffer.concat([iv,enc]));
            "
            DEST="analysis_results/portfolios/$(basename $f).enc"
            set +e
            HTTP_CODE=$(gh api "repos/$THIRD_REPO/contents/$DEST" -i 2>/dev/null | head -n 1 | cut -d' ' -f2)
            set -e
            if [ "$HTTP_CODE" != "200" ]; then
              gh api "repos/$THIRD_REPO/contents/$DEST" \
                -X PUT \
                -F message="upload portfolios output" \
                -F content="$(base64 -w0 < "$f.enc")" \
                -F branch="main"
            fi
          done

      - name: فراخوانی مجدد loop_analysis.yml
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/actions/workflows/loop_analysis.yml/dispatches -X POST -f ref="main"

  trigger-loop:
    needs: [batch, cleanup, golden, portfolios]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: فراخوانی loop_analysis.yml
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/actions/workflows/loop_analysis.yml/dispatches -X POST -f ref="main"
