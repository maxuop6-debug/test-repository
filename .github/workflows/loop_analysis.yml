            OLD_COUNT="${{ steps.strat_count.outputs.count }}"
            echo "📊 تعداد استراتژی‌ها: قبل=$OLD_COUNT بعد=$NEW_COUNT"
            if [ "$NEW_COUNT" -gt "$OLD_COUNT" ]; then
              echo "⚠️ استراتژی جدیدی حین اجرای portfolios یکپارچه شد. فعال‌سازی پرچم وقفه..."
              echo "interrupt" | base64 -w0 > /tmp/flag.txt
              gh api "repos/$THIRD_REPO/contents/interrupt.flag" -X PUT -F message="interrupt: new strategy aggregated during portfolios" -F content="@/tmp/flag.txt" -F branch="main" 2>&1 || true
            else
              echo "ℹ️ استراتژی جدیدی یکپارچه نشده. ادامه به‌ترتیب اولویت."
            fi
          } >> logs/run.log 2>&1

      - name: فراخوانی مجدد loop_analysis.yml پس از اتمام portfolios
        if: steps.status_check.outputs.should_run == 'true'
