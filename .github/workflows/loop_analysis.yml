  # ============================================================
  # Job 7: ذخیره نهایی لاگ (همیشه اجرا می‌شود، مستقل از موفقیت/شکست)
  # ============================================================
  save-logs:
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 0
      - name: commit و push فایل لاگ واحد
        run: |
          cd $GITHUB_WORKSPACE
          mkdir -p logs
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -f logs/run.log
          if ! git diff --cached --quiet; then
            git commit -m "final update logs (run ${{ github.run_id }})" --allow-empty
            git pull --rebase origin main || true
            git push origin main || true
          else
            echo "هیچ تغییری در لاگ وجود ندارد." >> logs/run.log 2>&1
            git add -f logs/run.log
            git commit -m "final logs (run ${{ github.run_id }})" --allow-empty || true
            git push origin main || true
          fi
