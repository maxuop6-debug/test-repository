name: Loop Analysis Workflow

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: loop-runner
  cancel-in-progress: false

jobs:
  # ============================================================
  # Job 0: ЩҫШ§Ъ© Ъ©ШұШҜЩҶ ЩҒШ§ЫҢЩ„ Щ„Ш§ЪҜ ШҜШұ Ш§ШЁШӘШҜШ§ЫҢ Ш§Ш¬ШұШ§
  # ============================================================
  init-logs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
      - name: Clear log file and commit
        run: |
          mkdir -p logs
          echo -n "" > logs/run.log
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -f logs/run.log
          git commit -m "clear logs for run ${{ github.run_id }}" || echo "No changes"
          git push origin main || true

  # ============================================================
  # Job 1: ШЁШұШұШіЫҢ ЩҫШұЪҶЩ… ЩҲЩӮЩҒЩҮ
  # ============================================================
  check-interrupt:
    needs: init-logs
    runs-on: ubuntu-latest
    outputs:
      force_fixed: ${{ steps.check.outputs.force_fixed }}
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          ref: main
      - name: ШЁШұШұШіЫҢ ЩҫШұЪҶЩ… ЩҲЩӮЩҒЩҮ
        id: check
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          {
            echo "рҹ”Қ ШЁШұШұШіЫҢ ЩҫШұЪҶЩ…вҖҢЩҮШ§ЫҢ ЩҲЩӮЩҒЩҮ..."
            HTTP_CODE=$(gh api "repos/$THIRD_REPO/contents/interrupt.flag" -i 2>/dev/null | head -n 1 | cut -d' ' -f2)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "вҡ пёҸ ЩҫШұЪҶЩ… ЩҲЩӮЩҒЩҮ ЫҢШ§ЩҒШӘ ШҙШҜ! ШӯШ°ЩҒ Щ…ЫҢвҖҢШҙЩҲШҜ..."
              SHA=$(gh api "repos/$THIRD_REPO/contents/interrupt.flag" -q '.sha')
              gh api "repos/$THIRD_REPO/contents/interrupt.flag" -X DELETE -F message="clear interrupt" -F sha="$SHA" -F branch="main"
              echo "force_fixed=true" >> $GITHUB_OUTPUT
            else
              echo "force_fixed=false" >> $GITHUB_OUTPUT
            fi
          } >> logs/run.log 2>&1
      - name: Save logs after job
        if: always()
        run: |
          cd $GITHUB_WORKSPACE
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -f logs/run.log
          git commit -m "update logs after check-interrupt (run ${{ github.run_id }})" || echo "No changes"
          git push origin main || true

  # ============================================================
  # Job 2: ЫҢЪ©ЩҫШ§ШұЪҶЩҮвҖҢШіШ§ШІЫҢ ЩҶШӘШ§ЫҢШ¬ ШЁЪ©вҖҢШӘШіШӘ (ШЁШ§ clone Щ…Ш®ШІЩҶ ШіЩҲЩ… ЩҲ Ш§ШіШӘЩҒШ§ШҜЩҮ Щ…ШӯЩ„ЫҢ)
  # ============================================================
  aggregate-results:
    needs: check-interrupt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: 0. ЩҶШөШЁ jq
        run: |
          if ! command -v jq &> /dev/null; then
            echo "рҹ“Ұ jq ЫҢШ§ЩҒШӘ ЩҶШҙШҜ. ШҜШұ ШӯШ§Щ„ ЩҶШөШЁ..."
            sudo apt-get update -qq && sudo apt-get install -y -qq jq
            if ! command -v jq &> /dev/null; then
              echo "вқҢ Ш®Ш·Ш§ЫҢ ШЁШӯШұШ§ЩҶЫҢ: ЩҶШөШЁ jq ЩҶШ§Щ…ЩҲЩҒЩӮ ШЁЩҲШҜ."
              exit 1
            fi
          fi
          echo "вң… jq ШўЩ…Ш§ШҜЩҮ Ш§ШіШӘ."

      - name: 0.5. ЩҫШ§Ъ©ШіШ§ШІЫҢ ЩҒШ¶Ш§ЫҢ Щ…ЩҲЩӮШӘ
        run: |
          rm -rf /tmp/agg_* /tmp/third_repo 2>/dev/null || true
          echo "вң… ЩҫШ§Ъ©ШіШ§ШІЫҢ ЩҒШ¶Ш§ЫҢ Щ…ЩҲЩӮШӘ Ш§ЩҶШ¬Ш§Щ… ШҙШҜ."

      - name: Clone third repository (shallow clone)
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          git clone --depth 1 https://x-access-token:${GH_TOKEN}@github.com/${THIRD_REPO}.git /tmp/third_repo
          cd /tmp/third_repo
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          echo "вң… Щ…Ш®ШІЩҶ ШіЩҲЩ… ШЁШ§ Щ…ЩҲЩҒЩӮЫҢШӘ clone ШҙШҜ."

      - name: ЫҢЪ©ЩҫШ§ШұЪҶЩҮвҖҢШіШ§ШІЫҢ ЩҶШӘШ§ЫҢШ¬ ШЁЪ©вҖҢШӘШіШӘ (ШЁШ§ Ш®ЩҲШ§ЩҶШҜЩҶ Щ…ШӯЩ„ЫҢ ЩҒШ§ЫҢЩ„вҖҢЩҮШ§)
        env:
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD || secrets.DATA_PASSWORD }}
        run: |
          set +e
          {
            echo "=============================================="
            echo "   рҹ”„ ШҙШұЩҲШ№ ЫҢЪ©ЩҫШ§ШұЪҶЩҮвҖҢШіШ§ШІЫҢ ЩҶШӘШ§ЫҢШ¬ ШЁЪ©вҖҢШӘШіШӘ (ШЁШ§ clone Щ…ШӯЩ„ЫҢ)"
            echo "=============================================="
            echo ""
            echo "0- ЩҲШ¶Ш№ЫҢШӘ Щ…ЩҶШ§ШЁШ№ ШіЫҢШіШӘЩ…:"
            df -h /tmp | tail -1
            free -h | grep Mem
            echo ""
            echo "1- ШҜШұЫҢШ§ЩҒШӘ Щ„ЫҢШіШӘ Ш§ШіШӘШұШ§ШӘЪҳЫҢвҖҢЩҮШ§ Ш§ШІ Щ…Ш®ШІЩҶ ШіЩҲЩ… (ШЁШ§ Ш§ШіЪ©ЩҶ Щ…ШӯЩ„ЫҢ)..."
            cd /tmp/third_repo
            STRATEGIES_LIST=$(find backtest_results -maxdepth 1 -type d -printf '%f\n' | tail -n +2 | sort -u)
            if [ -z "$STRATEGIES_LIST" ]; then
              echo "вҡ пёҸ ЩҮЫҢЪҶ Ш§ШіШӘШұШ§ШӘЪҳЫҢ ШҜШұ backtest_results ЫҢШ§ЩҒШӘ ЩҶШҙШҜ."
              exit 0
            fi
            echo "   Ш§ШіШӘШұШ§ШӘЪҳЫҢвҖҢЩҮШ§ЫҢ ЫҢШ§ЩҒШӘ ШҙШҜЩҮ: $STRATEGIES_LIST"
            echo ""
            for STRAT in $STRATEGIES_LIST; do
              echo "=============================================="
              echo "   рҹ“Ҡ ЩҫШұШҜШ§ШІШҙ Ш§ШіШӘШұШ§ШӘЪҳЫҢ: $STRAT"
              echo "=============================================="
              AGG_FILE="aggregated/${STRAT}/${STRAT}_trades.enc"
              STATUS_FILE="aggregated/${STRAT}/aggregation_status.json"
              mkdir -p "/tmp/agg_${STRAT}"
              echo "0- ШЁШұШұШіЫҢ ЩҫШұЪҶЩ… ЩҲШ¶Ш№ЫҢШӘ ЫҢЪ©ЩҫШ§ШұЪҶЩҮвҖҢШіШ§ШІЫҢ ШЁШұШ§ЫҢ $STRAT ..."
              if [ -f "/tmp/third_repo/$STATUS_FILE" ]; then
                STATUS_CONTENT=$(cat "/tmp/third_repo/$STATUS_FILE")
                echo "   рҹ“„ ЩҫШұЪҶЩ… ЩҲШ¶Ш№ЫҢШӘ ЫҢШ§ЩҒШӘ ШҙШҜ: $STATUS_CONTENT"
                STATUS=$(echo "$STATUS_CONTENT" | jq -r '.status' 2>/dev/null)
                if [ "$STATUS" = "cleaning" ]; then
                  echo "   вҡ пёҸ ЩҒШұШўЫҢЩҶШҜ ЩӮШЁЩ„ЫҢ ЩҶШ§ЩӮШө Щ…Ш§ЩҶШҜЩҮ. ЩҒЩӮШ· ЩҫШ§Ъ©ШіШ§ШІЫҢ ЩҒШ§ЫҢЩ„вҖҢЩҮШ§ЫҢ ЩӮШҜЫҢЩ…ЫҢ Ш§ЩҶШ¬Ш§Щ… Щ…ЫҢвҖҢШҙЩҲШҜ."
                  FILES_TO_DELETE=$(echo "$STATUS_CONTENT" | jq -r '.files_to_delete[]' 2>/dev/null)
                  echo "   рҹ—‘пёҸ ШҙШұЩҲШ№ ЩҫШ§Ъ©ШіШ§ШІЫҢ ЩҒШ§ЫҢЩ„вҖҢЩҮШ§ЫҢ ШЁШ§ЩӮЫҢвҖҢЩ…Ш§ЩҶШҜЩҮ..."
                  for ENC_PATH in $FILES_TO_DELETE; do
                    echo "   ШӘЩ„Ш§Шҙ ШЁШұШ§ЫҢ ШӯШ°ЩҒ $ENC_PATH ..."
                    rm -f "/tmp/third_repo/$ENC_PATH" 2>/dev/null
                    echo "      вң… ШӯШ°ЩҒ Щ…ЩҲЩҒЩӮ"
                  done
                  echo '{"status": "completed"}' > "/tmp/agg_${STRAT}/status.json"
                  cp "/tmp/agg_${STRAT}/status.json" "/tmp/third_repo/$STATUS_FILE"
                  rm -rf "/tmp/agg_${STRAT}"
                  continue
                elif [ "$STATUS" = "completed" ]; then
                  echo "   вң… ЩҒШұШўЫҢЩҶШҜ ЩӮШЁЩ„ЫҢ Ъ©Ш§Щ…Щ„ ШЁЩҲШҜЩҮ. ЩҫШ§Ъ©ШіШ§ШІЫҢ ЩҫШұЪҶЩ… ЩҲШ¶Ш№ЫҢШӘ..."
                  rm -f "/tmp/third_repo/$STATUS_FILE"
                  echo "   в„№пёҸ ЩҮЩ…ЩҮ ЪҶЫҢШІ Щ…ШұШӘШЁ Ш§ШіШӘ. Ш§ШҜШ§Щ…ЩҮЩ” Ъ©Ш§Шұ Ш№Ш§ШҜЫҢ..."
                fi
              else
                echo "   в„№пёҸ ЩҫШұЪҶЩ… ЩҲШ¶Ш№ЫҢШӘЫҢ ЩҲШ¬ЩҲШҜ ЩҶШҜШ§ШұШҜ. ШҙШұЩҲШ№ ЩҒШұШўЫҢЩҶШҜ Ш№Ш§ШҜЫҢ..."
              fi
              echo ""
              echo "2- ШЁШұШұШіЫҢ ЩҲШ¬ЩҲШҜ ЩҒШ§ЫҢЩ„ ЫҢЪ©ЩҫШ§ШұЪҶЩҮ ЩӮШЁЩ„ЫҢ ШЁШұШ§ЫҢ $STRAT ..."
              EXISTING_TRADES_FILE="/tmp/agg_${STRAT}/existing_trades.json"
              echo "[]" > "$EXISTING_TRADES_FILE"
              if [ -f "/tmp/third_repo/$AGG_FILE" ]; then
                echo "   рҹ“Ҙ ЩҒШ§ЫҢЩ„ ЫҢЪ©ЩҫШ§ШұЪҶЩҮ ЩӮШЁЩ„ЫҢ ЩҲШ¬ЩҲШҜ ШҜШ§ШұШҜ. ШұЩ…ШІЪҜШҙШ§ЫҢЫҢ..."
                node -e "
                  const crypto=require('crypto'),fs=require('fs');
                  const pass=process.env.RESULTS_PASSWORD;
                  const data=fs.readFileSync('/tmp/third_repo/$AGG_FILE');
                  const key=crypto.scryptSync(pass,'salt',32);
                  const iv=data.slice(0,16),enc=data.slice(16);
                  const decipher=crypto.createDecipheriv('aes-256-cbc',key,iv);
                  const dec=Buffer.concat([decipher.update(enc),decipher.final()]);
                  fs.writeFileSync('$EXISTING_TRADES_FILE',dec);
                "
                if [ $? -eq 0 ] && [ -f "$EXISTING_TRADES_FILE" ]; then
                  echo "   вң… ЩҒШ§ЫҢЩ„ ЫҢЪ©ЩҫШ§ШұЪҶЩҮ ЩӮШЁЩ„ЫҢ ШЁШ§ Щ…ЩҲЩҒЩӮЫҢШӘ ШЁШ§ШұЪҜШ°Ш§ШұЫҢ ШҙШҜ."
                else
                  echo "   вқҢ Ш®Ш·Ш§ ШҜШұ ШұЩ…ШІЪҜШҙШ§ЫҢЫҢ ЩҒШ§ЫҢЩ„ ЫҢЪ©ЩҫШ§ШұЪҶЩҮ ЩӮШЁЩ„ЫҢ."
                fi
              else
                echo "   в„№пёҸ ЩҒШ§ЫҢЩ„ ЫҢЪ©ЩҫШ§ШұЪҶЩҮ ЩӮШЁЩ„ЫҢ ЩҲШ¬ЩҲШҜ ЩҶШҜШ§ШұШҜ. ЫҢЪ© ЩҒШ§ЫҢЩ„ Ш¬ШҜЫҢШҜ ШіШ§Ш®ШӘЩҮ Ш®ЩҲШ§ЩҮШҜ ШҙШҜ."
              fi
              echo ""
              echo "3- ШҜШұЫҢШ§ЩҒШӘ Щ„ЫҢШіШӘ ЩҒШ§ЫҢЩ„вҖҢЩҮШ§ЫҢ results.enc ШЁШұШ§ЫҢ $STRAT (Ш§ШіЪ©ЩҶ Щ…ШӯЩ„ЫҢ)..."
              FILES=$(find "/tmp/third_repo/backtest_results/$STRAT" -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort -u)
              if [ -z "$FILES" ]; then
                echo "   вҡ пёҸ ЩҮЫҢЪҶ ЩҒШ§ЫҢЩ„ЫҢ ШҜШұ backtest_results/$STRAT ЫҢШ§ЩҒШӘ ЩҶШҙШҜ."
                continue
              fi
              FILE_COUNT=$(echo "$FILES" | wc -l)
              echo "   рҹ“Ҡ ШӘШ№ШҜШ§ШҜ ЩҒШ§ЫҢЩ„вҖҢЩҮШ§ЫҢ ЫҢШ§ЩҒШӘвҖҢШҙШҜЩҮ: $FILE_COUNT"
              echo ""
              echo "3.5- ШЁШұШұШіЫҢ ШҙШұШ· ШӘШ№ШҜШ§ШҜ ЩҒШ§ЫҢЩ„вҖҢЩҮШ§ (ШЁШ§ЫҢШҜ ШҜЩӮЫҢЩӮШ§ЩӢ ЫұЫұЫ°Ы¶ ШЁШ§ШҙШҜ)..."
              REQUIRED_FILE_COUNT=1106
              if [ "$FILE_COUNT" -ne "$REQUIRED_FILE_COUNT" ]; then
                echo "   вҡ пёҸ ШӘШ№ШҜШ§ШҜ ЩҒШ§ЫҢЩ„вҖҢЩҮШ§ ($FILE_COUNT) ШЁШұШ§ШЁШұ ШЁШ§ $REQUIRED_FILE_COUNT ЩҶЫҢШіШӘ. ЫҢЪ©ЩҫШ§ШұЪҶЩҮвҖҢШіШ§ШІЫҢ $STRAT Ш§ЩҶШ¬Ш§Щ… ЩҶЩ…ЫҢвҖҢШҙЩҲШҜ."
                mkdir -p "/tmp/third_repo/aggregated/${STRAT}"
                echo "{\"status\": \"incomplete\", \"file_count\": $FILE_COUNT, \"required_count\": $REQUIRED_FILE_COUNT}" > "/tmp/third_repo/$STATUS_FILE"
                echo "   рҹ“қ ЩҲШ¶Ш№ЫҢШӘ incomplete ШЁШ§ ШӘШ№ШҜШ§ШҜ ЩҒШ§ЫҢЩ„вҖҢЩҮШ§ ШҜШұ $STATUS_FILE Ш«ШЁШӘ ШҙШҜ."
                rm -rf "/tmp/agg_${STRAT}"
                echo ""
                continue
              fi
              echo "   вң… ШӘШ№ШҜШ§ШҜ ЩҒШ§ЫҢЩ„вҖҢЩҮШ§ ШҜЩӮЫҢЩӮШ§ЩӢ $REQUIRED_FILE_COUNT Ш§ШіШӘ. ЫҢЪ©ЩҫШ§ШұЪҶЩҮвҖҢШіШ§ШІЫҢ $STRAT Ш§ЩҶШ¬Ш§Щ… Щ…ЫҢвҖҢШҙЩҲШҜ."
              echo ""
              NEW_TRADES_FILE="/tmp/agg_${STRAT}/new_trades.json"
              echo "[]" > "$NEW_TRADES_FILE"
              SUCCESS_COUNT=0
              FAIL_COUNT=0
              for FOLDER in $FILES; do
                ENC_FILE="/tmp/third_repo/backtest_results/${STRAT}/${FOLDER}/results.enc"
                echo "   рҹ“„ ЩҫШұШҜШ§ШІШҙ: $ENC_FILE"
                if [ ! -f "$ENC_FILE" ]; then
                  echo "      вқҢ ЩҒШ§ЫҢЩ„ ЫҢШ§ЩҒШӘ ЩҶШҙШҜ. ШұШҜ Щ…ЫҢвҖҢШҙЩҲШҜ."
                  FAIL_COUNT=$((FAIL_COUNT + 1))
                  continue
                fi
                echo "      вҸі ШұЩ…ШІЪҜШҙШ§ЫҢЫҢ..."
                set +e
                node -e "
                  const crypto=require('crypto'),fs=require('fs');
                  const pass=process.env.RESULTS_PASSWORD;
                  const data=fs.readFileSync('$ENC_FILE');
                  const key=crypto.scryptSync(pass,'salt',32);
                  const iv=data.slice(0,16),enc=data.slice(16);
                  const decipher=crypto.createDecipheriv('aes-256-cbc',key,iv);
                  const dec=Buffer.concat([decipher.update(enc),decipher.final()]);
                  fs.writeFileSync('/tmp/agg_${STRAT}/temp.tar.gz',dec);
                " 2>/tmp/agg_${STRAT}/decrypt_error.log
                NODE_EXIT=$?
                set -e
                if [ $NODE_EXIT -ne 0 ]; then
                  echo "      вқҢ Ш®Ш·Ш§ ШҜШұ ШұЩ…ШІЪҜШҙШ§ЫҢЫҢ (Ъ©ШҜ $NODE_EXIT)."
                  FAIL_COUNT=$((FAIL_COUNT + 1))
                  continue
                fi
                if [ ! -f "/tmp/agg_${STRAT}/temp.tar.gz" ] || [ ! -s "/tmp/agg_${STRAT}/temp.tar.gz" ]; then
                  echo "      вқҢ ЩҒШ§ЫҢЩ„ tar.gz Ш®ШұЩҲШ¬ЫҢ ЩҶШ§ЩӮШө Ш§ШіШӘ."
                  FAIL_COUNT=$((FAIL_COUNT + 1))
                  continue
                fi
                echo "      вң… ШұЩ…ШІЪҜШҙШ§ЫҢЫҢ Щ…ЩҲЩҒЩӮ."
                echo "      вҸі Ш§ШіШӘШ®ШұШ§Ш¬..."
                tar -xzf "/tmp/agg_${STRAT}/temp.tar.gz" -C "/tmp/agg_${STRAT}/" 2>/tmp/agg_${STRAT}/tar_error.log
                if [ $? -ne 0 ]; then
                  echo "      вқҢ Ш®Ш·Ш§ ШҜШұ Ш§ШіШӘШ®ШұШ§Ш¬ tar.gz."
                  FAIL_COUNT=$((FAIL_COUNT + 1))
                  rm -f "/tmp/agg_${STRAT}/temp.tar.gz"
                  continue
                fi
                EXTRACTED_DIR="/tmp/agg_${STRAT}/${FOLDER}"
                TRADE_FILE="$EXTRACTED_DIR/trades_summary.json"
                if [ -f "$TRADE_FILE" ]; then
                  echo "      вҸі Ш®ЩҲШ§ЩҶШҜЩҶ Щ…Ш№Ш§Щ…Щ„Ш§ШӘ..."
                  COIN_NAME=$(basename "$FOLDER" | cut -d'-' -f1)
                  jq -c --arg sym "$COIN_NAME" '[.trades[] | . + {symbol: $sym}]' "$TRADE_FILE" > "/tmp/agg_${STRAT}/current_trades.json" 2>/dev/null
                  if [ ! -s "/tmp/agg_${STRAT}/current_trades.json" ]; then
                    echo "      вҡ пёҸ ШўШұШ§ЫҢЩҮ trades Ш®Ш§Щ„ЫҢ ЫҢШ§ null Ш§ШіШӘ. ЩҶШ§ШҜЫҢШҜЩҮ ЪҜШұЩҒШӘЩҮ Щ…ЫҢвҖҢШҙЩҲШҜ."
                    echo "[]" > "/tmp/agg_${STRAT}/current_trades.json"
                  fi
                else
                  echo "      вқҢ ЩҒШ§ЫҢЩ„ trades_summary.json ЫҢШ§ЩҒШӘ ЩҶШҙШҜ."
                  FAIL_COUNT=$((FAIL_COUNT + 1))
                  echo "[]" > "/tmp/agg_${STRAT}/current_trades.json"
                fi
                echo "      вҸі Ш§ШҜШәШ§Щ… ШЁШ§ jq..."
                set +e
                jq -s '.[0] + .[1]' "$NEW_TRADES_FILE" "/tmp/agg_${STRAT}/current_trades.json" > "/tmp/agg_${STRAT}/merged_tmp.json"
                JQ_EXIT=$?
                set -e
                if [ $JQ_EXIT -eq 0 ]; then
                  mv "/tmp/agg_${STRAT}/merged_tmp.json" "$NEW_TRADES_FILE"
                  SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
                  echo "      вң… Щ…Ш№Ш§Щ…Щ„Ш§ШӘ Ш§ШҜШәШ§Щ… ШҙШҜЩҶШҜ."
                else
                  echo "      вқҢ Ш®Ш·Ш§ ШҜШұ Ш§ШҜШәШ§Щ… JSON (Ъ©ШҜ $JQ_EXIT)."
                  FAIL_COUNT=$((FAIL_COUNT + 1))
                fi
                rm -rf "$EXTRACTED_DIR" 2>/dev/null
                rm -f "/tmp/agg_${STRAT}/temp.tar.gz" "/tmp/agg_${STRAT}/current_trades.json" "/tmp/agg_${STRAT}/merged_tmp.json"
                echo ""
              done
              echo "   рҹ“Ҡ Ш¬Щ…Ш№вҖҢШЁЩҶШҜЫҢ ЩҫШұШҜШ§ШІШҙ Ш§ШіШӘШұШ§ШӘЪҳЫҢ $STRAT:"
              echo "      вң… Щ…ЩҲЩҒЩӮ: $SUCCESS_COUNT"
              echo "      вқҢ ЩҶШ§Щ…ЩҲЩҒЩӮ: $FAIL_COUNT"
              echo ""
              if [ ! -s "$NEW_TRADES_FILE" ] || [ "$(cat "$NEW_TRADES_FILE")" = "[]" ]; then
                echo "   вҡ пёҸ ЩҮЫҢЪҶ Щ…Ш№Ш§Щ…Щ„ЩҮ Ш¬ШҜЫҢШҜЫҢ ШЁШұШ§ЫҢ Ш§ШҜШәШ§Щ… ЩҲШ¬ЩҲШҜ ЩҶШҜШ§ШұШҜ."
              else
                echo "   вҸі Ш§ШҜШәШ§Щ… ЩҶЩҮШ§ЫҢЫҢ ШЁШ§ ЩҒШ§ЫҢЩ„ ЫҢЪ©ЩҫШ§ШұЪҶЩҮ ЩӮШЁЩ„ЫҢ..."
                set +e
                jq -s '.[0] + .[1]' "$EXISTING_TRADES_FILE" "$NEW_TRADES_FILE" > "/tmp/agg_${STRAT}/combined_trades.json"
                JQ_EXIT=$?
                set -e
                if [ $JQ_EXIT -ne 0 ]; then
                  echo "   вқҢ Ш®Ш·Ш§ ШҜШұ Ш§ШҜШәШ§Щ… ЩҶЩҮШ§ЫҢЫҢ. Ш§ШіШӘЩҒШ§ШҜЩҮ Ш§ШІ ЩҒШ§ЫҢЩ„ Щ…Ш№Ш§Щ…Щ„Ш§ШӘ Ш¬ШҜЫҢШҜ ШЁЩҮ ШӘЩҶЩҮШ§ЫҢЫҢ."
                  cp "$NEW_TRADES_FILE" "/tmp/agg_${STRAT}/combined_trades.json"
                fi
                echo "   вң… Ш§ШҜШәШ§Щ… ЩҶЩҮШ§ЫҢЫҢ Ъ©Ш§Щ…Щ„ ШҙШҜ."

                # ========== Щ…ШұШӯЩ„ЩҮ: ШіШ§Ш®ШӘ ЫҢШ§ ШЁШ§ШұЪҜШ°Ш§ШұЫҢ Щ…ШӘШ§ШҜЫҢШӘШ§ ШЁШ§ Ш§ЩҲЩ„ЩҲЫҢШӘ .js ШіЩҫШі 1.json ==========
                echo "   рҹ“Ҙ ШЁШұШұШіЫҢ Щ…ШӘШ§ШҜЫҢШӘШ§ ШЁШұШ§ЫҢ $STRAT (Ш§ЩҲЩ„ЩҲЫҢШӘ Ыұ: .jsШҢ Ш§ЩҲЩ„ЩҲЫҢШӘ ЫІ: 1.json)..."
                METADATA_SUCCESS=false
                META_SOURCE=""
                META_FILE="/tmp/third_repo/strategies/${STRAT}/1.json"
                META_DONE_FLAG="/tmp/third_repo/strategies/${STRAT}/.metadata_generated"
                JS_FILE="/tmp/third_repo/strategies/${STRAT}.js"
                STRAT_DIR="/tmp/third_repo/strategies/${STRAT}/"
                mkdir -p "$STRAT_DIR"

                if [ -f "$JS_FILE" ]; then
                  echo "   рҹ”§ [Ш§ЩҲЩ„ЩҲЫҢШӘ Ыұ] ЩҒШ§ЫҢЩ„ ${JS_FILE} ЫҢШ§ЩҒШӘ ШҙШҜ вҶ’ Ш§ШіШӘШ®ШұШ§Ш¬ Щ…ШӘШ§ШҜЫҢШӘШ§ Ш§ШІ .js..."
                  set +e
                  node -e "
                    const fs = require('fs');
                    const jsContent = fs.readFileSync('$JS_FILE', 'utf8');

                    let move_percents = [];
                    let source = 'none';

                    const stagesMatch = jsContent.match(/stopLossStages\s*[:=]\s*\[([\s\S]*?)\]/);
                    if (stagesMatch) {
                      const stagesBody = stagesMatch[1];
                      const mpMatches = [...stagesBody.matchAll(/movePercent\s*:\s*([\d.]+)/g)];
                      if (mpMatches.length > 0) {
                        move_percents = mpMatches.map(m => parseFloat(m[1]));
                        source = 'stopLossStages';
                      }
                    }

                    if (move_percents.length === 0) {
                      const mmArr = jsContent.match(/movePercent\s*[:=]\s*\[(.*?)\]/s);
                      if (mmArr) {
                        const numbers = mmArr[1].match(/[\d.]+/g);
                        if (numbers && numbers.length > 0) {
                          move_percents = numbers.map(Number);
                          source = 'movePercent_direct';
                        }
                      }
                    }

                    if (move_percents.length === 0) {
                      source = 'empty_fallback';
                    }

                    console.log('Щ…ЩҶШЁШ№ move_percents: ' + source);
                    console.log('move_percents Ш§ШіШӘШ®ШұШ§Ш¬вҖҢШҙШҜЩҮ (' + move_percents.length + ' Ш№ЩҶШөШұ): ' + JSON.stringify(move_percents));

                    let stop_loss = null;
                    let sl_source = 'none';

                    let slMatch = jsContent.match(/stopLossInitial\s*[:=]\s*(-?[\d.]+)/);
                    if (slMatch) {
                      stop_loss = parseFloat(slMatch[1]);
                      sl_source = 'stopLossInitial_direct';
                    } else {
                      const slFormulaMatch = jsContent.match(/stopLoss\s*:\s*close\s*\*\s*([\d.]+)/);
                      if (slFormulaMatch) {
                        const multiplier = parseFloat(slFormulaMatch[1]);
                        stop_loss = parseFloat(((1 - multiplier) * 100).toFixed(6));
                        sl_source = 'stopLoss_close_formula';
                      }
                    }

                    if (stop_loss === null) {
                      console.error('__NO_STOP_LOSS_INITIAL__');
                      process.exit(1);
                    }
                    console.log('Щ…ЩҶШЁШ№ stop_loss_initial: ' + sl_source);
                    console.log('stop_loss_initial Ш§ШІ .js Ш®ЩҲШ§ЩҶШҜЩҮ ШҙШҜ: ' + stop_loss);
                    let max_move = move_percents.length ? move_percents[move_percents.length-1] : null;
                    const meta = {
                      move_percents: move_percents,
                      stop_loss_initial: stop_loss,
                      max_move_percent: max_move
                    };
                    fs.writeFileSync('$META_FILE', JSON.stringify(meta, null, 2));
                  "
                  JS_META_EXIT=$?
                  set -e

                  if [ $JS_META_EXIT -ne 0 ]; then
                    echo "   вқҢ ЩҶЩҮ stopLossInitial ЩҲ ЩҶЩҮ ЩҒШұЩ…ЩҲЩ„ stopLoss: close * Ш№ШҜШҜ ШҜШұ ЩҒШ§ЫҢЩ„ ${JS_FILE} ЫҢШ§ЩҒШӘ ЩҶШҙШҜ. ЩҮЫҢЪҶ Щ…ЩӮШҜШ§Шұ ЩҫЫҢШҙвҖҢЩҒШұШ¶ЫҢ Ш§ШіШӘЩҒШ§ШҜЩҮ ЩҶЩ…ЫҢвҖҢШҙЩҲШҜ."
                    echo "   вқҢ pipeline ШЁШ§ЫҢШҜ fail ШҙЩҲШҜ: stop_loss_initial Ш§Ш¬ШЁШ§ШұЫҢ Ш§ШіШӘ."
                    exit 1
                  fi

                  if [ -s "$META_FILE" ]; then
                    echo "   вң… Щ…ШӘШ§ШҜЫҢШӘШ§ ШЁШ§ Щ…ЩҲЩҒЩӮЫҢШӘ Ш§ШІ .js Ш§ШіШӘШ®ШұШ§Ш¬ ЩҲ ШҜШұ 1.json Ш°Ш®ЫҢШұЩҮ ШҙШҜ."
                    cp "$META_FILE" "/tmp/agg_${STRAT}/1.json"
                    METADATA_SUCCESS=true
                    META_SOURCE=".js"
                    touch "$META_DONE_FLAG"
                  else
                    echo "   вқҢ ШіШ§Ш®ШӘ ЩҒШ§ЫҢЩ„ 1.json Ш§ШІ .js ЩҶШ§Щ…ЩҲЩҒЩӮ ШЁЩҲШҜ."
                    rm -rf "/tmp/agg_${STRAT}"
                    continue
                  fi
                fi

                if [ "$METADATA_SUCCESS" = false ]; then
                  echo "   в„№пёҸ ЩҒШ§ЫҢЩ„ ${JS_FILE} ЫҢШ§ЩҒШӘ ЩҶШҙШҜ вҶ’ ШЁШ§ШІЪҜШҙШӘ ШЁЩҮ fallback (1.json)."
                  if [ -f "$META_FILE" ]; then
                    HAS_SL=$(jq 'has("stop_loss_initial") and .stop_loss_initial != null' "$META_FILE")
                    if [ "$HAS_SL" != "true" ]; then
                      echo "   вқҢ stop_loss_initial ШҜШұ ЩҒШ§ЫҢЩ„ ${META_FILE} ЫҢШ§ЩҒШӘ ЩҶШҙШҜ. ЩҮЫҢЪҶ Щ…ЩӮШҜШ§Шұ ЩҫЫҢШҙвҖҢЩҒШұШ¶ЫҢ Ш§ШіШӘЩҒШ§ШҜЩҮ ЩҶЩ…ЫҢвҖҢШҙЩҲШҜ."
                      echo "   вқҢ pipeline ШЁШ§ЫҢШҜ fail ШҙЩҲШҜ: stop_loss_initial Ш§Ш¬ШЁШ§ШұЫҢ Ш§ШіШӘ."
                      exit 1
                    fi
                    echo "   вң… ЩҒШ§ЫҢЩ„ 1.json Ш§ШІ Щ…Ш®ШІЩҶ Щ…ШӯЩ„ЫҢ ЫҢШ§ЩҒШӘ ШҙШҜ."
                    MOVE_PERCENTS_LEN=$(jq '(.move_percents // []) | length' "$META_FILE")
                    SL_FROM_JSON=$(jq '.stop_loss_initial' "$META_FILE")
                    echo "   move_percents Ш§ШіШӘШ®ШұШ§Ш¬вҖҢШҙШҜЩҮ ($MOVE_PERCENTS_LEN Ш№ЩҶШөШұ) Ш§ШІ ${META_FILE}"
                    echo "   stop_loss_initial Ш§ШІ 1.json Ш®ЩҲШ§ЩҶШҜЩҮ ШҙШҜ: $SL_FROM_JSON"
                    cp "$META_FILE" "/tmp/agg_${STRAT}/1.json"
                    METADATA_SUCCESS=true
                    META_SOURCE="1.json"
                    touch "$META_DONE_FLAG"
                  else
                    echo "   вқҢ ЩҶЩҮ ЩҒШ§ЫҢЩ„ ${JS_FILE} ЩҲ ЩҶЩҮ ЩҒШ§ЫҢЩ„ ${META_FILE} ЫҢШ§ЩҒШӘ ЩҶШҙШҜ. Ш§ЫҢЩҶ Ш§ШіШӘШұШ§ШӘЪҳЫҢ ШұШҜ Щ…ЫҢвҖҢШҙЩҲШҜ."
                    echo "   вқҢ pipeline ШЁШ§ЫҢШҜ fail ШҙЩҲШҜ: ЩҮЫҢЪҶ Щ…ЩҶШЁШ№ Щ…ШӘШ§ШҜЫҢШӘШ§ЫҢЫҢ Щ…ЩҲШ¬ЩҲШҜ ЩҶЫҢШіШӘ."
                    exit 1
                  fi
                fi

                echo "   вң… [Щ…ШӘШ§ШҜЫҢШӘШ§] Щ…ЩҶШЁШ№ ЩҶЩҮШ§ЫҢЫҢ ШЁШұШ§ЫҢ $STRAT: $META_SOURCE"

                MOVE_PERCENTS=$(jq -c '.move_percents // []' "/tmp/agg_${STRAT}/1.json")
                STOP_LOSS=$(jq '.stop_loss_initial' "/tmp/agg_${STRAT}/1.json")
                if [ "$STOP_LOSS" = "null" ]; then
                  echo "   вқҢ stop_loss_initial Ш§Ш¬ШЁШ§ШұЫҢ Ш§ШіШӘ ЩҲ ШҜШұ Щ…ШӘШ§ШҜЫҢШӘШ§ЫҢ ЩҶЩҮШ§ЫҢЫҢ ЫҢШ§ЩҒШӘ ЩҶШҙШҜ."
                  exit 1
                fi
                MAX_MOVE=$(jq '.max_move_percent // (if .move_percents then .move_percents[-1] else null end)' "/tmp/agg_${STRAT}/1.json")

                jq -n \
                  --argjson move_percents "$MOVE_PERCENTS" \
                  --argjson stop_loss "$STOP_LOSS" \
                  --argjson max_move "$MAX_MOVE" \
                  --slurpfile trades "/tmp/agg_${STRAT}/combined_trades.json" \
                  '{trades: $trades[0], metadata: {move_percents: $move_percents, stop_loss_initial: $stop_loss, max_move_percent: $max_move}}' \
                  > "/tmp/agg_${STRAT}/final_package.json"

                echo "4- ШұЩ…ШІЩҶЪҜШ§ШұЫҢ ЩҒШ§ЫҢЩ„ ЫҢЪ©ЩҫШ§ШұЪҶЩҮ Ш¬ШҜЫҢШҜ (ШҙШ§Щ…Щ„ Щ…ШӘШ§ШҜЫҢШӘШ§)..."
                node -e "
                  const crypto=require('crypto'),fs=require('fs');
                  const pass=process.env.RESULTS_PASSWORD;
                  const data=fs.readFileSync('/tmp/agg_${STRAT}/final_package.json');
                  const key=crypto.scryptSync(pass,'salt',32);
                  const iv=crypto.randomBytes(16);
                  const cipher=crypto.createCipheriv('aes-256-cbc',key,iv);
                  const enc=Buffer.concat([cipher.update(data),cipher.final()]);
                  fs.writeFileSync('/tmp/agg_${STRAT}/final.enc', Buffer.concat([iv,enc]));
                "
                if [ $? -ne 0 ]; then
                  echo "   вқҢ Ш®Ш·Ш§ ШҜШұ ШұЩ…ШІЩҶЪҜШ§ШұЫҢ ЩҒШ§ЫҢЩ„ ЫҢЪ©ЩҫШ§ШұЪҶЩҮ."
                  continue
                fi
                mkdir -p "/tmp/third_repo/aggregated/${STRAT}"
                cp "/tmp/agg_${STRAT}/final.enc" "/tmp/third_repo/$AGG_FILE"
                echo "   вң… ЩҒШ§ЫҢЩ„ ЫҢЪ©ЩҫШ§ШұЪҶЩҮ ШҜШұ Щ…Ш®ШІЩҶ Щ…ШӯЩ„ЫҢ Ш°Ш®ЫҢШұЩҮ ШҙШҜ."

                echo "4.5- Ш°Ш®ЫҢШұЩҮ ЩҫШұЪҶЩ… ШҙШұЩҲШ№ ЩҫШ§Ъ©ШіШ§ШІЫҢ..."
                FILES_TO_DELETE_JSON="["
                FIRST=true
                for FOLDER in $FILES; do
                  ENC_PATH="backtest_results/${STRAT}/${FOLDER}/results.enc"
                  if $FIRST; then
                    FILES_TO_DELETE_JSON+="\"$ENC_PATH\""
                    FIRST=false
                  else
                    FILES_TO_DELETE_JSON+=", \"$ENC_PATH\""
                  fi
                done
                FILES_TO_DELETE_JSON+="]"
                echo "{\"status\": \"cleaning\", \"files_to_delete\": $FILES_TO_DELETE_JSON}" > "/tmp/agg_${STRAT}/status.json"
                cp "/tmp/agg_${STRAT}/status.json" "/tmp/third_repo/$STATUS_FILE"

                echo "5- ЩҫШ§Ъ©вҖҢШіШ§ШІЫҢ results.enc ЩҮШ§ЫҢ ЩӮШҜЫҢЩ…ЫҢ $STRAT ..."
                for FOLDER in $FILES; do
                  ENC_PATH="/tmp/third_repo/backtest_results/${STRAT}/${FOLDER}/results.enc"
                  rm -f "$ENC_PATH" 2>/dev/null && echo "   вң… ШӯШ°ЩҒ Щ…ЩҲЩҒЩӮ $ENC_PATH"
                  rm -rf "/tmp/third_repo/backtest_results/${STRAT}/${FOLDER}" 2>/dev/null
                done

                echo "5.5- ШЁЩҮвҖҢШұЩҲШІШұШіШ§ЩҶЫҢ ЩҫШұЪҶЩ… ЩҲШ¶Ш№ЫҢШӘ ШЁЩҮ completed..."
                echo '{"status": "completed"}' > "/tmp/agg_${STRAT}/status.json"
                cp "/tmp/agg_${STRAT}/status.json" "/tmp/third_repo/$STATUS_FILE"
                rm -f "/tmp/agg_${STRAT}/status.json"
              fi
              rm -rf "/tmp/agg_${STRAT}"
              echo ""
            done
            echo "вң… ЫҢЪ©ЩҫШ§ШұЪҶЩҮвҖҢШіШ§ШІЫҢ Ъ©Ш§Щ…Щ„ ШҙШҜ."
          } >> logs/run.log 2>&1
          exit 0

      - name: Commit and push changes back to third repo
        run: |
          cd /tmp/third_repo
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Aggregate results and clean up processed files"
            git pull --rebase
            git push
          fi

      - name: Save logs after job
        if: always()
        run: |
          cd $GITHUB_WORKSPACE
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -f logs/run.log
          if ! git diff --cached --quiet; then
            git commit -m "update logs after aggregate-results (run ${{ github.run_id }})" --allow-empty
            git pull --rebase origin main || true
            git push origin main || true
          else
            echo "ЩҮЫҢЪҶ ШӘШәЫҢЫҢШұЫҢ ШҜШұ Щ„Ш§ЪҜ ЩҲШ¬ЩҲШҜ ЩҶШҜШ§ШұШҜ." >> logs/run.log 2>&1
            git add -f logs/run.log
            git commit -m "final logs (run ${{ github.run_id }})" --allow-empty || true
            git push origin main || true
          fi

  # ============================================================
  # Job 2.5: ШӘЩҲЩ„ЫҢШҜ ЪҜШІШ§ШұШҙвҖҢЩҮШ§ЫҢ Ш¬Ш§Щ…Ш№ ЩҶШіШ®ЩҮ Ыө Ш§ШІ ШҜШ§ШҜЩҮвҖҢЩҮШ§ЫҢ ЫҢЪ©ЩҫШ§ШұЪҶЩҮ
  # ============================================================
  generate-reports:
    needs: aggregate-results
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Щ…Ш®ШІЩҶ Ш§ШөЩ„ЫҢ
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: ЩҶШөШЁ ЩҫШ§ЫҢШӘЩҲЩҶ
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Clone Щ…Ш®ШІЩҶ ШіЩҲЩ…
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          git clone --depth=1 \
            "https://x-access-token:${GH_TOKEN}@github.com/${THIRD_REPO}.git" \
            /tmp/third_repo

      - name: Ш§Ш¬ШұШ§ЫҢ loader.py
        env:
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD || secrets.DATA_PASSWORD }}
        run: |
          python modules/loader.py \
            --news-dir data/news \
            --results-dir /tmp/third_repo/aggregated \
            --strategies-dir /tmp/third_repo/strategies \
            --output-news /tmp/news.pickle \
            --output-strategies /tmp/strategies.json

      - name: Ш§Ш¬ШұШ§ЫҢ calculator_stoploss.py
        env:
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD || secrets.DATA_PASSWORD }}
        run: |
          python modules/calculator_stoploss.py \
            --strategies-json /tmp/strategies.json \
            --results-base /tmp/third_repo/aggregated \
            --strategies-dir /tmp/third_repo/strategies \
            --output /tmp/stoploss.json

      - name: Ш§Ш¬ШұШ§ЫҢ calculators.py returns
        env:
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD || secrets.DATA_PASSWORD }}
        run: |
          python modules/calculators.py returns \
            --strategies-json /tmp/strategies.json \
            --results-base /tmp/third_repo/aggregated \
            --output /tmp/returns.json \
            --password "$RESULTS_PASSWORD"

      - name: Ш§Ш¬ШұШ§ЫҢ calculators.py risk
        env:
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD || secrets.DATA_PASSWORD }}
        run: |
          python modules/calculators.py risk \
            --strategies-json /tmp/strategies.json \
            --results-base /tmp/third_repo/aggregated \
            --stoploss-cache /tmp/stoploss.json \
            --output /tmp/risk.json \
            --password "$RESULTS_PASSWORD"

      - name: Ш§Ш¬ШұШ§ЫҢ calculators.py inverse
        env:
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD || secrets.DATA_PASSWORD }}
        run: |
          python modules/calculators.py inverse \
            --strategies-json /tmp/strategies.json \
            --results-base /tmp/third_repo/aggregated \
            --stoploss-cache /tmp/stoploss.json \
            --output /tmp/inverse.json \
            --password "$RESULTS_PASSWORD"

      - name: Ш§Ш¬ШұШ§ЫҢ calculators.py report
        env:
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD || secrets.DATA_PASSWORD }}
        run: |
          mkdir -p /tmp/reports
          python modules/calculators.py report \
            --returns-cache /tmp/returns.json \
            --strategies-json /tmp/strategies.json \
            --risk-cache /tmp/risk.json \
            --inverse-cache /tmp/inverse.json \
            --results-base /tmp/third_repo/aggregated \
            --news-pickle /tmp/news.pickle \
            --output-dir /tmp/reports \
            --password "$RESULTS_PASSWORD"

      - name: Commit ЩҲ Push ЪҜШІШ§ШұШҙвҖҢЩҮШ§ ШЁЩҮ Щ…Ш®ШІЩҶ ШіЩҲЩ…
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          cd /tmp/third_repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          rm -rf reports/
          mkdir -p reports
          cp -r /tmp/reports/* reports/
          git add -f reports/
          git commit -m "update reports from aggregated data (run ${{ github.run_id }})" || echo "No changes to commit"
          git push origin main

  # ============================================================
  # Job 3: ШўЩ…Ш§ШҜЩҮвҖҢШіШ§ШІЫҢ ШөЩҒ Ъ©Ш§ШұЩҮШ§ (ШіШ§Ш®ШӘ all_combinations.json) ШЁШ§ Ш§ШөЩ„Ш§Шӯ Ъ©Шҙ
  # ============================================================
  prepare-dispatch:
    needs: [aggregate-results, generate-reports]
    runs-on: ubuntu-latest
    outputs:
      total_batches: ${{ steps.queue.outputs.total_batches }}
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          ref: main
      - name: ШұШ§ЩҮвҖҢШ§ЩҶШҜШ§ШІЫҢ ЩҫШ§ЫҢШӘЩҲЩҶ
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: ШҜШұЫҢШ§ЩҒШӘ ШҜШ§ШҜЩҮвҖҢЩҮШ§ЫҢ Щ„Ш§ШІЩ… Ш§ШІ Щ…Ш®ШІЩҶ ШіЩҲЩ…
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          mkdir -p logs
          gh api "repos/$THIRD_REPO/contents/aggregated" -q '.[].name' > /tmp/strategies.txt
      - name: ШіШ§Ш®ШӘ ЩҲ ШЁЩҮвҖҢШұЩҲШІШұШіШ§ЩҶЫҢ all_combinations.json (ШЁШ§ Ш§ШіЪ©ШұЫҢЩҫШӘ ЩҫШ§ЫҢШӘЩҲЩҶ Ш§ШөЩ„Ш§Шӯ ШҙШҜЩҮ)
        id: queue
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          mkdir -p logs
          {
            python scripts/build_work_queue.py \
              --progress /tmp/dummy \
              --strategies /tmp/strategies.txt \
              --output-dir /tmp/dummy \
              --batch-size 500 2>&1
            EXIT_CODE=$?
            if [ $EXIT_CODE -ne 0 ]; then
              echo "вқҢ Ш§ШіЪ©ШұЫҢЩҫШӘ ШЁШ§ Ш®Ш·Ш§ Щ…ЩҲШ§Ш¬ЩҮ ШҙШҜ (Ъ©ШҜ $EXIT_CODE)"
              exit $EXIT_CODE
            fi
          } >> logs/run.log 2>&1

          echo "рҹ”„ ШҜШұЫҢШ§ЩҒШӘ all_combinations.json ШЁШ§ retry..." | tee -a logs/run.log
          for attempt in 1 2 3 4 5; do
            TIMESTAMP=$(date +%s%N)
            ALL_COMBOS_CONTENT=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/$THIRD_REPO/contents/all_combinations.json?t=$TIMESTAMP" \
              -H "Accept: application/vnd.github.v3.raw" 2>/dev/null)
            if [ -n "$ALL_COMBOS_CONTENT" ] && [ "$ALL_COMBOS_CONTENT" != "null" ]; then
              TOTAL_COMBOS=$(echo "$ALL_COMBOS_CONTENT" | jq 'length')
              TOTAL_BATCHES=$(( (TOTAL_COMBOS + 499) / 500 ))
              echo "total_batches=$TOTAL_BATCHES" >> $GITHUB_OUTPUT
              echo "вң… ШӘШ№ШҜШ§ШҜ ШЁШіШӘЩҮвҖҢЩҮШ§: $TOTAL_BATCHES" | tee -a logs/run.log
              break
            fi
            echo "вҸі ШӘЩ„Ш§Шҙ $attempt: ЩҒШ§ЫҢЩ„ ШҜШұ ШҜШіШӘШұШі ЩҶЫҢШіШӘШҢ 3 Ш«Ш§ЩҶЫҢЩҮ ШөШЁШұ..." | tee -a logs/run.log
            sleep 3
          done
          if [ -z "$TOTAL_BATCHES" ]; then
            echo "вқҢ ШӘШ№ШҜШ§ШҜ ШЁШіШӘЩҮвҖҢЩҮШ§ ШөЩҒШұ ШҜШұ ЩҶШёШұ ЪҜШұЩҒШӘЩҮ Щ…ЫҢвҖҢШҙЩҲШҜ." | tee -a logs/run.log
            echo "total_batches=0" >> $GITHUB_OUTPUT
          fi

      - name: Save logs after job
        if: always()
        run: |
          cd $GITHUB_WORKSPACE
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -f logs/run.log
          git commit -m "update logs after prepare-dispatch (run ${{ github.run_id }})" || echo "No changes"
          git push origin main || true

  # ============================================================
  # Job 4: Ш§Ш¬ШұШ§ЫҢ fixed jobs (ШӘЩҲШІЫҢШ№ ШЁШіШӘЩҮвҖҢЩҮШ§) ШЁШ§ retry
  # ============================================================
  dispatch-fixed:
    needs: prepare-dispatch
    if: needs.prepare-dispatch.outputs.total_batches != '0'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          ref: main
      - name: ЩҒШұШ§Ш®ЩҲШ§ЩҶЫҢ analysis.yml (ШЁШ§ retry)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p logs
          {
            echo "рҹ”„ ЩҒШұШ§Ш®ЩҲШ§ЩҶЫҢ analysis.yml (ШӯШ§Щ„ШӘ fixed_batch)..."
            for attempt in 1 2 3; do
              if gh workflow run analysis.yml --ref main \
                -f analysis_module="fixed_batch" 2>&1; then
                echo "вң… ЩҒШұШ§Ш®ЩҲШ§ЩҶЫҢ analysis.yml Щ…ЩҲЩҒЩӮ ШЁЩҲШҜ (ШӘЩ„Ш§Шҙ $attempt)."
                break
              else
                echo "вҡ пёҸ ШӘЩ„Ш§Шҙ $attempt ЩҶШ§Щ…ЩҲЩҒЩӮ ШЁЩҲШҜ. 5 Ш«Ш§ЩҶЫҢЩҮ ШөШЁШұ Щ…ЫҢвҖҢЪ©ЩҶЩ…..."
                sleep 5
              fi
            done
          } >> logs/run.log 2>&1
      - name: Save logs after job
        if: always()
        run: |
          cd $GITHUB_WORKSPACE
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -f logs/run.log
          git commit -m "update logs after dispatch-fixed (run ${{ github.run_id }})" || echo "No changes"
          git push origin main || true

  # ============================================================
  # Job 5a: ШіШ§Ш®ШӘ ШөЩҒ golden (ЩӮШЁЩ„ Ш§ШІ dispatch-golden)
  # ============================================================
  prepare-golden-queue:
    needs: [prepare-dispatch, dispatch-fixed]
    if: |
      always() &&
      needs.prepare-dispatch.result == 'success' &&
      needs.prepare-dispatch.outputs.total_batches == '0' &&
      (needs.dispatch-fixed.result == 'success' || needs.dispatch-fixed.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          ref: main
      - name: ШұШ§ЩҮвҖҢШ§ЩҶШҜШ§ШІЫҢ ЩҫШ§ЫҢШӘЩҲЩҶ
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: ШіШ§Ш®ШӘ ЩҲ ШЁЩҮвҖҢШұЩҲШІШұШіШ§ЩҶЫҢ all_combinations_golden.json
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          mkdir -p logs
          {
            python scripts/build_golden_queue.py \
              --progress /tmp/dummy \
              --output-dir /tmp/dummy \
              --batch-size 500 2>&1
            EXIT_CODE=$?
            if [ $EXIT_CODE -ne 0 ]; then
              echo "вқҢ build_golden_queue.py ШЁШ§ Ш®Ш·Ш§ Щ…ЩҲШ§Ш¬ЩҮ ШҙШҜ (Ъ©ШҜ $EXIT_CODE)"
              exit $EXIT_CODE
            fi
          } >> logs/run.log 2>&1
      - name: Save logs after job
        if: always()
        run: |
          cd $GITHUB_WORKSPACE
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -f logs/run.log
          git commit -m "update logs after prepare-golden-queue (run ${{ github.run_id }})" || echo "No changes"
          git push origin main || true

  # ============================================================
  # Job 5: Ш§Ш¬ШұШ§ЫҢ golden (ЩҫШі Ш§ШІ ШўЩ…Ш§ШҜЩҮвҖҢШіШ§ШІЫҢ ШөЩҒ golden)
  # ============================================================
  dispatch-golden:
    needs: [prepare-dispatch, prepare-golden-queue]
    if: |
      always() &&
      needs.prepare-dispatch.result == 'success' &&
      needs.prepare-dispatch.outputs.total_batches == '0' &&
      needs.prepare-golden-queue.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          ref: main

      - name: ШЁШұШұШіЫҢ ЩҫШұЪҶЩ… ЩҲЩӮЩҒЩҮ ЩҲ ЩҲШ¶Ш№ЫҢШӘ ЩӮШЁЩ„ЫҢ golden
        id: status_check
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          mkdir -p logs
          {
            echo "рҹ”Қ ШЁШұШұШіЫҢ ЩҫШұЪҶЩ… ЩҲЩӮЩҒЩҮ..."
            if gh api "repos/$THIRD_REPO/contents/interrupt.flag" -i 2>/dev/null | head -n1 | grep -q 200; then
              echo "вҡ пёҸ ЩҫШұЪҶЩ… ЩҲЩӮЩҒЩҮ ЩҒШ№Ш§Щ„ Ш§ШіШӘ. golden Ш§Ш¬ШұШ§ ЩҶШ®ЩҲШ§ЩҮШҜ ШҙШҜ."
              echo "should_run=false" >> $GITHUB_OUTPUT
              exit 0
            fi

            # ШЁШұШұШіЫҢ Ш®Ш§Щ„ЫҢ ШЁЩҲШҜЩҶ ШөЩҒ golden
            EMPTY=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/$THIRD_REPO/contents/all_combinations_golden.json?t=$(date +%s)" \
              -H "Accept: application/vnd.github.v3.raw" | jq -e 'length == 0' 2>/dev/null || echo "false")
            if [ "$EMPTY" = "true" ]; then
              echo "в„№пёҸ ШөЩҒ golden Ш®Ш§Щ„ЫҢ Ш§ШіШӘ. Ш§ЫҢЩҶ Щ…Ш§ЪҳЩҲЩ„ Ъ©Ш§Щ…Щ„ ШҙШҜЩҮ."
              echo "should_run=false" >> $GITHUB_OUTPUT
              exit 0
            fi

            echo "should_run=true" >> $GITHUB_OUTPUT
          } >> logs/run.log 2>&1

      - name: ЩҒШұШ§Ш®ЩҲШ§ЩҶЫҢ analysis.yml ШЁШұШ§ЫҢ golden
        if: steps.status_check.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p logs
          {
            echo "рҹ”„ ЩҒШұШ§Ш®ЩҲШ§ЩҶЫҢ analysis.yml ШЁШұШ§ЫҢ golden..."
            for attempt in 1 2 3; do
              if gh workflow run analysis.yml --ref main \
                -f analysis_module="golden" 2>&1; then
                echo "вң… ЩҒШұШ§Ш®ЩҲШ§ЩҶЫҢ golden Щ…ЩҲЩҒЩӮ ШЁЩҲШҜ (ШӘЩ„Ш§Шҙ $attempt)."
                break
              else
                echo "вҡ пёҸ ШӘЩ„Ш§Шҙ $attempt ЩҶШ§Щ…ЩҲЩҒЩӮ ШЁЩҲШҜ. 5 Ш«Ш§ЩҶЫҢЩҮ ШөШЁШұ Щ…ЫҢвҖҢЪ©ЩҶЩ…..."
                sleep 5
              fi
            done
          } >> logs/run.log 2>&1

      - name: Save logs after job
        if: always()
        run: |
          cd $GITHUB_WORKSPACE
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -f logs/run.log
          git commit -m "update logs after dispatch-golden (run ${{ github.run_id }})" || echo "No changes"
          git push origin main || true

  # ============================================================
  # Job 5c: ШіШ§Ш®ШӘ ШөЩҒ portfolios (ЩӮШЁЩ„ Ш§ШІ dispatch-portfolios)
  # ============================================================
  prepare-portfolios-queue:
    needs: [prepare-dispatch, dispatch-golden]
    if: |
      always() &&
      needs.prepare-dispatch.result == 'success' &&
      needs.prepare-dispatch.outputs.total_batches == '0' &&
      needs.dispatch-golden.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          ref: main
      - name: ШұШ§ЩҮвҖҢШ§ЩҶШҜШ§ШІЫҢ ЩҫШ§ЫҢШӘЩҲЩҶ
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: ШіШ§Ш®ШӘ ЩҲ ШЁЩҮвҖҢШұЩҲШІШұШіШ§ЩҶЫҢ all_combinations_portfolios.json
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD || secrets.DATA_PASSWORD }}
        run: |
          mkdir -p logs
          {
            pip install pandas pyarrow --quiet --break-system-packages 2>&1 || \
              pip install pandas pyarrow --quiet 2>&1
            python scripts/build_portfolios_queue.py \
              --progress /tmp/dummy \
              --output-dir /tmp/dummy \
              --batch-size 500 \
              --min-score 45 2>&1
            EXIT_CODE=$?
            if [ $EXIT_CODE -ne 0 ]; then
              echo "вқҢ build_portfolios_queue.py ШЁШ§ Ш®Ш·Ш§ Щ…ЩҲШ§Ш¬ЩҮ ШҙШҜ (Ъ©ШҜ $EXIT_CODE)"
              exit $EXIT_CODE
            fi
          } >> logs/run.log 2>&1
      - name: Save logs after job
        if: always()
        run: |
          cd $GITHUB_WORKSPACE
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -f logs/run.log
          git commit -m "update logs after prepare-portfolios-queue (run ${{ github.run_id }})" || echo "No changes"
          git push origin main || true

  # ============================================================
  # Job 6: Ш§Ш¬ШұШ§ЫҢ portfolios (ЩҫШі Ш§ШІ ШўЩ…Ш§ШҜЩҮвҖҢШіШ§ШІЫҢ ШөЩҒ portfolios)
  # ============================================================
  dispatch-portfolios:
    needs: [prepare-dispatch, prepare-portfolios-queue]
    if: |
      always() &&
      needs.prepare-dispatch.result == 'success' &&
      needs.prepare-dispatch.outputs.total_batches == '0' &&
      needs.prepare-portfolios-queue.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          ref: main

      - name: ШЁШұШұШіЫҢ ЩҫШұЪҶЩ… ЩҲЩӮЩҒЩҮ ЩҲ ЩҲШ¶Ш№ЫҢШӘ ЩӮШЁЩ„ЫҢ portfolios
        id: status_check
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          mkdir -p logs
          {
            echo "рҹ”Қ ШЁШұШұШіЫҢ ЩҫШұЪҶЩ… ЩҲЩӮЩҒЩҮ..."
            if gh api "repos/$THIRD_REPO/contents/interrupt.flag" -i 2>/dev/null | head -n1 | grep -q 200; then
              echo "вҡ пёҸ ЩҫШұЪҶЩ… ЩҲЩӮЩҒЩҮ ЩҒШ№Ш§Щ„ Ш§ШіШӘ. portfolios Ш§Ш¬ШұШ§ ЩҶШ®ЩҲШ§ЩҮШҜ ШҙШҜ."
              echo "should_run=false" >> $GITHUB_OUTPUT
              exit 0
            fi

            EMPTY=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/$THIRD_REPO/contents/all_combinations_portfolios.json?t=$(date +%s)" \
              -H "Accept: application/vnd.github.v3.raw" | jq -e 'length == 0' 2>/dev/null || echo "false")
            if [ "$EMPTY" = "true" ]; then
              echo "в„№пёҸ ШөЩҒ portfolios Ш®Ш§Щ„ЫҢ Ш§ШіШӘ. Ш§ЫҢЩҶ Щ…Ш§ЪҳЩҲЩ„ Ъ©Ш§Щ…Щ„ ШҙШҜЩҮ."
              echo "should_run=false" >> $GITHUB_OUTPUT
              exit 0
            fi

            echo "should_run=true" >> $GITHUB_OUTPUT
          } >> logs/run.log 2>&1

      - name: ЩҒШұШ§Ш®ЩҲШ§ЩҶЫҢ analysis.yml ШЁШұШ§ЫҢ portfolios
        if: steps.status_check.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p logs
          {
            echo "рҹ”„ ЩҒШұШ§Ш®ЩҲШ§ЩҶЫҢ analysis.yml ШЁШұШ§ЫҢ portfolios..."
            for attempt in 1 2 3; do
              if gh workflow run analysis.yml --ref main \
                -f analysis_module="portfolios" 2>&1; then
                echo "вң… ЩҒШұШ§Ш®ЩҲШ§ЩҶЫҢ portfolios Щ…ЩҲЩҒЩӮ ШЁЩҲШҜ (ШӘЩ„Ш§Шҙ $attempt)."
                break
              else
                echo "вҡ пёҸ ШӘЩ„Ш§Шҙ $attempt ЩҶШ§Щ…ЩҲЩҒЩӮ ШЁЩҲШҜ. 5 Ш«Ш§ЩҶЫҢЩҮ ШөШЁШұ Щ…ЫҢвҖҢЪ©ЩҶЩ…..."
                sleep 5
              fi
            done
          } >> logs/run.log 2>&1

      - name: Save logs after job
        if: always()
        run: |
          cd $GITHUB_WORKSPACE
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -f logs/run.log
          git commit -m "update logs after dispatch-portfolios (run ${{ github.run_id }})" || echo "No changes"
          git push origin main || true

  # ============================================================
  # Job 6b: ШіШ§Ш®ШӘ ШөЩҒ correlation (ЩӮШЁЩ„ Ш§ШІ dispatch-correlation)
  # ============================================================
  prepare-correlation-queue:
    needs: [prepare-dispatch, dispatch-portfolios]
    if: |
      always() &&
      needs.prepare-dispatch.result == 'success' &&
      needs.prepare-dispatch.outputs.total_batches == '0' &&
      needs.dispatch-portfolios.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          ref: main
      - name: ШұШ§ЩҮвҖҢШ§ЩҶШҜШ§ШІЫҢ ЩҫШ§ЫҢШӘЩҲЩҶ
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: ШіШ§Ш®ШӘ ЩҲ ШЁЩҮвҖҢШұЩҲШІШұШіШ§ЩҶЫҢ all_combinations_correlation.json
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          mkdir -p logs
          {
            python scripts/build_correlation_queue.py \
              --progress /tmp/dummy \
              --output-dir /tmp/dummy \
              --batch-size 500 2>&1
            EXIT_CODE=$?
            if [ $EXIT_CODE -ne 0 ]; then
              echo "вқҢ build_correlation_queue.py ШЁШ§ Ш®Ш·Ш§ Щ…ЩҲШ§Ш¬ЩҮ ШҙШҜ (Ъ©ШҜ $EXIT_CODE)"
              exit $EXIT_CODE
            fi
          } >> logs/run.log 2>&1
      - name: Save logs after job
        if: always()
        run: |
          cd $GITHUB_WORKSPACE
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -f logs/run.log
          git commit -m "update logs after prepare-correlation-queue (run ${{ github.run_id }})" || echo "No changes"
          git push origin main || true

  # ============================================================
  # Job 6.5: Ш§Ш¬ШұШ§ЫҢ correlation (ЩҫШі Ш§ШІ ШўЩ…Ш§ШҜЩҮвҖҢШіШ§ШІЫҢ ШөЩҒ correlation)
  # ============================================================
  dispatch-correlation:
    needs: [prepare-dispatch, prepare-correlation-queue]
    if: |
      always() &&
      needs.prepare-dispatch.result == 'success' &&
      needs.prepare-dispatch.outputs.total_batches == '0' &&
      needs.prepare-correlation-queue.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          ref: main

      - name: ШЁШұШұШіЫҢ ЩҫШұЪҶЩ… ЩҲЩӮЩҒЩҮ ЩҲ ЩҲШ¶Ш№ЫҢШӘ ЩӮШЁЩ„ЫҢ correlation
        id: status_check
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          mkdir -p logs
          {
            echo "рҹ”Қ ШЁШұШұШіЫҢ ЩҫШұЪҶЩ… ЩҲЩӮЩҒЩҮ..."
            if gh api "repos/$THIRD_REPO/contents/interrupt.flag" -i 2>/dev/null | head -n1 | grep -q 200; then
              echo "вҡ пёҸ ЩҫШұЪҶЩ… ЩҲЩӮЩҒЩҮ ЩҒШ№Ш§Щ„ Ш§ШіШӘ. correlation Ш§Ш¬ШұШ§ ЩҶШ®ЩҲШ§ЩҮШҜ ШҙШҜ."
              echo "should_run=false" >> $GITHUB_OUTPUT
              exit 0
            fi

            EMPTY=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/$THIRD_REPO/contents/all_combinations_correlation.json?t=$(date +%s)" \
              -H "Accept: application/vnd.github.v3.raw" | jq -e 'length == 0' 2>/dev/null || echo "false")
            if [ "$EMPTY" = "true" ]; then
              echo "в„№пёҸ ШөЩҒ correlation Ш®Ш§Щ„ЫҢ Ш§ШіШӘ. Ш§ЫҢЩҶ Щ…Ш§ЪҳЩҲЩ„ Ъ©Ш§Щ…Щ„ ШҙШҜЩҮ."
              echo "should_run=false" >> $GITHUB_OUTPUT
              exit 0
            fi

            echo "should_run=true" >> $GITHUB_OUTPUT
          } >> logs/run.log 2>&1

      - name: ЩҒШұШ§Ш®ЩҲШ§ЩҶЫҢ analysis.yml ШЁШұШ§ЫҢ correlation
        if: steps.status_check.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p logs
          {
            echo "рҹ”„ ЩҒШұШ§Ш®ЩҲШ§ЩҶЫҢ analysis.yml ШЁШұШ§ЫҢ correlation..."
            for attempt in 1 2 3; do
              if gh workflow run analysis.yml --ref main \
                -f analysis_module="correlation" 2>&1; then
                echo "вң… ЩҒШұШ§Ш®ЩҲШ§ЩҶЫҢ correlation Щ…ЩҲЩҒЩӮ ШЁЩҲШҜ (ШӘЩ„Ш§Шҙ $attempt)."
                break
              else
                echo "вҡ пёҸ ШӘЩ„Ш§Шҙ $attempt ЩҶШ§Щ…ЩҲЩҒЩӮ ШЁЩҲШҜ. 5 Ш«Ш§ЩҶЫҢЩҮ ШөШЁШұ Щ…ЫҢвҖҢЪ©ЩҶЩ…..."
                sleep 5
              fi
            done
          } >> logs/run.log 2>&1

      - name: Save logs after job
        if: always()
        run: |
          cd $GITHUB_WORKSPACE
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -f logs/run.log
          git commit -m "update logs after dispatch-correlation (run ${{ github.run_id }})" || echo "No changes"
          git push origin main || true

  # ============================================================
  # Job 7: Ш°Ш®ЫҢШұЩҮ ЩҶЩҮШ§ЫҢЫҢ Щ„Ш§ЪҜ (ЩҮЩ…ЫҢШҙЩҮ Ш§Ш¬ШұШ§ Щ…ЫҢвҖҢШҙЩҲШҜШҢ Щ…ШіШӘЩӮЩ„ Ш§ШІ Щ…ЩҲЩҒЩӮЫҢШӘ/ШҙЪ©ШіШӘ)
  # ============================================================
  save-logs:
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 0
      - name: commit ЩҲ push ЩҒШ§ЫҢЩ„ Щ„Ш§ЪҜ ЩҲШ§ШӯШҜ
        run: |
          cd $GITHUB_WORKSPACE
          mkdir -p logs
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -f logs/run.log
          if ! git diff --cached --quiet; then
            git commit -m "final update logs (run ${{ github.run_id }})" --allow-empty
            git pull --rebase origin main || true
            git push origin main || true
          else
            echo "ЩҮЫҢЪҶ ШӘШәЫҢЫҢШұЫҢ ШҜШұ Щ„Ш§ЪҜ ЩҲШ¬ЩҲШҜ ЩҶШҜШ§ШұШҜ." >> logs/run.log 2>&1
            git add -f logs/run.log
            git commit -m "final logs (run ${{ github.run_id }})" --allow-empty || true
            git push origin main || true
          fi
