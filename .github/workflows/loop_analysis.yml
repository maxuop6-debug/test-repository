name: Loop Analysis Workflow

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: loop-analysis-runner
  cancel-in-progress: false

jobs:
  # ============================================================
  # Job 0: پاک کردن فایل لاگ در ابتدای اجرا
  # ============================================================
  init-logs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
      - name: Clear log file and commit
        run: |
          mkdir -p logs
          echo -n "" > logs/run.log
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -f logs/run.log
          git commit -m "clear logs for run ${{ github.run_id }}" || echo "No changes"
          git push origin main || true

  # ============================================================
  # Job 1: بررسی پرچم وقفه
  # ============================================================
  check-interrupt:
    needs: init-logs
    runs-on: ubuntu-latest
    outputs:
      force_fixed: ${{ steps.check.outputs.force_fixed }}
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          ref: main
      - name: بررسی پرچم وقفه
        id: check
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          {
            echo "🔍 بررسی پرچم‌های وقفه..."
            HTTP_CODE=$(gh api "repos/$THIRD_REPO/contents/interrupt.flag" -i 2>/dev/null | head -n 1 | cut -d' ' -f2)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "⚠️ پرچم وقفه یافت شد! حذف می‌شود..."
              SHA=$(gh api "repos/$THIRD_REPO/contents/interrupt.flag" -q '.sha')
              gh api "repos/$THIRD_REPO/contents/interrupt.flag" -X DELETE -F message="clear interrupt" -F sha="$SHA" -F branch="main"
              echo "force_fixed=true" >> $GITHUB_OUTPUT
            else
              echo "force_fixed=false" >> $GITHUB_OUTPUT
            fi
          } >> logs/run.log 2>&1
      - name: Save logs after job
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd $GITHUB_WORKSPACE
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -f logs/run.log
          git commit -m "update logs after check-interrupt (run ${{ github.run_id }})" || echo "No changes"
          git push origin main || true

  # ============================================================
  # Job 2: یکپارچه‌سازی نتایج بک‌تست (با clone مخزن سوم و استفاده محلی)
  # ============================================================
  aggregate-results:
    needs: check-interrupt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: 0. نصب jq
        run: |
          if ! command -v jq &> /dev/null; then
            echo "📦 jq یافت نشد. در حال نصب..."
            sudo apt-get update -qq && sudo apt-get install -y -qq jq
            if ! command -v jq &> /dev/null; then
              echo "❌ خطای بحرانی: نصب jq ناموفق بود."
              exit 1
            fi
          fi
          echo "✅ jq آماده است."

      - name: 0.5. پاکسازی فضای موقت
        run: |
          rm -rf /tmp/agg_* /tmp/third_repo 2>/dev/null || true
          echo "✅ پاکسازی فضای موقت انجام شد."

      - name: Clone third repository (shallow clone)
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          git clone --depth 1 https://x-access-token:${GH_TOKEN}@github.com/${THIRD_REPO}.git /tmp/third_repo
          cd /tmp/third_repo
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          echo "✅ مخزن سوم با موفقیت clone شد."

      - name: Clone مخزن OHLC (برای شمارش فایل‌های CSV)
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          OHLC_REPO: ${{ secrets.OHLC_REPO }}
        run: |
          git clone --depth 1 --filter=blob:none --sparse \
            "https://x-access-token:${GH_TOKEN}@github.com/${OHLC_REPO}.git" /tmp/ohlc_repo
          cd /tmp/ohlc_repo
          git sparse-checkout set data/All_Coins_Combined
          echo "✅ مخزن OHLC با موفقیت clone شد."

      - name: یکپارچه‌سازی نتایج بک‌تست (با خواندن محلی فایل‌ها)
        env:
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD || secrets.DATA_PASSWORD }}
        run: |
          {
            echo "=============================================="
            echo "   🔄 شروع یکپارچه‌سازی نتایج بک‌تست (با clone محلی)"
            echo "=============================================="
            echo ""
            echo "0- وضعیت منابع سیستم:"
            df -h /tmp | tail -1
            free -h | grep Mem
            echo ""
            echo "1- دریافت لیست استراتژی‌ها از مخزن سوم (با اسکن محلی)..."
            cd /tmp/third_repo
            if [ ! -d "backtest_results" ]; then
              echo "ℹ️ پوشه backtest_results وجود ندارد. هیچ استراتژی برای یکپارچه‌سازی یافت نشد."
              STRATEGIES_LIST=""
            else
              STRATEGIES_LIST=$(find backtest_results -maxdepth 1 -type d -printf '%f\n' | tail -n +2 | sort -u)
            fi
            if [ -z "$STRATEGIES_LIST" ]; then
              echo "ℹ️ هیچ استراتژی برای یکپارچه‌سازی یافت نشد. job با موفقیت کامل می‌شود."
            else
            echo "   استراتژی‌های یافت شده: $STRATEGIES_LIST"
            echo ""
            for STRAT in $STRATEGIES_LIST; do
              echo "=============================================="
              echo "   📊 پردازش استراتژی: $STRAT"
              echo "=============================================="
              # استخراج BASE_STRAT با حذف پسوندهای تایم‌فریم
              BASE_STRAT=$(echo "$STRAT" | sed 's/_5m$//;s/_15m$//;s/_30m$//;s/_1h$//')
              if [ "$BASE_STRAT" = "$STRAT" ]; then
                echo "   ℹ️ پسوند تایم‌فریم یافت نشد. BASE_STRAT = STRAT = $STRAT"
              else
                echo "   ℹ️ BASE_STRAT: $BASE_STRAT (پسوند تایم‌فریم از $STRAT حذف شد)"
              fi
              AGG_FILE="aggregated/${STRAT}/${STRAT}_trades.enc"
              STATUS_FILE="aggregated/${STRAT}/aggregation_status.json"
              mkdir -p "/tmp/agg_${STRAT}"
              echo "0- بررسی پرچم وضعیت یکپارچه‌سازی برای $STRAT ..."
              if [ -f "/tmp/third_repo/$STATUS_FILE" ]; then
                STATUS_CONTENT=$(cat "/tmp/third_repo/$STATUS_FILE")
                echo "   📄 پرچم وضعیت یافت شد: $STATUS_CONTENT"
                STATUS=$(echo "$STATUS_CONTENT" | jq -r '.status' 2>/dev/null)
                if [ "$STATUS" = "cleaning" ]; then
                  echo "   ⚠️ فرآیند قبلی ناقص مانده. فقط پاکسازی فایل‌های قدیمی انجام می‌شود."
                  FILES_TO_DELETE=$(echo "$STATUS_CONTENT" | jq -r '.files_to_delete[]' 2>/dev/null)
                  echo "   🗑️ شروع پاکسازی فایل‌های باقی‌مانده..."
                  for ENC_PATH in $FILES_TO_DELETE; do
                    echo "   تلاش برای حذف $ENC_PATH ..."
                    rm -f "/tmp/third_repo/$ENC_PATH" 2>/dev/null
                    echo "      ✅ حذف موفق"
                  done
                  echo '{"status": "completed"}' > "/tmp/agg_${STRAT}/status.json"
                  cp "/tmp/agg_${STRAT}/status.json" "/tmp/third_repo/$STATUS_FILE"
                  rm -rf "/tmp/agg_${STRAT}"
                  continue
                elif [ "$STATUS" = "completed" ]; then
                  echo "   ✅ فرآیند قبلی کامل بوده. پاکسازی پرچم وضعیت..."
                  rm -f "/tmp/third_repo/$STATUS_FILE"
                  echo "   ℹ️ همه چیز مرتب است. ادامهٔ کار عادی..."
                fi
              else
                echo "   ℹ️ پرچم وضعیتی وجود ندارد. شروع فرآیند عادی..."
              fi
              echo ""
              echo "2- بررسی وجود فایل یکپارچه قبلی برای $STRAT ..."
              EXISTING_TRADES_FILE="/tmp/agg_${STRAT}/existing_trades.json"
              echo "[]" > "$EXISTING_TRADES_FILE"
              if [ -f "/tmp/third_repo/$AGG_FILE" ]; then
                echo "   📥 فایل یکپارچه قبلی وجود دارد. رمزگشایی..."
                node -e "
                  const crypto=require('crypto'),fs=require('fs');
                  const pass=process.env.RESULTS_PASSWORD;
                  const data=fs.readFileSync('/tmp/third_repo/$AGG_FILE');
                  const key=crypto.scryptSync(pass,'salt',32);
                  const iv=data.slice(0,16),enc=data.slice(16);
                  const decipher=crypto.createDecipheriv('aes-256-cbc',key,iv);
                  const dec=Buffer.concat([decipher.update(enc),decipher.final()]);
                  const parsed=JSON.parse(dec);
                  const trades=parsed.trades !== undefined ? parsed.trades : parsed;
                  fs.writeFileSync('$EXISTING_TRADES_FILE', JSON.stringify(trades));
                "
                if [ $? -eq 0 ] && [ -f "$EXISTING_TRADES_FILE" ]; then
                  echo "   ✅ فایل یکپارچه قبلی با موفقیت بارگذاری شد."
                else
                  echo "   ❌ خطا در رمزگشایی فایل یکپارچه قبلی."
                fi
              else
                echo "   ℹ️ فایل یکپارچه قبلی وجود ندارد. یک فایل جدید ساخته خواهد شد."
              fi
              echo ""
              echo "3- دریافت لیست فایل‌های results.enc برای $STRAT (اسکن محلی)..."
              FILES=$(find "/tmp/third_repo/backtest_results/$STRAT" -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort -u)
              if [ -z "$FILES" ]; then
                echo "   ⚠️ هیچ فایلی در backtest_results/$STRAT یافت نشد."
                continue
              fi
              FILE_COUNT=$(echo "$FILES" | wc -l)
              echo "   📊 تعداد فایل‌های یافت‌شده: $FILE_COUNT"
              echo ""
              echo "3.5- بررسی شرط تعداد فایل‌ها (بر اساس تعداد واقعی CSV در OHLC_REPO)..."
              REQUIRED_FILE_COUNT=$(find /tmp/ohlc_repo/data/All_Coins_Combined -maxdepth 1 -name "*.csv" | wc -l)
              echo "   📊 تعداد فایل‌های مورد انتظار (از OHLC_REPO): $REQUIRED_FILE_COUNT عدد"
              if [ "$FILE_COUNT" -ne "$REQUIRED_FILE_COUNT" ]; then
                echo "   ⚠️ تعداد فایل‌ها ($FILE_COUNT) برابر با $REQUIRED_FILE_COUNT نیست. یکپارچه‌سازی $STRAT انجام نمی‌شود."
                mkdir -p "/tmp/third_repo/aggregated/${STRAT}"
                echo "{\"status\": \"incomplete\", \"file_count\": $FILE_COUNT, \"required_count\": $REQUIRED_FILE_COUNT}" > "/tmp/third_repo/$STATUS_FILE"
                echo "   📝 وضعیت incomplete با تعداد فایل‌ها در $STATUS_FILE ثبت شد."
                rm -rf "/tmp/agg_${STRAT}"
                echo ""
                continue
              fi
              echo "   ✅ تعداد فایل‌ها دقیقاً $REQUIRED_FILE_COUNT است. یکپارچه‌سازی $STRAT انجام می‌شود."
              echo ""
              NEW_TRADES_FILE="/tmp/agg_${STRAT}/new_trades.json"
              echo "[]" > "$NEW_TRADES_FILE"
              SUCCESS_COUNT=0
              FAIL_COUNT=0
              for FOLDER in $FILES; do
                ENC_FILE="/tmp/third_repo/backtest_results/${STRAT}/${FOLDER}/results.enc"
                echo "   📄 پردازش: $ENC_FILE"
                if [ ! -f "$ENC_FILE" ]; then
                  echo "      ❌ فایل یافت نشد. رد می‌شود."
                  FAIL_COUNT=$((FAIL_COUNT + 1))
                  continue
                fi
                echo "      ⏳ رمزگشایی..."
                set +e
                node -e "
                  const crypto=require('crypto'),fs=require('fs');
                  const pass=process.env.RESULTS_PASSWORD;
                  const data=fs.readFileSync('$ENC_FILE');
                  const key=crypto.scryptSync(pass,'salt',32);
                  const iv=data.slice(0,16),enc=data.slice(16);
                  const decipher=crypto.createDecipheriv('aes-256-cbc',key,iv);
                  const dec=Buffer.concat([decipher.update(enc),decipher.final()]);
                  fs.writeFileSync('/tmp/agg_${STRAT}/temp.tar.gz',dec);
                " 2>/tmp/agg_${STRAT}/decrypt_error.log
                NODE_EXIT=$?
                set -e
                if [ $NODE_EXIT -ne 0 ]; then
                  echo "      ❌ خطا در رمزگشایی (کد $NODE_EXIT)."
                  FAIL_COUNT=$((FAIL_COUNT + 1))
                  continue
                fi
                if [ ! -f "/tmp/agg_${STRAT}/temp.tar.gz" ] || [ ! -s "/tmp/agg_${STRAT}/temp.tar.gz" ]; then
                  echo "      ❌ فایل tar.gz خروجی ناقص است."
                  FAIL_COUNT=$((FAIL_COUNT + 1))
                  continue
                fi
                echo "      ✅ رمزگشایی موفق."
                echo "      ⏳ استخراج..."
                tar -xzf "/tmp/agg_${STRAT}/temp.tar.gz" -C "/tmp/agg_${STRAT}/" 2>/tmp/agg_${STRAT}/tar_error.log
                if [ $? -ne 0 ]; then
                  echo "      ❌ خطا در استخراج tar.gz."
                  FAIL_COUNT=$((FAIL_COUNT + 1))
                  rm -f "/tmp/agg_${STRAT}/temp.tar.gz"
                  continue
                fi
                EXTRACTED_DIR="/tmp/agg_${STRAT}/${FOLDER}"
                TRADE_FILE="$EXTRACTED_DIR/trades_summary.json"
                if [ -f "$TRADE_FILE" ]; then
                  echo "      ⏳ خواندن معاملات..."
                  COIN_NAME=$(basename "$FOLDER" | cut -d'-' -f1-2)
                  jq -c --arg sym "$COIN_NAME" '[.trades[] | . + {symbol: $sym}]' "$TRADE_FILE" > "/tmp/agg_${STRAT}/current_trades.json" 2>/dev/null
                  if [ ! -s "/tmp/agg_${STRAT}/current_trades.json" ]; then
                    echo "      ⚠️ آرایه trades خالی یا null است. نادیده گرفته می‌شود."
                    echo "[]" > "/tmp/agg_${STRAT}/current_trades.json"
                  fi
                else
                  echo "      ❌ فایل trades_summary.json یافت نشد."
                  FAIL_COUNT=$((FAIL_COUNT + 1))
                  echo "[]" > "/tmp/agg_${STRAT}/current_trades.json"
                fi
                echo "      ⏳ ادغام با jq..."
                set +e
                jq -s '.[0] + .[1]' "$NEW_TRADES_FILE" "/tmp/agg_${STRAT}/current_trades.json" > "/tmp/agg_${STRAT}/merged_tmp.json"
                JQ_EXIT=$?
                set -e
                if [ $JQ_EXIT -eq 0 ]; then
                  mv "/tmp/agg_${STRAT}/merged_tmp.json" "$NEW_TRADES_FILE"
                  SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
                  echo "      ✅ معاملات ادغام شدند."
                else
                  echo "      ❌ خطا در ادغام JSON (کد $JQ_EXIT)."
                  FAIL_COUNT=$((FAIL_COUNT + 1))
                fi
                rm -rf "$EXTRACTED_DIR" 2>/dev/null
                rm -f "/tmp/agg_${STRAT}/temp.tar.gz" "/tmp/agg_${STRAT}/current_trades.json" "/tmp/agg_${STRAT}/merged_tmp.json"
                echo ""
              done
              echo "   📊 جمع‌بندی پردازش استراتژی $STRAT:"
              echo "      ✅ موفق: $SUCCESS_COUNT"
              echo "      ❌ ناموفق: $FAIL_COUNT"
              echo ""
              if [ ! -s "$NEW_TRADES_FILE" ] || [ "$(cat "$NEW_TRADES_FILE")" = "[]" ]; then
                echo "   ⚠️ هیچ معامله جدیدی برای ادغام وجود ندارد."
              else
                echo "   ⏳ ادغام نهایی با فایل یکپارچه قبلی..."
                set +e
                jq -s '.[0] + .[1]' "$EXISTING_TRADES_FILE" "$NEW_TRADES_FILE" > "/tmp/agg_${STRAT}/combined_trades.json"
                JQ_EXIT=$?
                set -e
                if [ $JQ_EXIT -ne 0 ]; then
                  echo "   ❌ خطا در ادغام نهایی. استفاده از فایل معاملات جدید به تنهایی."
                  cp "$NEW_TRADES_FILE" "/tmp/agg_${STRAT}/combined_trades.json"
                fi
                echo "   ✅ ادغام نهایی کامل شد."

                # ========== مرحله: ساخت یا بارگذاری متادیتا با اولویت .js سپس 1.json ==========
                echo "   📥 بررسی متادیتا برای $STRAT (BASE_STRAT=$BASE_STRAT) (اولویت ۱: .js، اولویت ۲: 1.json)..."
                METADATA_SUCCESS=false
                META_SOURCE=""
                META_FILE="/tmp/third_repo/strategies/${BASE_STRAT}/1.json"
                META_DONE_FLAG="/tmp/third_repo/strategies/${BASE_STRAT}/.metadata_generated"
                JS_FILE="/tmp/third_repo/strategies/${BASE_STRAT}.js"
                STRAT_DIR="/tmp/third_repo/strategies/${BASE_STRAT}/"
                mkdir -p "$STRAT_DIR"

                if [ -f "$JS_FILE" ]; then
                  echo "   🔧 [اولویت ۱] فایل ${JS_FILE} یافت شد → استخراج متادیتا از .js..."
                  set +e
                  node -e "
                    const fs = require('fs');
                    const jsContent = fs.readFileSync('$JS_FILE', 'utf8');

                    let move_percents = [];
                    let source = 'none';

                    const stagesMatch = jsContent.match(/stopLossStages\s*[:=]\s*\[([\s\S]*?)\]/);
                    if (stagesMatch) {
                      const stagesBody = stagesMatch[1];
                      const mpMatches = [...stagesBody.matchAll(/movePercent\s*:\s*([\d.]+)/g)];
                      if (mpMatches.length > 0) {
                        move_percents = mpMatches.map(m => parseFloat(m[1]));
                        source = 'stopLossStages';
                      }
                    }

                    if (move_percents.length === 0) {
                      const mmArr = jsContent.match(/movePercent\s*[:=]\s*\[(.*?)\]/s);
                      if (mmArr) {
                        const numbers = mmArr[1].match(/[\d.]+/g);
                        if (numbers && numbers.length > 0) {
                          move_percents = numbers.map(Number);
                          source = 'movePercent_direct';
                        }
                      }
                    }

                    if (move_percents.length === 0) {
                      source = 'empty_fallback';
                    }

                    console.log('منبع move_percents: ' + source);
                    console.log('move_percents استخراج‌شده (' + move_percents.length + ' عنصر): ' + JSON.stringify(move_percents));

                    let stop_loss = null;
                    let sl_source = 'none';

                    let slMatch = jsContent.match(/stopLossInitial\s*[:=]\s*(-?[\d.]+)/);
                    if (slMatch) {
                      stop_loss = parseFloat(slMatch[1]);
                      sl_source = 'stopLossInitial_direct';
                    } else {
                      const slFormulaMatch = jsContent.match(/stopLoss\s*:\s*close\s*\*\s*([\d.]+)/);
                      if (slFormulaMatch) {
                        const multiplier = parseFloat(slFormulaMatch[1]);
                        stop_loss = parseFloat(((1 - multiplier) * 100).toFixed(6));
                        sl_source = 'stopLoss_close_formula';
                      }
                    }

                    if (stop_loss === null) {
                      console.error('__NO_STOP_LOSS_INITIAL__');
                      process.exit(1);
                    }
                    console.log('منبع stop_loss_initial: ' + sl_source);
                    console.log('stop_loss_initial از .js خوانده شد: ' + stop_loss);
                    let max_move = move_percents.length ? move_percents[move_percents.length-1] : null;
                    const meta = {
                      move_percents: move_percents,
                      stop_loss_initial: stop_loss,
                      max_move_percent: max_move
                    };
                    fs.writeFileSync('$META_FILE', JSON.stringify(meta, null, 2));
                  "
                  JS_META_EXIT=$?
                  set -e

                  if [ $JS_META_EXIT -ne 0 ]; then
                    echo "   ❌ نه stopLossInitial و نه فرمول stopLoss: close * عدد در فایل ${JS_FILE} یافت نشد. هیچ مقدار پیش‌فرضی استفاده نمی‌شود."
                    echo "   ❌ pipeline باید fail شود: stop_loss_initial اجباری است."
                    exit 1
                  fi

                  if [ -s "$META_FILE" ]; then
                    echo "   ✅ متادیتا با موفقیت از .js استخراج و در 1.json ذخیره شد."
                    cp "$META_FILE" "/tmp/agg_${STRAT}/1.json"
                    METADATA_SUCCESS=true
                    META_SOURCE=".js"
                    touch "$META_DONE_FLAG"
                  else
                    echo "   ❌ ساخت فایل 1.json از .js ناموفق بود."
                    rm -rf "/tmp/agg_${STRAT}"
                    continue
                  fi
                fi

                if [ "$METADATA_SUCCESS" = false ]; then
                  echo "   ℹ️ فایل ${JS_FILE} یافت نشد → بازگشت به fallback (1.json)."
                  if [ -f "$META_FILE" ]; then
                    HAS_SL=$(jq 'has("stop_loss_initial") and .stop_loss_initial != null' "$META_FILE")
                    if [ "$HAS_SL" != "true" ]; then
                      echo "   ❌ stop_loss_initial در فایل ${META_FILE} یافت نشد. هیچ مقدار پیش‌فرضی استفاده نمی‌شود."
                      echo "   ❌ pipeline باید fail شود: stop_loss_initial اجباری است."
                      exit 1
                    fi
                    echo "   ✅ فایل 1.json از مخزن محلی یافت شد."
                    MOVE_PERCENTS_LEN=$(jq '(.move_percents // []) | length' "$META_FILE")
                    SL_FROM_JSON=$(jq '.stop_loss_initial' "$META_FILE")
                    echo "   move_percents استخراج‌شده ($MOVE_PERCENTS_LEN عنصر) از ${META_FILE}"
                    echo "   stop_loss_initial از 1.json خوانده شد: $SL_FROM_JSON"
                    cp "$META_FILE" "/tmp/agg_${STRAT}/1.json"
                    METADATA_SUCCESS=true
                    META_SOURCE="1.json"
                    touch "$META_DONE_FLAG"
                  else
                    echo "   ❌ نه فایل ${JS_FILE} و نه فایل ${META_FILE} یافت نشد. این استراتژی رد می‌شود."
                    echo "   ❌ pipeline باید fail شود: هیچ منبع متادیتایی موجود نیست."
                    exit 1
                  fi
                fi

                echo "   ✅ [متادیتا] منبع نهایی برای $STRAT: $META_SOURCE"

                MOVE_PERCENTS=$(jq -c '.move_percents // []' "/tmp/agg_${STRAT}/1.json")
                STOP_LOSS=$(jq '.stop_loss_initial' "/tmp/agg_${STRAT}/1.json")
                if [ "$STOP_LOSS" = "null" ]; then
                  echo "   ❌ stop_loss_initial اجباری است و در متادیتای نهایی یافت نشد."
                  exit 1
                fi
                MAX_MOVE=$(jq '.max_move_percent // (if .move_percents then .move_percents[-1] else null end)' "/tmp/agg_${STRAT}/1.json")

                jq -n \
                  --argjson move_percents "$MOVE_PERCENTS" \
                  --argjson stop_loss "$STOP_LOSS" \
                  --argjson max_move "$MAX_MOVE" \
                  --slurpfile trades "/tmp/agg_${STRAT}/combined_trades.json" \
                  '{trades: $trades[0], metadata: {move_percents: $move_percents, stop_loss_initial: $stop_loss, max_move_percent: $max_move}}' \
                  > "/tmp/agg_${STRAT}/final_package.json"

                echo "4- رمزنگاری فایل یکپارچه جدید (شامل متادیتا)..."
                node -e "
                  const crypto=require('crypto'),fs=require('fs');
                  const pass=process.env.RESULTS_PASSWORD;
                  const data=fs.readFileSync('/tmp/agg_${STRAT}/final_package.json');
                  const key=crypto.scryptSync(pass,'salt',32);
                  const iv=crypto.randomBytes(16);
                  const cipher=crypto.createCipheriv('aes-256-cbc',key,iv);
                  const enc=Buffer.concat([cipher.update(data),cipher.final()]);
                  fs.writeFileSync('/tmp/agg_${STRAT}/final.enc', Buffer.concat([iv,enc]));
                "
                if [ $? -ne 0 ]; then
                  echo "   ❌ خطا در رمزنگاری فایل یکپارچه."
                  continue
                fi
                mkdir -p "/tmp/third_repo/aggregated/${STRAT}"
                cp "/tmp/agg_${STRAT}/final.enc" "/tmp/third_repo/$AGG_FILE"
                echo "   ✅ فایل یکپارچه در مخزن محلی ذخیره شد."

                echo "4.5- ذخیره پرچم شروع پاکسازی..."
                FILES_TO_DELETE_JSON="["
                FIRST=true
                for FOLDER in $FILES; do
                  ENC_PATH="backtest_results/${STRAT}/${FOLDER}/results.enc"
                  if $FIRST; then
                    FILES_TO_DELETE_JSON+="\"$ENC_PATH\""
                    FIRST=false
                  else
                    FILES_TO_DELETE_JSON+=", \"$ENC_PATH\""
                  fi
                done
                FILES_TO_DELETE_JSON+="]"
                echo "{\"status\": \"cleaning\", \"files_to_delete\": $FILES_TO_DELETE_JSON}" > "/tmp/agg_${STRAT}/status.json"
                cp "/tmp/agg_${STRAT}/status.json" "/tmp/third_repo/$STATUS_FILE"

                echo "5- پاک‌سازی results.enc های قدیمی $STRAT ..."
                for FOLDER in $FILES; do
                  ENC_PATH="/tmp/third_repo/backtest_results/${STRAT}/${FOLDER}/results.enc"
                  rm -f "$ENC_PATH" 2>/dev/null && echo "   ✅ حذف موفق $ENC_PATH"
                  rm -rf "/tmp/third_repo/backtest_results/${STRAT}/${FOLDER}" 2>/dev/null
                done

                echo "5.5- به‌روزرسانی پرچم وضعیت به completed..."
                echo '{"status": "completed"}' > "/tmp/agg_${STRAT}/status.json"
                cp "/tmp/agg_${STRAT}/status.json" "/tmp/third_repo/$STATUS_FILE"
                rm -f "/tmp/agg_${STRAT}/status.json"
              fi
              rm -rf "/tmp/agg_${STRAT}"
              echo ""
            done
            fi
            echo "✅ یکپارچه‌سازی کامل شد."
          } >> logs/run.log 2>&1

      - name: Commit and push changes back to third repo
        run: |
          cd /tmp/third_repo
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Aggregate results and clean up processed files"
            PUSH_SUCCESS=false
            for attempt in $(seq 1 10); do
              git pull --rebase || true
              if git push; then
                echo "✅ push موفق بود (تلاش $attempt)."
                PUSH_SUCCESS=true
                break
              fi
              WAIT=$((RANDOM % 10 + 3))
              echo "⚠️ تلاش $attempt ناموفق (non-fast-forward یا conflict). ${WAIT} ثانیه صبر می‌کنم..."
              sleep $WAIT
            done
            if [ "$PUSH_SUCCESS" = "false" ]; then
              echo "❌ push پس از ۱۰ تلاش ناموفق بود."
              exit 1
            fi
          fi

      - name: Save logs after job
        if: always()
        run: |
          cd $GITHUB_WORKSPACE
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -f logs/run.log
          if ! git diff --cached --quiet; then
            git commit -m "update logs after aggregate-results (run ${{ github.run_id }})" --allow-empty
            git pull --rebase origin main || true
            git push origin main || true
          else
            echo "هیچ تغییری در لاگ وجود ندارد." >> logs/run.log 2>&1
            git add -f logs/run.log
            git commit -m "final logs (run ${{ github.run_id }})" --allow-empty || true
            git push origin main || true
          fi

  # ============================================================
  # Job 2.5: تولید گزارش‌های جامع نسخه ۵ از داده‌های یکپارچه
  # ============================================================
  generate-reports:
    needs: aggregate-results
    runs-on: ubuntu-latest
    steps:
      - name: Checkout مخزن اصلی
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: نصب پایتون
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Clone مخزن سوم
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          git clone --depth=1 \
            "https://x-access-token:${GH_TOKEN}@github.com/${THIRD_REPO}.git" \
            /tmp/third_repo

      - name: اجرای loader.py
        env:
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD || secrets.DATA_PASSWORD }}
        run: |
          python modules/loader.py \
            --news-dir data/news \
            --results-dir /tmp/third_repo/aggregated \
            --strategies-dir /tmp/third_repo/strategies \
            --output-news /tmp/news.pickle \
            --output-strategies /tmp/strategies.json

      - name: اجرای calculator_stoploss.py
        env:
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD || secrets.DATA_PASSWORD }}
        run: |
          python modules/calculator_stoploss.py \
            --strategies-json /tmp/strategies.json \
            --results-base /tmp/third_repo/aggregated \
            --strategies-dir /tmp/third_repo/strategies \
            --output /tmp/stoploss.json

      - name: اجرای calculators.py returns
        env:
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD || secrets.DATA_PASSWORD }}
        run: |
          python modules/calculators.py returns \
            --strategies-json /tmp/strategies.json \
            --results-base /tmp/third_repo/aggregated \
            --output /tmp/returns.json \
            --password "$RESULTS_PASSWORD"

      - name: اجرای calculators.py risk
        env:
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD || secrets.DATA_PASSWORD }}
        run: |
          python modules/calculators.py risk \
            --strategies-json /tmp/strategies.json \
            --results-base /tmp/third_repo/aggregated \
            --stoploss-cache /tmp/stoploss.json \
            --output /tmp/risk.json \
            --password "$RESULTS_PASSWORD"

      - name: اجرای calculators.py inverse
        env:
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD || secrets.DATA_PASSWORD }}
        run: |
          python modules/calculators.py inverse \
            --strategies-json /tmp/strategies.json \
            --results-base /tmp/third_repo/aggregated \
            --stoploss-cache /tmp/stoploss.json \
            --output /tmp/inverse.json \
            --password "$RESULTS_PASSWORD"

      - name: اجرای calculators.py report
        env:
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD || secrets.DATA_PASSWORD }}
        run: |
          mkdir -p /tmp/reports
          python modules/calculators.py report \
            --returns-cache /tmp/returns.json \
            --strategies-json /tmp/strategies.json \
            --risk-cache /tmp/risk.json \
            --inverse-cache /tmp/inverse.json \
            --results-base /tmp/third_repo/aggregated \
            --news-pickle /tmp/news.pickle \
            --output-dir /tmp/reports \
            --password "$RESULTS_PASSWORD"

      - name: فشرده‌سازی و رمزنگاری پوشه reports
        env:
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD || secrets.DATA_PASSWORD }}
        run: |
          echo "📦 فشرده‌سازی پوشه /tmp/reports به reports.tar.gz ..."
          tar -czf /tmp/reports.tar.gz -C /tmp reports
          echo "✅ فشرده‌سازی کامل شد."

          echo "🔒 رمزنگاری reports.tar.gz ..."
          node -e "
            const crypto = require('crypto'), fs = require('fs');
            const pass = process.env.RESULTS_PASSWORD;
            const data = fs.readFileSync('/tmp/reports.tar.gz');
            const key = crypto.scryptSync(pass, 'salt', 32);
            const iv = crypto.randomBytes(16);
            const cipher = crypto.createCipheriv('aes-256-cbc', key, iv);
            const enc = Buffer.concat([cipher.update(data), cipher.final()]);
            fs.writeFileSync('/tmp/reports.tar.gz.enc', Buffer.concat([iv, enc]));
          "
          echo "✅ رمزنگاری کامل شد: /tmp/reports.tar.gz.enc"

          echo "🗑️ حذف پوشه /tmp/reports و فایل موقت..."
          rm -rf /tmp/reports /tmp/reports.tar.gz
          echo "✅ پاکسازی انجام شد."

      - name: Commit و Push گزارش‌ها به مخزن سوم
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          cd /tmp/third_repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          rm -rf reports/
          cp /tmp/reports.tar.gz.enc reports.tar.gz.enc
          git add -f reports.tar.gz.enc
          git commit -m "update reports.tar.gz.enc from aggregated data (run ${{ github.run_id }})" || echo "No changes to commit"
          git push origin main

  # ============================================================
  # Job 3: آماده‌سازی صف کارها (ساخت all_combinations.json) با اصلاح کش
  # ============================================================
  prepare-dispatch:
    needs: [aggregate-results, generate-reports]
    runs-on: ubuntu-latest
    outputs:
      total_batches: ${{ steps.queue.outputs.total_batches }}
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          ref: main
      - name: راه‌اندازی پایتون
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: دریافت داده‌های لازم از مخزن سوم
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          mkdir -p logs
          STRATEGIES=$(gh api "repos/$THIRD_REPO/contents/aggregated" -q '.[].name' 2>/dev/null || true)
          if [ -z "$STRATEGIES" ]; then
            echo "❌ دریافت لیست استراتژی‌ها از aggregated ناموفق بود یا خالی برگشت." | tee -a logs/run.log
            # تلاش با منبع پشتیبان: backtest_results
            STRATEGIES=$(gh api "repos/$THIRD_REPO/contents/backtest_results" -q '.[].name' 2>/dev/null || true)
            if [ -z "$STRATEGIES" ]; then
              echo "❌ منبع پشتیبان (backtest_results) نیز خالی است. job متوقف می‌شود." | tee -a logs/run.log
              exit 1
            fi
            echo "⚠️ از منبع پشتیبان backtest_results استفاده شد." | tee -a logs/run.log
          fi
          echo "$STRATEGIES" > /tmp/strategies.txt
          echo "✅ لیست استراتژی‌ها دریافت شد ($(wc -l < /tmp/strategies.txt) مورد)." | tee -a logs/run.log
      - name: ساخت و به‌روزرسانی all_combinations.json (با اسکریپت پایتون اصلاح شده)
        id: queue
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          mkdir -p logs
          {
            echo "🚀 اجرای build_all_queues.py برای ساخت صف کارها..."
            python scripts/build_all_queues.py \
              --progress /tmp/dummy \
              --strategies /tmp/strategies.txt \
              --output-dir /tmp/dummy \
              --batch-size 500 2>&1
            EXIT_CODE=$?
            if [ $EXIT_CODE -ne 0 ]; then
              echo "❌ build_all_queues.py با خطا مواجه شد (کد $EXIT_CODE)"
              exit $EXIT_CODE
            fi
            echo "✅ build_all_queues.py با موفقیت اجرا شد."
          } >> logs/run.log 2>&1

          echo "🔄 دریافت all_combinations.json با retry..." | tee -a logs/run.log
          for attempt in 1 2 3 4 5; do
            TIMESTAMP=$(date +%s%N)
            ALL_COMBOS_CONTENT=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/$THIRD_REPO/contents/all_combinations.json?t=$TIMESTAMP" \
              -H "Accept: application/vnd.github.v3.raw" 2>/dev/null)
            if [ -n "$ALL_COMBOS_CONTENT" ] && [ "$ALL_COMBOS_CONTENT" != "null" ]; then
              TOTAL_COMBOS=$(echo "$ALL_COMBOS_CONTENT" | jq 'length' 2>/dev/null)
              if [ -z "$TOTAL_COMBOS" ] || ! [[ "$TOTAL_COMBOS" =~ ^[0-9]+$ ]]; then
                echo "❌ jq نتوانست طول آرایه را محاسبه کند. پاسخ نامعتبر است." | tee -a logs/run.log
                TOTAL_BATCHES=0
                echo "total_batches=0" >> $GITHUB_OUTPUT
                break
              fi
              TOTAL_BATCHES=$(( (TOTAL_COMBOS + 499) / 500 ))
              echo "total_batches=$TOTAL_BATCHES" >> $GITHUB_OUTPUT
              echo "✅ تعداد بسته‌ها: $TOTAL_BATCHES" | tee -a logs/run.log
              break
            fi
            echo "⏳ تلاش $attempt: فایل در دسترس نیست، 3 ثانیه صبر..." | tee -a logs/run.log
            sleep 3
          done
          if [ -z "$TOTAL_BATCHES" ]; then
            echo "❌ تعداد بسته‌ها صفر در نظر گرفته می‌شود." | tee -a logs/run.log
            echo "total_batches=0" >> $GITHUB_OUTPUT
          fi

      - name: Save logs after job
        if: always()
        run: |
          cd $GITHUB_WORKSPACE
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -f logs/run.log
          git commit -m "update logs after prepare-dispatch (run ${{ github.run_id }})" || echo "No changes"
          git push origin main || true

  # ============================================================
  # Job 4: اجرای fixed jobs (توزیع بسته‌ها) با retry
  # ============================================================
  dispatch-fixed:
    needs: prepare-dispatch
    if: needs.prepare-dispatch.outputs.total_batches != '0'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          ref: main
      - name: فراخوانی analysis_fixed_batch.yml (با retry)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p logs
          {
            echo "🔄 فراخوانی analysis_fixed_batch.yml..."
            SUCCESS=false
            for attempt in 1 2 3; do
              if gh workflow run analysis_fixed_batch.yml --ref main 2>&1; then
                echo "✅ فراخوانی analysis_fixed_batch.yml موفق بود (تلاش $attempt)."
                SUCCESS=true
                break
              else
                echo "⚠️ تلاش $attempt ناموفق بود. 5 ثانیه صبر می‌کنم..."
                sleep 5
              fi
            done
            if [ "$SUCCESS" = "false" ]; then
              echo "❌ هر سه تلاش برای dispatch-fixed ناموفق بود."
              exit 1
            fi
          } >> logs/run.log 2>&1
      - name: Save logs after job
        if: always()
        run: |
          cd $GITHUB_WORKSPACE
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -f logs/run.log
          git commit -m "update logs after dispatch-fixed (run ${{ github.run_id }})" || echo "No changes"
          git push origin main || true

  # ============================================================
  # Job 5a: ساخت صف golden (قبل از dispatch-golden)
  # ============================================================
  prepare-golden-queue:
    needs: [prepare-dispatch, dispatch-fixed]
    if: |
      always() &&
      needs.prepare-dispatch.result == 'success' &&
      (needs.dispatch-fixed.result == 'success' || needs.dispatch-fixed.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          ref: main
      - name: بررسی خالی بودن واقعی all_combinations.json
        id: check_queue_done
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          mkdir -p logs
          CONTENT=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$THIRD_REPO/contents/all_combinations.json?t=$(date +%s)" \
            -H "Accept: application/vnd.github.v3.raw" 2>/dev/null || echo "")
          if [ -z "$CONTENT" ] || [ "$CONTENT" = "null" ]; then
            echo "✅ all_combinations.json وجود ندارد یا خالی است. golden اجرا می‌شود." | tee -a logs/run.log
            echo "can_run=true" >> $GITHUB_OUTPUT
          else
            LEN=$(echo "$CONTENT" | jq 'length' 2>/dev/null || echo "-1")
            if [ "$LEN" = "0" ]; then
              echo "✅ all_combinations.json طول صفر دارد. batch‌ها کامل شدند. golden اجرا می‌شود." | tee -a logs/run.log
              echo "can_run=true" >> $GITHUB_OUTPUT
            else
              echo "⏳ all_combinations.json هنوز $LEN ترکیب دارد. golden اجرا نمی‌شود." | tee -a logs/run.log
              echo "can_run=false" >> $GITHUB_OUTPUT
            fi
          fi
      - name: راه‌اندازی پایتون
        if: steps.check_queue_done.outputs.can_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: ساخت و به‌روزرسانی all_combinations_golden.json
        if: steps.check_queue_done.outputs.can_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          mkdir -p logs
          {
            echo "🚀 اجرای build_all_queues.py برای ساخت صف golden..."
            python scripts/build_all_queues.py \
              --progress /tmp/dummy \
              --output-dir /tmp/dummy \
              --batch-size 500 2>&1
            EXIT_CODE=$?
            if [ $EXIT_CODE -ne 0 ]; then
              echo "❌ build_all_queues.py (golden queue) با خطا مواجه شد (کد $EXIT_CODE)"
              exit $EXIT_CODE
            fi
            echo "✅ build_all_queues.py (golden queue) با موفقیت اجرا شد."
          } >> logs/run.log 2>&1
      - name: Save logs after job
        if: always()
        run: |
          cd $GITHUB_WORKSPACE
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -f logs/run.log
          git commit -m "update logs after prepare-golden-queue (run ${{ github.run_id }})" || echo "No changes"
          git push origin main || true

  # ============================================================
  # Job 5: اجرای golden (پس از آماده‌سازی صف golden)
  # ============================================================
  dispatch-golden:
    needs: [prepare-dispatch, prepare-golden-queue]
    if: |
      always() &&
      needs.prepare-dispatch.result == 'success' &&
      needs.prepare-golden-queue.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          ref: main

      - name: بررسی پرچم وقفه و وضعیت قبلی golden
        id: status_check
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          mkdir -p logs
          {
            echo "🔍 بررسی پرچم وقفه..."
            if gh api "repos/$THIRD_REPO/contents/interrupt.flag" -i 2>/dev/null | head -n1 | grep -q 200; then
              echo "⚠️ پرچم وقفه فعال است. golden اجرا نخواهد شد."
              echo "should_run=false" >> $GITHUB_OUTPUT
              exit 0
            fi

            # بررسی خالی بودن صف golden
            EMPTY=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/$THIRD_REPO/contents/all_combinations_golden.json?t=$(date +%s)" \
              -H "Accept: application/vnd.github.v3.raw" | jq -e 'length == 0' 2>/dev/null || echo "false")
            if [ "$EMPTY" = "true" ]; then
              echo "ℹ️ صف golden خالی است. این ماژول کامل شده."
              echo "should_run=false" >> $GITHUB_OUTPUT
              exit 0
            fi

            echo "should_run=true" >> $GITHUB_OUTPUT
          } >> logs/run.log 2>&1

      - name: فراخوانی analysis_golden.yml
        if: steps.status_check.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p logs
          {
            echo "🔄 فراخوانی analysis_golden.yml..."
            SUCCESS=false
            for attempt in 1 2 3; do
              if gh workflow run analysis_golden.yml --ref main 2>&1; then
                echo "✅ فراخوانی golden موفق بود (تلاش $attempt)."
                SUCCESS=true
                break
              else
                echo "⚠️ تلاش $attempt ناموفق بود. 5 ثانیه صبر می‌کنم..."
                sleep 5
              fi
            done
            if [ "$SUCCESS" = "false" ]; then
              echo "❌ هر سه تلاش برای dispatch-golden ناموفق بود."
              exit 1
            fi
          } >> logs/run.log 2>&1

      - name: Save logs after job
        if: always()
        run: |
          cd $GITHUB_WORKSPACE
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -f logs/run.log
          git commit -m "update logs after dispatch-golden (run ${{ github.run_id }})" || echo "No changes"
          git push origin main || true

  # ============================================================
  # Job 5c: ساخت صف portfolios (قبل از dispatch-portfolios)
  # ============================================================
  prepare-portfolios-queue:
    needs: [prepare-dispatch, dispatch-correlation]
    if: |
      always() &&
      needs.prepare-dispatch.result == 'success' &&
      (needs.dispatch-correlation.result == 'success' || needs.dispatch-correlation.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          ref: main
      - name: راه‌اندازی پایتون
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: ساخت و به‌روزرسانی all_combinations_portfolios.json
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD || secrets.DATA_PASSWORD }}
        run: |
          mkdir -p logs
          {
            pip install pandas pyarrow --quiet --break-system-packages 2>&1 || \
              pip install pandas pyarrow --quiet 2>&1
            echo "🚀 اجرای build_all_queues.py برای ساخت صف portfolios..."
            python scripts/build_all_queues.py \
              --progress /tmp/dummy \
              --output-dir /tmp/dummy \
              --batch-size 500 \
              --min-score 45 2>&1
            EXIT_CODE=$?
            if [ $EXIT_CODE -ne 0 ]; then
              echo "❌ build_all_queues.py (portfolios queue) با خطا مواجه شد (کد $EXIT_CODE)"
              exit $EXIT_CODE
            fi
            echo "✅ build_all_queues.py (portfolios queue) با موفقیت اجرا شد."
          } >> logs/run.log 2>&1
      - name: Save logs after job
        if: always()
        run: |
          cd $GITHUB_WORKSPACE
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -f logs/run.log
          git commit -m "update logs after prepare-portfolios-queue (run ${{ github.run_id }})" || echo "No changes"
          git push origin main || true

  # ============================================================
  # Job 6: اجرای portfolios (پس از آماده‌سازی صف portfolios)
  # ============================================================
  dispatch-portfolios:
    needs: [prepare-dispatch, prepare-portfolios-queue]
    if: |
      always() &&
      needs.prepare-dispatch.result == 'success' &&
      needs.prepare-portfolios-queue.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          ref: main

      - name: بررسی پرچم وقفه و وضعیت قبلی portfolios
        id: status_check
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          mkdir -p logs
          {
            echo "🔍 بررسی پرچم وقفه..."
            if gh api "repos/$THIRD_REPO/contents/interrupt.flag" -i 2>/dev/null | head -n1 | grep -q 200; then
              echo "⚠️ پرچم وقفه فعال است. portfolios اجرا نخواهد شد."
              echo "should_run=false" >> $GITHUB_OUTPUT
              exit 0
            fi

            EMPTY=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/$THIRD_REPO/contents/all_combinations_portfolios.json?t=$(date +%s)" \
              -H "Accept: application/vnd.github.v3.raw" | jq -e 'length == 0' 2>/dev/null || echo "false")
            if [ "$EMPTY" = "true" ]; then
              echo "ℹ️ صف portfolios خالی است. این ماژول کامل شده."
              echo "should_run=false" >> $GITHUB_OUTPUT
              exit 0
            fi

            echo "should_run=true" >> $GITHUB_OUTPUT
          } >> logs/run.log 2>&1

      - name: فراخوانی analysis_portfolios.yml
        if: steps.status_check.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p logs
          {
            echo "🔄 فراخوانی analysis_portfolios.yml..."
            SUCCESS=false
            for attempt in 1 2 3; do
              if gh workflow run analysis_portfolios.yml --ref main 2>&1; then
                echo "✅ فراخوانی portfolios موفق بود (تلاش $attempt)."
                SUCCESS=true
                break
              else
                echo "⚠️ تلاش $attempt ناموفق بود. 5 ثانیه صبر می‌کنم..."
                sleep 5
              fi
            done
            if [ "$SUCCESS" = "false" ]; then
              echo "❌ هر سه تلاش برای dispatch-portfolios ناموفق بود."
              exit 1
            fi
          } >> logs/run.log 2>&1

      - name: Save logs after job
        if: always()
        run: |
          cd $GITHUB_WORKSPACE
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -f logs/run.log
          git commit -m "update logs after dispatch-portfolios (run ${{ github.run_id }})" || echo "No changes"
          git push origin main || true

  # ============================================================
  # Job 6b: ساخت صف correlation (قبل از dispatch-correlation)
  # ============================================================
  prepare-correlation-queue:
    needs: [prepare-dispatch, dispatch-golden]
    if: |
      always() &&
      needs.prepare-dispatch.result == 'success' &&
      (needs.dispatch-golden.result == 'success' || needs.dispatch-golden.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          ref: main
      - name: راه‌اندازی پایتون
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: ساخت و به‌روزرسانی all_combinations_correlation.json
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          mkdir -p logs
          {
            echo "🚀 اجرای build_all_queues.py برای ساخت صف correlation..."
            python scripts/build_all_queues.py \
              --progress /tmp/dummy \
              --output-dir /tmp/dummy \
              --batch-size 500 2>&1
            EXIT_CODE=$?
            if [ $EXIT_CODE -ne 0 ]; then
              echo "❌ build_all_queues.py (correlation queue) با خطا مواجه شد (کد $EXIT_CODE)"
              exit $EXIT_CODE
            fi
            echo "✅ build_all_queues.py (correlation queue) با موفقیت اجرا شد."
          } >> logs/run.log 2>&1
      - name: Save logs after job
        if: always()
        run: |
          cd $GITHUB_WORKSPACE
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -f logs/run.log
          git commit -m "update logs after prepare-correlation-queue (run ${{ github.run_id }})" || echo "No changes"
          git push origin main || true

  # ============================================================
  # Job 6.5: اجرای correlation (پس از آماده‌سازی صف correlation)
  # ============================================================
  dispatch-correlation:
    needs: [prepare-dispatch, prepare-correlation-queue]
    if: |
      always() &&
      needs.prepare-dispatch.result == 'success' &&
      needs.prepare-correlation-queue.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          ref: main

      - name: بررسی پرچم وقفه و وضعیت قبلی correlation
        id: status_check
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          mkdir -p logs
          {
            echo "🔍 بررسی پرچم وقفه..."
            if gh api "repos/$THIRD_REPO/contents/interrupt.flag" -i 2>/dev/null | head -n1 | grep -q 200; then
              echo "⚠️ پرچم وقفه فعال است. correlation اجرا نخواهد شد."
              echo "should_run=false" >> $GITHUB_OUTPUT
              exit 0
            fi

            EMPTY=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/$THIRD_REPO/contents/all_combinations_correlation.json?t=$(date +%s)" \
              -H "Accept: application/vnd.github.v3.raw" | jq -e 'length == 0' 2>/dev/null || echo "false")
            if [ "$EMPTY" = "true" ]; then
              echo "ℹ️ صف correlation خالی است. این ماژول کامل شده."
              echo "should_run=false" >> $GITHUB_OUTPUT
              exit 0
            fi

            echo "should_run=true" >> $GITHUB_OUTPUT
          } >> logs/run.log 2>&1

      - name: فراخوانی analysis_correlation.yml
        if: steps.status_check.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p logs
          {
            echo "🔄 فراخوانی analysis_correlation.yml..."
            SUCCESS=false
            for attempt in 1 2 3; do
              if gh workflow run analysis_correlation.yml --ref main 2>&1; then
                echo "✅ فراخوانی correlation موفق بود (تلاش $attempt)."
                SUCCESS=true
                break
              else
                echo "⚠️ تلاش $attempt ناموفق بود. 5 ثانیه صبر می‌کنم..."
                sleep 5
              fi
            done
            if [ "$SUCCESS" = "false" ]; then
              echo "❌ هر سه تلاش برای dispatch-correlation ناموفق بود."
              exit 1
            fi
          } >> logs/run.log 2>&1

      - name: Save logs after job
        if: always()
        run: |
          cd $GITHUB_WORKSPACE
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -f logs/run.log
          git commit -m "update logs after dispatch-correlation (run ${{ github.run_id }})" || echo "No changes"
          git push origin main || true

  # ============================================================
  # Job 7: ذخیره نهایی لاگ (همیشه اجرا می‌شود، مستقل از موفقیت/شکست)
  # ============================================================
  save-logs:
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 0
      - name: commit و push فایل لاگ واحد
        run: |
          cd $GITHUB_WORKSPACE
          mkdir -p logs
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -f logs/run.log
          if ! git diff --cached --quiet; then
            git commit -m "final update logs (run ${{ github.run_id }})" --allow-empty
            git pull --rebase origin main || true
            git push origin main || true
          else
            echo "هیچ تغییری در لاگ وجود ندارد." >> logs/run.log 2>&1
            git add -f logs/run.log
            git commit -m "final logs (run ${{ github.run_id }})" --allow-empty || true
            git push origin main || true
          fi
