                break
              else
                echo "⚠️ تلاش $attempt ناموفق بود. 5 ثانیه صبر می‌کنم..."
                sleep 5
              fi
            done
          } >> logs/run.log 2>&1

      - name: بررسی یکپارچه‌سازی جدید و فعال‌سازی وقفه در صورت نیاز
        if: steps.status_check.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
