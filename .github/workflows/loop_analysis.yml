name: Loop Analysis Workflow

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: loop-runner
  cancel-in-progress: false

jobs:
  # ============================================================
  # Job 0: پاک کردن فایل لاگ در ابتدای اجرا
  # ============================================================
  init-logs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
      - name: Clear log file and commit
        run: |
          mkdir -p logs
          echo -n "" > logs/run.log
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -f logs/run.log
          git commit -m "clear logs for run ${{ github.run_id }}" || echo "No changes"
          git push origin main || true

  # ============================================================
  # Job 1: بررسی پرچم وقفه
  # ============================================================
  check-interrupt:
    needs: init-logs
    runs-on: ubuntu-latest
    outputs:
      force_fixed: ${{ steps.check.outputs.force_fixed }}
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          ref: main
      - name: بررسی پرچم وقفه
        id: check
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          {
            echo "🔍 بررسی پرچم‌های وقفه..."
            HTTP_CODE=$(gh api "repos/$THIRD_REPO/contents/interrupt.flag" -i 2>/dev/null | head -n 1 | cut -d' ' -f2)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "⚠️ پرچم وقفه یافت شد! حذف می‌شود..."
              SHA=$(gh api "repos/$THIRD_REPO/contents/interrupt.flag" -q '.sha')
              gh api "repos/$THIRD_REPO/contents/interrupt.flag" -X DELETE -F message="clear interrupt" -F sha="$SHA" -F branch="main"
              echo "force_fixed=true" >> $GITHUB_OUTPUT
            else
              echo "force_fixed=false" >> $GITHUB_OUTPUT
            fi
          } >> logs/run.log 2>&1
      - name: Save logs after job
        if: always()
        run: |
          cd $GITHUB_WORKSPACE
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -f logs/run.log
          git commit -m "update logs after check-interrupt (run ${{ github.run_id }})" || echo "No changes"
          git push origin main || true

  # ============================================================
  # Job 2: یکپارچه‌سازی نتایج بک‌تست (با clone مخزن سوم و استفاده محلی)
  # ============================================================
  aggregate-results:
    needs: check-interrupt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: 0. نصب jq
        run: |
          if ! command -v jq &> /dev/null; then
            echo "📦 jq یافت نشد. در حال نصب..."
            sudo apt-get update -qq && sudo apt-get install -y -qq jq
            if ! command -v jq &> /dev/null; then
              echo "❌ خطای بحرانی: نصب jq ناموفق بود."
              exit 1
            fi
          fi
          echo "✅ jq آماده است."

      - name: 0.5. پاکسازی فضای موقت
        run: |
          rm -rf /tmp/agg_* /tmp/third_repo 2>/dev/null || true
          echo "✅ پاکسازی فضای موقت انجام شد."

      - name: Clone third repository (shallow clone)
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          git clone --depth 1 https://x-access-token:${GH_TOKEN}@github.com/${THIRD_REPO}.git /tmp/third_repo
          cd /tmp/third_repo
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          echo "✅ مخزن سوم با موفقیت clone شد."

      - name: یکپارچه‌سازی نتایج بک‌تست (با خواندن محلی فایل‌ها)
        env:
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD || secrets.DATA_PASSWORD }}
        run: |
          set +e
          {
            echo "=============================================="
            echo "   🔄 شروع یکپارچه‌سازی نتایج بک‌تست (با clone محلی)"
            echo "=============================================="
            echo ""
            echo "0- وضعیت منابع سیستم:"
            df -h /tmp | tail -1
            free -h | grep Mem
            echo ""
            echo "1- دریافت لیست استراتژی‌ها از مخزن سوم (با اسکن محلی)..."
            cd /tmp/third_repo
            STRATEGIES_LIST=$(find backtest_results -maxdepth 1 -type d -printf '%f\n' | tail -n +2 | sort -u)
            if [ -z "$STRATEGIES_LIST" ]; then
              echo "⚠️ هیچ استراتژی در backtest_results یافت نشد."
              exit 0
            fi
            echo "   استراتژی‌های یافت شده: $STRATEGIES_LIST"
            echo ""
            for STRAT in $STRATEGIES_LIST; do
              echo "=============================================="
              echo "   📊 پردازش استراتژی: $STRAT"
              echo "=============================================="
              AGG_FILE="aggregated/${STRAT}/${STRAT}_trades.enc"
              STATUS_FILE="aggregated/${STRAT}/aggregation_status.json"
              mkdir -p "/tmp/agg_${STRAT}"
              echo "0- بررسی پرچم وضعیت یکپارچه‌سازی برای $STRAT ..."
              if [ -f "/tmp/third_repo/$STATUS_FILE" ]; then
                STATUS_CONTENT=$(cat "/tmp/third_repo/$STATUS_FILE")
                echo "   📄 پرچم وضعیت یافت شد: $STATUS_CONTENT"
                STATUS=$(echo "$STATUS_CONTENT" | jq -r '.status' 2>/dev/null)
                if [ "$STATUS" = "cleaning" ]; then
                  echo "   ⚠️ فرآیند قبلی ناقص مانده. فقط پاکسازی فایل‌های قدیمی انجام می‌شود."
                  FILES_TO_DELETE=$(echo "$STATUS_CONTENT" | jq -r '.files_to_delete[]' 2>/dev/null)
                  echo "   🗑️ شروع پاکسازی فایل‌های باقی‌مانده..."
                  for ENC_PATH in $FILES_TO_DELETE; do
                    echo "   تلاش برای حذف $ENC_PATH ..."
                    rm -f "/tmp/third_repo/$ENC_PATH" 2>/dev/null
                    echo "      ✅ حذف موفق"
                  done
                  echo '{"status": "completed"}' > "/tmp/agg_${STRAT}/status.json"
                  cp "/tmp/agg_${STRAT}/status.json" "/tmp/third_repo/$STATUS_FILE"
                  rm -rf "/tmp/agg_${STRAT}"
                  continue
                elif [ "$STATUS" = "completed" ]; then
                  echo "   ✅ فرآیند قبلی کامل بوده. پاکسازی پرچم وضعیت..."
                  rm -f "/tmp/third_repo/$STATUS_FILE"
                  echo "   ℹ️ همه چیز مرتب است. ادامهٔ کار عادی..."
                fi
              else
                echo "   ℹ️ پرچم وضعیتی وجود ندارد. شروع فرآیند عادی..."
              fi
              echo ""
              echo "2- بررسی وجود فایل یکپارچه قبلی برای $STRAT ..."
              EXISTING_TRADES_FILE="/tmp/agg_${STRAT}/existing_trades.json"
              echo "[]" > "$EXISTING_TRADES_FILE"
              if [ -f "/tmp/third_repo/$AGG_FILE" ]; then
                echo "   📥 فایل یکپارچه قبلی وجود دارد. رمزگشایی..."
                node -e "
                  const crypto=require('crypto'),fs=require('fs');
                  const pass=process.env.RESULTS_PASSWORD;
                  const data=fs.readFileSync('/tmp/third_repo/$AGG_FILE');
                  const key=crypto.scryptSync(pass,'salt',32);
                  const iv=data.slice(0,16),enc=data.slice(16);
                  const decipher=crypto.createDecipheriv('aes-256-cbc',key,iv);
                  const dec=Buffer.concat([decipher.update(enc),decipher.final()]);
                  fs.writeFileSync('$EXISTING_TRADES_FILE',dec);
                "
                if [ $? -eq 0 ] && [ -f "$EXISTING_TRADES_FILE" ]; then
                  echo "   ✅ فایل یکپارچه قبلی با موفقیت بارگذاری شد."
                else
                  echo "   ❌ خطا در رمزگشایی فایل یکپارچه قبلی."
                fi
              else
                echo "   ℹ️ فایل یکپارچه قبلی وجود ندارد. یک فایل جدید ساخته خواهد شد."
              fi
              echo ""
              echo "3- دریافت لیست فایل‌های results.enc برای $STRAT (اسکن محلی)..."
              FILES=$(find "/tmp/third_repo/backtest_results/$STRAT" -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort -u)
              if [ -z "$FILES" ]; then
                echo "   ⚠️ هیچ فایلی در backtest_results/$STRAT یافت نشد."
                continue
              fi
              FILE_COUNT=$(echo "$FILES" | wc -l)
              echo "   📊 تعداد فایل‌های یافت‌شده: $FILE_COUNT"
              echo ""
              echo "3.5- بررسی شرط تعداد فایل‌ها (باید دقیقاً ۱۱۰۶ باشد)..."
              REQUIRED_FILE_COUNT=1106
              if [ "$FILE_COUNT" -ne "$REQUIRED_FILE_COUNT" ]; then
                echo "   ⚠️ تعداد فایل‌ها ($FILE_COUNT) برابر با $REQUIRED_FILE_COUNT نیست. یکپارچه‌سازی $STRAT انجام نمی‌شود."
                mkdir -p "/tmp/third_repo/aggregated/${STRAT}"
                echo "{\"status\": \"incomplete\", \"file_count\": $FILE_COUNT, \"required_count\": $REQUIRED_FILE_COUNT}" > "/tmp/third_repo/$STATUS_FILE"
                echo "   📝 وضعیت incomplete با تعداد فایل‌ها در $STATUS_FILE ثبت شد."
                rm -rf "/tmp/agg_${STRAT}"
                echo ""
                continue
              fi
              echo "   ✅ تعداد فایل‌ها دقیقاً $REQUIRED_FILE_COUNT است. یکپارچه‌سازی $STRAT انجام می‌شود."
              echo ""
              NEW_TRADES_FILE="/tmp/agg_${STRAT}/new_trades.json"
              echo "[]" > "$NEW_TRADES_FILE"
              SUCCESS_COUNT=0
              FAIL_COUNT=0
              for FOLDER in $FILES; do
                ENC_FILE="/tmp/third_repo/backtest_results/${STRAT}/${FOLDER}/results.enc"
                echo "   📄 پردازش: $ENC_FILE"
                if [ ! -f "$ENC_FILE" ]; then
                  echo "      ❌ فایل یافت نشد. رد می‌شود."
                  FAIL_COUNT=$((FAIL_COUNT + 1))
                  continue
                fi
                echo "      ⏳ رمزگشایی..."
                set +e
                node -e "
                  const crypto=require('crypto'),fs=require('fs');
                  const pass=process.env.RESULTS_PASSWORD;
                  const data=fs.readFileSync('$ENC_FILE');
                  const key=crypto.scryptSync(pass,'salt',32);
                  const iv=data.slice(0,16),enc=data.slice(16);
                  const decipher=crypto.createDecipheriv('aes-256-cbc',key,iv);
                  const dec=Buffer.concat([decipher.update(enc),decipher.final()]);
                  fs.writeFileSync('/tmp/agg_${STRAT}/temp.tar.gz',dec);
                " 2>/tmp/agg_${STRAT}/decrypt_error.log
                NODE_EXIT=$?
                set -e
                if [ $NODE_EXIT -ne 0 ]; then
                  echo "      ❌ خطا در رمزگشایی (کد $NODE_EXIT)."
                  FAIL_COUNT=$((FAIL_COUNT + 1))
                  continue
                fi
                if [ ! -f "/tmp/agg_${STRAT}/temp.tar.gz" ] || [ ! -s "/tmp/agg_${STRAT}/temp.tar.gz" ]; then
                  echo "      ❌ فایل tar.gz خروجی ناقص است."
                  FAIL_COUNT=$((FAIL_COUNT + 1))
                  continue
                fi
                echo "      ✅ رمزگشایی موفق."
                echo "      ⏳ استخراج..."
                tar -xzf "/tmp/agg_${STRAT}/temp.tar.gz" -C "/tmp/agg_${STRAT}/" 2>/tmp/agg_${STRAT}/tar_error.log
                if [ $? -ne 0 ]; then
                  echo "      ❌ خطا در استخراج tar.gz."
                  FAIL_COUNT=$((FAIL_COUNT + 1))
                  rm -f "/tmp/agg_${STRAT}/temp.tar.gz"
                  continue
                fi
                EXTRACTED_DIR="/tmp/agg_${STRAT}/${FOLDER}"
                TRADE_FILE="$EXTRACTED_DIR/trades_summary.json"
                if [ -f "$TRADE_FILE" ]; then
                  echo "      ⏳ خواندن معاملات..."
                  COIN_NAME=$(basename "$FOLDER" | cut -d'-' -f1)
                  jq -c --arg sym "$COIN_NAME" '[.trades[] | . + {symbol: $sym}]' "$TRADE_FILE" > "/tmp/agg_${STRAT}/current_trades.json" 2>/dev/null
                  if [ ! -s "/tmp/agg_${STRAT}/current_trades.json" ]; then
                    echo "      ⚠️ آرایه trades خالی یا null است. نادیده گرفته می‌شود."
                    echo "[]" > "/tmp/agg_${STRAT}/current_trades.json"
                  fi
                else
                  echo "      ❌ فایل trades_summary.json یافت نشد."
                  FAIL_COUNT=$((FAIL_COUNT + 1))
                  echo "[]" > "/tmp/agg_${STRAT}/current_trades.json"
                fi
                echo "      ⏳ ادغام با jq..."
                set +e
                jq -s '.[0] + .[1]' "$NEW_TRADES_FILE" "/tmp/agg_${STRAT}/current_trades.json" > "/tmp/agg_${STRAT}/merged_tmp.json"
                JQ_EXIT=$?
                set -e
                if [ $JQ_EXIT -eq 0 ]; then
                  mv "/tmp/agg_${STRAT}/merged_tmp.json" "$NEW_TRADES_FILE"
                  SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
                  echo "      ✅ معاملات ادغام شدند."
                else
                  echo "      ❌ خطا در ادغام JSON (کد $JQ_EXIT)."
                  FAIL_COUNT=$((FAIL_COUNT + 1))
                fi
                rm -rf "$EXTRACTED_DIR" 2>/dev/null
                rm -f "/tmp/agg_${STRAT}/temp.tar.gz" "/tmp/agg_${STRAT}/current_trades.json" "/tmp/agg_${STRAT}/merged_tmp.json"
                echo ""
              done
              echo "   📊 جمع‌بندی پردازش استراتژی $STRAT:"
              echo "      ✅ موفق: $SUCCESS_COUNT"
              echo "      ❌ ناموفق: $FAIL_COUNT"
              echo ""
              if [ ! -s "$NEW_TRADES_FILE" ] || [ "$(cat "$NEW_TRADES_FILE")" = "[]" ]; then
                echo "   ⚠️ هیچ معامله جدیدی برای ادغام وجود ندارد."
              else
                echo "   ⏳ ادغام نهایی با فایل یکپارچه قبلی..."
                set +e
                jq -s '.[0] + .[1]' "$EXISTING_TRADES_FILE" "$NEW_TRADES_FILE" > "/tmp/agg_${STRAT}/combined_trades.json"
                JQ_EXIT=$?
                set -e
                if [ $JQ_EXIT -ne 0 ]; then
                  echo "   ❌ خطا در ادغام نهایی. استفاده از فایل معاملات جدید به تنهایی."
                  cp "$NEW_TRADES_FILE" "/tmp/agg_${STRAT}/combined_trades.json"
                fi
                echo "   ✅ ادغام نهایی کامل شد."

                # ========== مرحله: ساخت یا بارگذاری متادیتا (1.json) با پرچم skip ==========
                echo "   📥 بررسی متادیتا (1.json) برای $STRAT ..."
                METADATA_SUCCESS=false
                META_FILE="/tmp/third_repo/strategies/${STRAT}/1.json"
                META_DONE_FLAG="/tmp/third_repo/strategies/${STRAT}/.metadata_generated"

                if [ -f "$META_DONE_FLAG" ] && [ -f "$META_FILE" ]; then
                  echo "   ⏭️ پرچم skip یافت شد → متادیتا قبلاً برای $STRAT ساخته شده. رد می‌شود."
                  cp "$META_FILE" "/tmp/agg_${STRAT}/1.json"
                  METADATA_SUCCESS=true
                fi

                if [ "$METADATA_SUCCESS" = false ] && [ -f "$META_FILE" ]; then
                  echo "   ✅ فایل 1.json از مخزن محلی یافت شد."
                  cp "$META_FILE" "/tmp/agg_${STRAT}/1.json"
                  METADATA_SUCCESS=true
                  touch "$META_DONE_FLAG"
                  echo "   🏁 پرچم skip برای $STRAT ثبت شد."
                fi

                if [ "$METADATA_SUCCESS" = false ]; then
                  echo "   ⚠️ فایل 1.json یافت نشد. در حال ساخت خودکار از روی فایل استراتژی..."
                  STRAT_DIR="/tmp/third_repo/strategies/${STRAT}/"
                  mkdir -p "$STRAT_DIR"
                  JS_FILE="/tmp/third_repo/strategies/${STRAT}.js"
                  if [ ! -f "$JS_FILE" ]; then
                    echo "   ❌ فایل استراتژی ${STRAT}.js در مخزن سوم یافت نشد. این استراتژی رد می‌شود."
                    rm -rf "/tmp/agg_${STRAT}"
                    continue
                  fi
                  echo "   🔧 ساخت 1.json از روی ${JS_FILE}..."
                  node -e "
                    const fs = require('fs');
                    const jsContent = fs.readFileSync('$JS_FILE', 'utf8');
                    let moveMatch = jsContent.match(/movePercent\s*:\s*\[(.*?)\]/s);
                    let move_percents = [];
                    if (moveMatch) {
                      let numbers = moveMatch[1].match(/[\d.]+/g);
                      if (numbers) move_percents = numbers.map(Number);
                    }
                    let slMatch = jsContent.match(/stopLossInitial\s*:\s*([\d.-]+)/);
                    let stop_loss = slMatch ? parseFloat(slMatch[1]) : -2.0;
                    let max_move = move_percents.length ? move_percents[move_percents.length-1] : null;
                    const meta = {
                      move_percents: move_percents,
                      stop_loss_initial: stop_loss,
                      max_move_percent: max_move
                    };
                    fs.writeFileSync('$META_FILE', JSON.stringify(meta, null, 2));
                  "
                  if [ -s "$META_FILE" ]; then
                    echo "   ✅ فایل 1.json با موفقیت ساخته شد."
                    cp "$META_FILE" "/tmp/agg_${STRAT}/1.json"
                    METADATA_SUCCESS=true
                    touch "$META_DONE_FLAG"
                    echo "   🏁 پرچم skip برای $STRAT ثبت شد."
                  else
                    echo "   ❌ ساخت فایل 1.json ناموفق بود. این استراتژی رد می‌شود."
                    rm -rf "/tmp/agg_${STRAT}"
                    continue
                  fi
                fi

                MOVE_PERCENTS=$(jq -c '.move_percents // []' "/tmp/agg_${STRAT}/1.json")
                STOP_LOSS=$(jq '.stop_loss_initial // -2.0' "/tmp/agg_${STRAT}/1.json")
                MAX_MOVE=$(jq '.max_move_percent // (if .move_percents then .move_percents[-1] else null end)' "/tmp/agg_${STRAT}/1.json")

                jq -n \
                  --argjson move_percents "$MOVE_PERCENTS" \
                  --argjson stop_loss "$STOP_LOSS" \
                  --argjson max_move "$MAX_MOVE" \
                  --slurpfile trades "/tmp/agg_${STRAT}/combined_trades.json" \
                  '{trades: $trades[0], metadata: {move_percents: $move_percents, stop_loss_initial: $stop_loss, max_move_percent: $max_move}}' \
                  > "/tmp/agg_${STRAT}/final_package.json"

                echo "4- رمزنگاری فایل یکپارچه جدید (شامل متادیتا)..."
                node -e "
                  const crypto=require('crypto'),fs=require('fs');
                  const pass=process.env.RESULTS_PASSWORD;
                  const data=fs.readFileSync('/tmp/agg_${STRAT}/final_package.json');
                  const key=crypto.scryptSync(pass,'salt',32);
                  const iv=crypto.randomBytes(16);
                  const cipher=crypto.createCipheriv('aes-256-cbc',key,iv);
                  const enc=Buffer.concat([cipher.update(data),cipher.final()]);
                  fs.writeFileSync('/tmp/agg_${STRAT}/final.enc', Buffer.concat([iv,enc]));
                "
                if [ $? -ne 0 ]; then
                  echo "   ❌ خطا در رمزنگاری فایل یکپارچه."
                  continue
                fi
                mkdir -p "/tmp/third_repo/aggregated/${STRAT}"
                cp "/tmp/agg_${STRAT}/final.enc" "/tmp/third_repo/$AGG_FILE"
                echo "   ✅ فایل یکپارچه در مخزن محلی ذخیره شد."

                echo "4.5- ذخیره پرچم شروع پاکسازی..."
                FILES_TO_DELETE_JSON="["
                FIRST=true
                for FOLDER in $FILES; do
                  ENC_PATH="backtest_results/${STRAT}/${FOLDER}/results.enc"
                  if $FIRST; then
                    FILES_TO_DELETE_JSON+="\"$ENC_PATH\""
                    FIRST=false
                  else
                    FILES_TO_DELETE_JSON+=", \"$ENC_PATH\""
                  fi
                done
                FILES_TO_DELETE_JSON+="]"
                echo "{\"status\": \"cleaning\", \"files_to_delete\": $FILES_TO_DELETE_JSON}" > "/tmp/agg_${STRAT}/status.json"
                cp "/tmp/agg_${STRAT}/status.json" "/tmp/third_repo/$STATUS_FILE"

                echo "5- پاک‌سازی results.enc های قدیمی $STRAT ..."
                for FOLDER in $FILES; do
                  ENC_PATH="/tmp/third_repo/backtest_results/${STRAT}/${FOLDER}/results.enc"
                  rm -f "$ENC_PATH" 2>/dev/null && echo "   ✅ حذف موفق $ENC_PATH"
                  rm -rf "/tmp/third_repo/backtest_results/${STRAT}/${FOLDER}" 2>/dev/null
                done

                echo "5.5- به‌روزرسانی پرچم وضعیت به completed..."
                echo '{"status": "completed"}' > "/tmp/agg_${STRAT}/status.json"
                cp "/tmp/agg_${STRAT}/status.json" "/tmp/third_repo/$STATUS_FILE"
                rm -f "/tmp/agg_${STRAT}/status.json"
              fi
              rm -rf "/tmp/agg_${STRAT}"
              echo ""
            done
            echo "✅ یکپارچه‌سازی کامل شد."
          } >> logs/run.log 2>&1
          exit 0

      - name: Commit and push changes back to third repo
        run: |
          cd /tmp/third_repo
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Aggregate results and clean up processed files"
            git pull --rebase
            git push
          fi

      - name: Save logs after job
        if: always()
        run: |
          cd $GITHUB_WORKSPACE
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -f logs/run.log
          if ! git diff --cached --quiet; then
            git commit -m "update logs after aggregate-results (run ${{ github.run_id }})" --allow-empty
            git pull --rebase origin main || true
            git push origin main || true
          else
            echo "هیچ تغییری در لاگ وجود ندارد." >> logs/run.log 2>&1
            git add -f logs/run.log
            git commit -m "final logs (run ${{ github.run_id }})" --allow-empty || true
            git push origin main || true
          fi

  # ============================================================
  # Job 3: آماده‌سازی صف کارها (ساخت all_combinations.json) با اصلاح کش
  # ============================================================
  prepare-dispatch:
    needs: aggregate-results
    runs-on: ubuntu-latest
    outputs:
      total_batches: ${{ steps.queue.outputs.total_batches }}
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          ref: main
      - name: راه‌اندازی پایتون
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: دریافت داده‌های لازم از مخزن سوم
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          mkdir -p logs
          gh api "repos/$THIRD_REPO/contents/aggregated" -q '.[].name' > /tmp/strategies.txt
      - name: ساخت و به‌روزرسانی all_combinations.json (با اسکریپت پایتون اصلاح شده)
        id: queue
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          mkdir -p logs
          {
            python scripts/build_work_queue.py \
              --progress /tmp/dummy \
              --strategies /tmp/strategies.txt \
              --output-dir /tmp/dummy \
              --batch-size 100 2>&1
            EXIT_CODE=$?
            if [ $EXIT_CODE -ne 0 ]; then
              echo "❌ اسکریپت با خطا مواجه شد (کد $EXIT_CODE)"
              exit $EXIT_CODE
            fi
          } >> logs/run.log 2>&1

          echo "🔄 دریافت all_combinations.json با retry..." | tee -a logs/run.log
          for attempt in 1 2 3 4 5; do
            TIMESTAMP=$(date +%s%N)
            ALL_COMBOS_CONTENT=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/$THIRD_REPO/contents/all_combinations.json?t=$TIMESTAMP" \
              -H "Accept: application/vnd.github.v3.raw" 2>/dev/null)
            if [ -n "$ALL_COMBOS_CONTENT" ] && [ "$ALL_COMBOS_CONTENT" != "null" ]; then
              TOTAL_COMBOS=$(echo "$ALL_COMBOS_CONTENT" | jq 'length')
              TOTAL_BATCHES=$(( (TOTAL_COMBOS + 99) / 100 ))
              echo "total_batches=$TOTAL_BATCHES" >> $GITHUB_OUTPUT
              echo "✅ تعداد بسته‌ها: $TOTAL_BATCHES" | tee -a logs/run.log
              break
            fi
            echo "⏳ تلاش $attempt: فایل در دسترس نیست، 3 ثانیه صبر..." | tee -a logs/run.log
            sleep 3
          done
          if [ -z "$TOTAL_BATCHES" ]; then
            echo "❌ تعداد بسته‌ها صفر در نظر گرفته می‌شود." | tee -a logs/run.log
            echo "total_batches=0" >> $GITHUB_OUTPUT
          fi

      - name: Save logs after job
        if: always()
        run: |
          cd $GITHUB_WORKSPACE
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -f logs/run.log
          git commit -m "update logs after prepare-dispatch (run ${{ github.run_id }})" || echo "No changes"
          git push origin main || true

  # ============================================================
  # Job 4: اجرای fixed jobs (توزیع بسته‌ها) با retry
  # ============================================================
  dispatch-fixed:
    needs: prepare-dispatch
    if: needs.prepare-dispatch.outputs.total_batches != '0'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          ref: main
      - name: فراخوانی analysis.yml (با retry)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p logs
          {
            echo "🔄 فراخوانی analysis.yml (حالت fixed_batch)..."
            for attempt in 1 2 3; do
              # حذف پارامترهای اضافی - فقط analysis_module ارسال می‌شود
              if gh workflow run analysis.yml --ref main \
                -f analysis_module="fixed_batch" 2>&1; then
                echo "✅ فراخوانی analysis.yml موفق بود (تلاش $attempt)."
                break
              else
                echo "⚠️ تلاش $attempt ناموفق بود. 5 ثانیه صبر می‌کنم..."
                sleep 5
              fi
            done
          } >> logs/run.log 2>&1
      - name: Save logs after job
        if: always()
        run: |
          cd $GITHUB_WORKSPACE
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -f logs/run.log
          git commit -m "update logs after dispatch-fixed (run ${{ github.run_id }})" || echo "No changes"
          git push origin main || true

  # ============================================================
  # Job 5: اجرای golden (پس از اتمام کارهای ثابت)
  # ============================================================
  dispatch-golden:
    needs: dispatch-fixed
    if: always() && needs.prepare-dispatch.outputs.total_batches == '0'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          ref: main

      - name: بررسی پرچم وقفه و وضعیت قبلی golden
        id: status_check
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          mkdir -p logs
          {
            echo "🔍 بررسی پرچم وقفه..."
            if gh api "repos/$THIRD_REPO/contents/interrupt.flag" -i 2>/dev/null | head -n1 | grep -q 200; then
              echo "⚠️ پرچم وقفه فعال است. golden اجرا نخواهد شد."
              echo "should_run=false" >> $GITHUB_OUTPUT
              exit 0
            fi

            echo "🔍 بررسی golden_status.json (برای ادامه از آخرین نقطه توقف)..."
            HTTP_CODE=$(gh api "repos/$THIRD_REPO/contents/golden_status.json" -i 2>/dev/null | head -n1 | cut -d' ' -f2)
            if [ "$HTTP_CODE" = "200" ]; then
              STATUS_CONTENT=$(gh api "repos/$THIRD_REPO/contents/golden_status.json" --jq '.content' | base64 -d)
              echo "   📄 وضعیت فعلی golden: $STATUS_CONTENT"
            else
              echo "   ℹ️ golden_status.json یافت نشد. اجرای golden از ابتدا آغاز می‌شود."
            fi
            echo "should_run=true" >> $GITHUB_OUTPUT
          } >> logs/run.log 2>&1

      - name: ثبت تعداد استراتژی‌های یکپارچه‌شده پیش از اجرا
        if: steps.status_check.outputs.should_run == 'true'
        id: strat_count
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          mkdir -p logs
          {
            CURRENT_COUNT=$(gh api "repos/$THIRD_REPO/contents/aggregated" -q '.[].name' 2>/dev/null | wc -l)
            echo "count=$CURRENT_COUNT" >> $GITHUB_OUTPUT
            echo "📊 تعداد استراتژی‌های یکپارچه‌شده قبل از اجرای golden: $CURRENT_COUNT"
          } >> logs/run.log 2>&1

      - name: فراخوانی analysis.yml برای golden
        if: steps.status_check.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p logs
          {
            echo "🔄 فراخوانی analysis.yml برای golden..."
            for attempt in 1 2 3; do
              if gh workflow run analysis.yml --ref main \
                -f analysis_module="golden" 2>&1; then
                echo "✅ فراخوانی golden موفق بود (تلاش $attempt)."
                break
              else
                echo "⚠️ تلاش $attempt ناموفق بود. 5 ثانیه صبر می‌کنم..."
                sleep 5
              fi
            done
          } >> logs/run.log 2>&1

      - name: بررسی یکپارچه‌سازی جدید و فعال‌سازی وقفه در صورت نیاز
        if: steps.status_check.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          mkdir -p logs
          {
            NEW_COUNT=$(gh api "repos/$THIRD_REPO/contents/aggregated" -q '.[].name' 2>/dev/null | wc -l)
            OLD_COUNT="${{ steps.strat_count.outputs.count }}"
            echo "📊 تعداد استراتژی‌ها: قبل=$OLD_COUNT بعد=$NEW_COUNT"
            if [ "$NEW_COUNT" -gt "$OLD_COUNT" ]; then
              echo "⚠️ استراتژی جدیدی حین اجرای golden یکپارچه شد. فعال‌سازی پرچم وقفه..."
              echo "interrupt" | base64 -w0 > /tmp/flag.txt
              gh api "repos/$THIRD_REPO/contents/interrupt.flag" -X PUT -F message="interrupt: new strategy aggregated during golden" -F content="@/tmp/flag.txt" -F branch="main" 2>&1 || true
            else
              echo "ℹ️ استراتژی جدیدی یکپارچه نشده. ادامه به‌ترتیب اولویت."
            fi
          } >> logs/run.log 2>&1

      - name: فراخوانی مجدد loop_analysis.yml پس از اتمام golden
        if: steps.status_check.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p logs
          {
            echo "🔁 فراخوانی مجدد loop_analysis.yml..."
            gh workflow run loop_analysis.yml --ref main 2>&1 || echo "⚠️ فراخوانی مجدد loop_analysis.yml ناموفق بود."
          } >> logs/run.log 2>&1

      - name: Save logs after job
        if: always()
        run: |
          cd $GITHUB_WORKSPACE
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -f logs/run.log
          git commit -m "update logs after dispatch-golden (run ${{ github.run_id }})" || echo "No changes"
          git push origin main || true

  # ============================================================
  # Job 6: اجرای portfolios (پس از اتمام golden)
  # ============================================================
  dispatch-portfolios:
    needs: dispatch-golden
    if: always() && needs.prepare-dispatch.outputs.total_batches == '0'
