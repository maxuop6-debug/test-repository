          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p logs
          {
            echo "🔁 فراخوانی مجدد loop_analysis.yml..."
            gh workflow run loop_analysis.yml --ref main 2>&1 || echo "⚠️ فراخوانی مجدد loop_analysis.yml ناموفق بود."
