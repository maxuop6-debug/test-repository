name: Complete Analysis Pipeline

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

concurrency:
  group: analysis-runner
  cancel-in-progress: false

jobs:
  # ================================================================
  # generate-reports: تولید گزارش‌های جامع نسخه ۵ و commit به مخزن سوم
  # ================================================================
  generate-reports:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout مخزن اصلی
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 2. نصب پایتون و کتابخانه‌ها
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: نصب وابستگی‌ها
        run: pip install pandas numpy scipy pyarrow

      - name: 3. Clone مخزن سوم
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          git clone \
            --depth=1 \
            "https://x-access-token:${GH_TOKEN}@github.com/${THIRD_REPO}.git" \
            /tmp/third_repo

      - name: 4. اجرای loader.py
        run: |
          python modules/loader.py \
            --news-dir data/news \
            --results-dir /tmp/third_repo/aggregated \
            --strategies-dir /tmp/third_repo/strategies \
            --output-news /tmp/news.pickle \
            --output-strategies /tmp/strategies.json

      - name: 5. اجرای calculator_stoploss.py
        run: |
          python modules/calculator_stoploss.py \
            --strategies-json /tmp/strategies.json \
            --results-base /tmp/third_repo/aggregated \
            --strategies-dir /tmp/third_repo/strategies \
            --output /tmp/stoploss.json

      - name: 6. اجرای calculators.py returns
        env:
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD }}
        run: |
          python modules/calculators.py returns \
            --strategies-json /tmp/strategies.json \
            --results-base /tmp/third_repo/aggregated \
            --output /tmp/returns.json \
            --password "$RESULTS_PASSWORD"

      - name: 7. اجرای calculators.py risk
        env:
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD }}
        run: |
          python modules/calculators.py risk \
            --strategies-json /tmp/strategies.json \
            --results-base /tmp/third_repo/aggregated \
            --stoploss-cache /tmp/stoploss.json \
            --output /tmp/risk.json \
            --password "$RESULTS_PASSWORD"

      - name: 8. اجرای calculators.py inverse
        env:
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD }}
        run: |
          python modules/calculators.py inverse \
            --strategies-json /tmp/strategies.json \
            --results-base /tmp/third_repo/aggregated \
            --stoploss-cache /tmp/stoploss.json \
            --output /tmp/inverse.json \
            --password "$RESULTS_PASSWORD"

      - name: 9. اجرای calculators.py report
        env:
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD }}
        run: |
          mkdir -p /tmp/reports
          python modules/calculators.py report \
            --returns-cache /tmp/returns.json \
            --strategies-json /tmp/strategies.json \
            --risk-cache /tmp/risk.json \
            --inverse-cache /tmp/inverse.json \
            --results-base /tmp/third_repo/aggregated \
            --news-pickle /tmp/news.pickle \
            --output-dir /tmp/reports \
            --password "$RESULTS_PASSWORD"

      - name: 9.5. فشرده‌سازی و رمزنگاری پوشه reports
        env:
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD }}
        run: |
          tar -czf /tmp/reports.tar.gz -C /tmp reports
          node -e "
            const crypto=require('crypto'),fs=require('fs');
            const pass=process.env.RESULTS_PASSWORD;
            const key=crypto.scryptSync(pass,'salt',32);
            const iv=crypto.randomBytes(16);
            const data=fs.readFileSync('/tmp/reports.tar.gz');
            const cipher=crypto.createCipheriv('aes-256-cbc',key,iv);
            const enc=Buffer.concat([iv,cipher.update(data),cipher.final()]);
            fs.writeFileSync('/tmp/reports.tar.gz.enc',enc);
          "
          rm -rf /tmp/reports /tmp/reports.tar.gz

      - name: 10. Commit و Push گزارش‌ها به مخزن سوم (overwrite)
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          cd /tmp/third_repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          rm -f reports.tar.gz.enc
          cp /tmp/reports.tar.gz.enc reports.tar.gz.enc
          git add -f reports.tar.gz.enc
          RETRY=0; MAX=5
          while [ $RETRY -lt $MAX ]; do
            git pull --rebase origin main \
              && git commit -m "update reports (run ${{ github.run_id }})" --allow-empty \
              && git push origin main && break
            RETRY=$((RETRY+1))
            sleep 2
          done

  # ================================================================
  # correlation-generate-matrix: تولید صف کار برای ماژول correlation
  # ================================================================
  correlation-generate-matrix:
    needs: [generate-reports]
    runs-on: ubuntu-latest
    outputs:
      matrix_items: ${{ steps.gen.outputs.matrix_items }}
      empty: ${{ steps.gen.outputs.empty }}
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: دانلود و استخراج یک‌باره همه archiveهای signature
        id: extract
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD || secrets.DATA_PASSWORD }}
        run: |
          mkdir -p /tmp/all_signatures
          TREE=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$THIRD_REPO/git/trees/main?recursive=1")

          ARCHIVES=$(echo "$TREE" | jq -r '[.tree[] | select(.path | startswith("signature_archives/")) | select(.path | endswith(".tar.gz.enc")) | .path] | unique')
          ARCHIVE_COUNT=$(echo "$ARCHIVES" | jq 'length')
          echo "[DEBUG] تعداد archive های signature: $ARCHIVE_COUNT"

          # دریافت لیست آرشیوهای قبلاً پردازش‌شده از completed_archives.json
          # (فایل جداگانه‌ای که نام آرشیوهای پردازش‌شده را نگه می‌دارد — نه completed_correlation.json)
          COMPLETED_ARCHIVES_RAW=$(curl -s -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/$THIRD_REPO/contents/completed_archives.json" 2>/dev/null || echo "[]")
          echo "$COMPLETED_ARCHIVES_RAW" | jq -e 'type == "array"' >/dev/null 2>&1 || COMPLETED_ARCHIVES_RAW="[]"
          echo "$COMPLETED_ARCHIVES_RAW" > /tmp/completed_archives_list.json

          echo "$ARCHIVES" | jq -r '.[]' | while read -r ARCH_PATH; do
            # بررسی اینکه آیا این آرشیو قبلاً پردازش شده است
            ARCH_BASENAME=$(basename "$ARCH_PATH")
            ALREADY_DONE=$(jq --arg p "$ARCH_PATH" --arg b "$ARCH_BASENAME" \
              'map(select(. == $p or . == $b)) | length' /tmp/completed_archives_list.json 2>/dev/null || echo "0")
            if [ "$ALREADY_DONE" != "0" ] && [ "$ALREADY_DONE" != "" ]; then
              echo "ℹ️ آرشیو قبلاً پردازش شده — رد می‌شود: $ARCH_PATH"
              continue
            fi

            DL_URL=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/$THIRD_REPO/contents/$ARCH_PATH" | jq -r '.download_url')
            [ -z "$DL_URL" ] || [ "$DL_URL" = "null" ] && continue
            ENC_FILE="/tmp/$(basename "$ARCH_PATH")"
            curl -s -L -H "Authorization: token $GH_TOKEN" -o "$ENC_FILE" "$DL_URL"
            [ -s "$ENC_FILE" ] || continue
            node -e "
              const crypto=require('crypto'),fs=require('fs');
              const pass=process.env.RESULTS_PASSWORD;
              const data=fs.readFileSync('$ENC_FILE');
              const key=crypto.scryptSync(pass,'salt',32);
              const iv=data.slice(0,16),enc=data.slice(16);
              const decipher=crypto.createDecipheriv('aes-256-cbc',key,iv);
              const dec=Buffer.concat([decipher.update(enc),decipher.final()]);
              fs.writeFileSync('${ENC_FILE%.enc}',dec);
            " 2>/dev/null && tar -xzf "${ENC_FILE%.enc}" -C /tmp/all_signatures && \
              jq --arg p "$ARCH_PATH" '. + [$p] | unique' /tmp/completed_archives_list.json > /tmp/completed_archives_list.tmp && \
              mv /tmp/completed_archives_list.tmp /tmp/completed_archives_list.json
            rm -f "$ENC_FILE" "${ENC_FILE%.enc}"
          done

          # آپلود completed_archives.json به‌روزرسانی‌شده به مخزن سوم
          if [ -s /tmp/completed_archives_list.json ] && [ "$(jq length /tmp/completed_archives_list.json)" != "0" ]; then
            SHA_CA=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/$THIRD_REPO/contents/completed_archives.json" | jq -r '.sha // empty' 2>/dev/null || echo "")
            base64 -w0 /tmp/completed_archives_list.json > /tmp/completed_archives_b64.txt
            CA_MSG="update completed_archives (run ${{ github.run_id }})"
            CA_CONTENT=$(cat /tmp/completed_archives_b64.txt)
            if [ -n "$SHA_CA" ]; then
              curl -s -X PUT -H "Authorization: token $GH_TOKEN" -H "Content-Type: application/json" \
                -d "{\"message\":\"$CA_MSG\",\"content\":\"$CA_CONTENT\",\"sha\":\"$SHA_CA\",\"branch\":\"main\"}" \
                "https://api.github.com/repos/$THIRD_REPO/contents/completed_archives.json" >/dev/null
            else
              curl -s -X PUT -H "Authorization: token $GH_TOKEN" -H "Content-Type: application/json" \
                -d "{\"message\":\"$CA_MSG\",\"content\":\"$CA_CONTENT\",\"branch\":\"main\"}" \
                "https://api.github.com/repos/$THIRD_REPO/contents/completed_archives.json" >/dev/null
            fi
            rm -f /tmp/completed_archives_b64.txt
          fi

          JSONL_TOTAL=$(find /tmp/all_signatures -name '*.jsonl' | wc -l)
          echo "✅ تعداد $JSONL_TOTAL فایل JSONL استخراج‌شده از $ARCHIVE_COUNT archive."
          echo "jsonl_total=$JSONL_TOTAL" >> $GITHUB_OUTPUT

      - name: آپلود یک artifact مشترک با تمام signatureهای استخراج‌شده
        if: steps.extract.outputs.jsonl_total != '0'
        uses: actions/upload-artifact@v4
        with:
          name: all-signatures-${{ github.run_id }}
          path: /tmp/all_signatures/
          retention-days: 1

      - name: نصب پایتون برای تولید چانک‌های signature-based
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: تولید چانک‌های مبتنی بر signature یکتا و فیلتر با all_combinations_correlation.json
        id: gen
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          mkdir -p /tmp/correlation_chunks

          # دانلود all_combinations_correlation.json (صف واقعی)
          # FIX: مدیریت ۴۰۴ — در صورت نبود فایل، empty=true تنظیم می‌شود
          HTTP_CODE=$(curl -s -o /tmp/all_combinations_correlation.json -w "%{http_code}" \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/$THIRD_REPO/contents/all_combinations_correlation.json")
          if [ "$HTTP_CODE" != "200" ] || [ ! -s /tmp/all_combinations_correlation.json ] || ! jq empty /tmp/all_combinations_correlation.json 2>/dev/null; then
            echo "ℹ️ فایل all_combinations_correlation.json یافت نشد یا نامعتبر است (کد $HTTP_CODE) — empty=true، ادامه بدون پردازش"
            echo "empty=true" >> $GITHUB_OUTPUT
            echo "matrix_items=[]" >> $GITHUB_OUTPUT
            exit 0
          fi

          QUEUE_COUNT=$(jq length /tmp/all_combinations_correlation.json)
          echo "[DEBUG] تعداد آیتم‌های صف: $QUEUE_COUNT"
          if [ "$QUEUE_COUNT" -eq 0 ]; then
            echo "empty=true" >> $GITHUB_OUTPUT
            echo "matrix_items=[]" >> $GITHUB_OUTPUT
            exit 0
          fi

          # اجرای اسکریپت جداگانه تولید چانک‌ها
          python modules/generate_correlation_chunks.py \
            --signatures-dir /tmp/all_signatures \
            --queue-file /tmp/all_combinations_correlation.json \
            --output-dir /tmp/correlation_chunks

          if [ -f /tmp/correlation_chunks/empty.flag ]; then
            echo "empty=true" >> $GITHUB_OUTPUT
            echo "matrix_items=[]" >> $GITHUB_OUTPUT
            exit 0
          fi

          NUM_CHUNKS=$(cat /tmp/correlation_chunks/num_chunks.txt)
          INDICES="["
          for ((i=0; i<NUM_CHUNKS; i++)); do
            [ $i -gt 0 ] && INDICES+=", "
            INDICES+="$i"
          done
          INDICES+="]"
          echo "[DEBUG] INDICES=$INDICES"
          echo "matrix_items=$INDICES" >> $GITHUB_OUTPUT
          echo "empty=false" >> $GITHUB_OUTPUT

      - name: آپلود چانک‌های correlation
        if: steps.gen.outputs.empty == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: correlation-chunks-${{ github.run_id }}
          path: /tmp/correlation_chunks/
          retention-days: 1

  # ================================================================
  # correlation-batch: پردازش موازی چانک‌های correlation
  # ================================================================
  correlation-batch:
    needs: [generate-reports, correlation-generate-matrix]
    runs-on: ubuntu-latest
    timeout-minutes: 340
    if: ${{ needs.correlation-generate-matrix.outputs.empty == 'false' }}
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        chunk_index: ${{ fromJson(needs.correlation-generate-matrix.outputs.matrix_items || '[0]') }}
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: دانلود چانک‌های correlation
        uses: actions/download-artifact@v4
        with:
          name: correlation-chunks-${{ github.run_id }}
          path: /tmp/correlation_chunks

      - name: بررسی Cache این chunk
        id: cache_check
        uses: actions/cache@v4
        with:
          path: /tmp/correlation_chunk_cache
          key: correlation-chunk-result-${{ matrix.chunk_index }}-${{ github.run_id }}

      - name: بارگذاری نتایج از Cache در صورت وجود
        id: prev_check
        run: |
          mkdir -p /tmp/correlation_chunk_cache
          if [ "${{ steps.cache_check.outputs.cache-hit }}" = "true" ] && \
             [ -f /tmp/correlation_chunk_cache/done_items.json ] && \
             [ -f /tmp/correlation_chunk_cache/chunk_completed.flag ]; then
            echo "⏭️ chunk ${{ matrix.chunk_index }} قبلاً کامل شده. بارگذاری نتایج از Cache..."
            cp /tmp/correlation_chunk_cache/done_items.json /tmp/done_items.json
            echo "already_done=true" >> $GITHUB_OUTPUT
          else
            echo "already_done=false" >> $GITHUB_OUTPUT
          fi

      - name: 1. بررسی interrupt.flag
        if: steps.prev_check.outputs.already_done != 'true'
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$THIRD_REPO/contents/interrupt.flag")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "🛑 interrupt.flag یافت شد — job خاتمه می‌یابد."
            exit 0
          fi

      - name: 2. راه‌اندازی پایتون و نصب کتابخانه‌ها
        if: steps.prev_check.outputs.already_done != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install pandas numpy scipy pyarrow
        if: steps.prev_check.outputs.already_done != 'true'

      - name: دانلود artifact مشترک تمام signatureهای استخراج‌شده (بدون تماس API)
        if: steps.prev_check.outputs.already_done != 'true'
        uses: actions/download-artifact@v4
        with:
          name: all-signatures-${{ github.run_id }}
          path: /tmp/all_signatures

      # FIX: استفاده از --signatures-filter برای فیلتر کردن (به‌جای کپی انتخابی)
      - name: 3. آماده‌سازی signatures برای این چانک
        if: steps.prev_check.outputs.already_done != 'true'
        run: |
          # همه JSONL‌ها در دسترس هستند — correlation.py با --signatures-filter فیلتر می‌کند
          mkdir -p /tmp/signatures
          cp -r /tmp/all_signatures/. /tmp/signatures/
          echo "✅ همه signatureها کپی شدند (فیلتر توسط --signatures-filter انجام می‌شود)"

      - name: 5. اجرای correlation.py برای این چانک
        if: steps.prev_check.outputs.already_done != 'true'
        run: |
          mkdir -p /tmp/correlation_chunk_cache
          python modules/correlation.py \
            --signatures-dir /tmp/signatures \
            --news-dir data/news \
            --output-dir /tmp/correlation_chunk_cache \
            --interrupt-flag ${{ runner.temp }}/interrupt.flag \
            --signatures-filter /tmp/correlation_chunks/chunk_${{ matrix.chunk_index }}.json \
            --resume
          echo "✅ correlation chunk ${{ matrix.chunk_index }} پردازش شد."

      - name: 5.2. رمزنگاری و ذخیره correlations.parquet به‌عنوان artifact
        if: steps.prev_check.outputs.already_done != 'true'
        env:
          RESULTS_PASSWORD: ${{ secrets.RESULTS_PASSWORD || secrets.DATA_PASSWORD }}
        run: |
          PARQUET_FILE=$(find /tmp/correlation_chunk_cache -name 'correlations.parquet' 2>/dev/null | head -1)
          if [ -z "$PARQUET_FILE" ] || [ ! -s "$PARQUET_FILE" ]; then
            echo "ℹ️ فایل correlations.parquet یافت نشد — رد می‌شود."
            exit 0
          fi

          mkdir -p /tmp/corr_output
          cp "$PARQUET_FILE" /tmp/correlations.parquet
          tar -czf /tmp/correlations.tar.gz -C /tmp correlations.parquet
          node -e "
            const crypto=require('crypto'),fs=require('fs');
            const pass=process.env.RESULTS_PASSWORD;
            const key=crypto.scryptSync(pass,'salt',32);
            const iv=crypto.randomBytes(16);
            const data=fs.readFileSync('/tmp/correlations.tar.gz');
            const cipher=crypto.createCipheriv('aes-256-cbc',key,iv);
            const enc=Buffer.concat([iv,cipher.update(data),cipher.final()]);
            fs.writeFileSync('/tmp/corr_output/correlations.tar.gz.enc',enc);
          "
          echo "✅ correlations.parquet رمزنگاری شد — آماده آپلود به‌عنوان artifact."
          rm -f /tmp/correlations.parquet /tmp/correlations.tar.gz

      - name: 5.3. آپلود correlations رمزنگاری‌شده به‌عنوان artifact
        if: steps.prev_check.outputs.already_done != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: corr-parquet-${{ matrix.chunk_index }}-${{ github.run_id }}
          path: /tmp/corr_output/correlations.tar.gz.enc
          retention-days: 1
          if-no-files-found: warn

      # FIX: استفاده از unique_by با کلید ترکیبی (coin_composition, signature)
      - name: 5.5. ذخیره done_items این chunk در Cache
        if: always()
        run: |
          mkdir -p /tmp/correlation_chunk_cache

          if [ -f /tmp/correlation_chunk_cache/correlation_status.json ]; then
            jq -c '.processed_signatures // []' /tmp/correlation_chunk_cache/correlation_status.json > /tmp/done_items_from_status.json 2>/dev/null || echo "[]" > /tmp/done_items_from_status.json
          else
            echo "[]" > /tmp/done_items_from_status.json
          fi

          CHUNK_SIGS=$(cat /tmp/correlation_chunks/chunk_${{ matrix.chunk_index }}.json)

          # unique بر اساس ترکیب coin_composition+signature (نه object equality)
          jq -n --slurpfile arr1 /tmp/done_items_from_status.json --argjson arr2 "$CHUNK_SIGS" \
            '$arr1[0] + $arr2 | unique_by(.coin_composition + "|||" + .signature)' \
            > /tmp/done_items_unique.json
          mv /tmp/done_items_unique.json /tmp/done_items.json
          cp /tmp/done_items.json /tmp/correlation_chunk_cache/done_items.json
          touch /tmp/correlation_chunk_cache/chunk_completed.flag

          echo "✅ done_items برای chunk ${{ matrix.chunk_index }} ذخیره شد."

      - name: 6. ذخیره نتایج در Cache
        if: always()
        uses: actions/cache@v4
        with:
          path: /tmp/correlation_chunk_cache
          key: correlation-chunk-result-${{ matrix.chunk_index }}-${{ github.run_id }}

      - name: 6.5. آپلود done_items این چانک به‌عنوان artifact مجزا
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: done-items-${{ matrix.chunk_index }}-${{ github.run_id }}
          path: /tmp/correlation_chunk_cache/done_items.json
          retention-days: 1
          if-no-files-found: warn

  # ================================================================
  # correlation-cleanup: ادغام نتایج correlation و حذف از صف
  # ================================================================
  correlation-cleanup:
    needs: [correlation-generate-matrix, correlation-batch]
    runs-on: ubuntu-latest
    if: ${{ always() && needs.correlation-batch.result != 'skipped' }}
    steps:
      - name: دانلود artifact های done_items همه‌ی چانک‌ها
        uses: actions/download-artifact@v4
        with:
          pattern: done-items-*-${{ github.run_id }}
          path: /tmp/done_artifacts_raw
          merge-multiple: false

      - name: ادغام لیست‌های done و حذف از all_combinations_correlation.json
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          CURL="/usr/bin/curl"
          find /tmp/done_artifacts_raw -name 'done_items.json' -print0 2>/dev/null \
            | while IFS= read -r -d '' f; do
                jq empty "$f" 2>/dev/null && cat "$f" || echo "[]"
              done \
            | jq -s 'add // [] | unique_by(.coin_composition + "|||" + .signature)' \
            > /tmp/merged_done.json 2>/dev/null || echo "[]" > /tmp/merged_done.json
          [ -s /tmp/merged_done.json ] || echo "[]" > /tmp/merged_done.json

          MERGED_COUNT=$(jq length /tmp/merged_done.json)
          echo "[DEBUG] تعداد کل signatureهای موفق این run: $MERGED_COUNT"

          if [ "$MERGED_COUNT" -eq 0 ]; then
            echo "ℹ️ هیچ signature موفقی برای حذف وجود ندارد."
            ALL_COMBO_COUNT=$(curl -s -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3.raw" \
              "https://api.github.com/repos/$THIRD_REPO/contents/all_combinations_correlation.json" 2>/dev/null \
              | jq 'length' 2>/dev/null || echo "-1")
            if [ "$ALL_COMBO_COUNT" = "0" ]; then
              echo "✅ all_combinations_correlation.json خالی است. به‌روزرسانی completed_correlation.json..."
              echo '["completed"]' > /tmp/completed_correlation.json
              SHA_COMP=$(gh api "repos/$THIRD_REPO/contents/completed_correlation.json" -q '.sha' 2>/dev/null || echo "")
              base64 -w0 /tmp/completed_correlation.json > /tmp/completed_base64.txt
              cat > /tmp/payload_completed.json <<EOF
          {
            "message": "correlation completed (empty queue)",
            "content": "$(cat /tmp/completed_base64.txt)",
            "branch": "main"
          }
          EOF
              if [ -n "$SHA_COMP" ]; then
                jq --arg sha "$SHA_COMP" '. + {sha: $sha}' /tmp/payload_completed.json > /tmp/payload_completed_with_sha.json
                mv /tmp/payload_completed_with_sha.json /tmp/payload_completed.json
              fi
              $CURL -s -X PUT -H "Authorization: token $GH_TOKEN" \
                -H "Content-Type: application/json" \
                --data-binary @/tmp/payload_completed.json \
                "https://api.github.com/repos/$THIRD_REPO/contents/completed_correlation.json" >/dev/null
              rm -f /tmp/completed_*.json /tmp/completed_base64.txt /tmp/payload_completed.json
            fi
          else
            # تبدیل done_items به set کلیدهای (coin_composition|||signature)
            jq '[.[] | .coin_composition + "|||" + .signature] | unique' \
              /tmp/merged_done.json > /tmp/done_keys.json

            RETRY=0; MAX=10000
            while [ $RETRY -lt $MAX ]; do
              SHA=$(gh api "repos/$THIRD_REPO/contents/all_combinations_correlation.json" -q '.sha' 2>/dev/null || echo "")
              if [ -z "$SHA" ]; then
                echo "ERROR: SHA نامعتبر — پاسخ gh api: $(gh api "repos/$THIRD_REPO/contents/all_combinations_correlation.json" 2>&1 | head -c 300)"
                RETRY=$((RETRY+1)); sleep $(( (RANDOM % 4) + 2 )); continue
              fi

              $CURL -s -o /tmp/current.json \
                -H "Authorization: token $GH_TOKEN" \
                -H "Accept: application/vnd.github.v3.raw" \
                "https://api.github.com/repos/$THIRD_REPO/contents/all_combinations_correlation.json" 2>/dev/null
              if [ ! -s /tmp/current.json ] || ! jq empty /tmp/current.json 2>/dev/null; then
                echo "ERROR: دریافت محتوای فایل ناموفق — تلاش مجدد..."
                RETRY=$((RETRY+1)); sleep $(( (RANDOM % 5) + 3 )); continue
              fi

              jq -s '
                .[0] as $c | .[1] as $done_keys |
                ($done_keys | unique) as $dk |
                $c | map(
                  if type == "object" then
                    if .coin_composition and .signature then
                      (.coin_composition + "|||" + .signature) as $k | select(($dk | index($k)) == null)
                    else
                      (.signature_path // "") as $sp |
                      ($sp | split("/")) as $parts |
                      (if ($parts | length) >= 3 then
                        (($parts[-1] | sub("\\.jsonl$"; "")) + "|||" + $parts[-2])
                      else $sp + "|||" + $sp end) as $k |
                      select(($dk | index($k)) == null)
                    end
                  else
                    .
                  end
                )
              ' /tmp/current.json /tmp/done_keys.json > /tmp/new_content.json

              BEFORE=$(jq length /tmp/current.json)
              AFTER=$(jq length /tmp/new_content.json)
              echo "[DEBUG] قبل: $BEFORE  بعد: $AFTER  (حذف‌شده: $((BEFORE-AFTER)))"

              base64 -w0 /tmp/new_content.json > /tmp/new_content_base64.txt
              cat > /tmp/payload.json <<EOF
          {
            "message": "remove $((BEFORE-AFTER)) processed signatures (run ${{ github.run_id }})",
            "content": "$(cat /tmp/new_content_base64.txt)",
            "sha": "$SHA",
            "branch": "main"
          }
          EOF
              HTTP_CODE=$($CURL -s -X PUT -o /tmp/upload_response.txt -w "%{http_code}" \
                -H "Authorization: token $GH_TOKEN" \
                -H "Content-Type: application/json" \
                --data-binary @/tmp/payload.json \
                "https://api.github.com/repos/$THIRD_REPO/contents/all_combinations_correlation.json")

              if [ "$HTTP_CODE" -eq 200 ] || [ "$HTTP_CODE" -eq 201 ]; then
                echo "✅ $((BEFORE-AFTER)) signature با موفقیت حذف شدند."
                break
              elif [ "$HTTP_CODE" -eq 409 ] || [ "$HTTP_CODE" -eq 422 ]; then
                echo "⚠️ تداخل SHA (کد $HTTP_CODE) — تلاش مجدد..."
                RETRY=$((RETRY+1)); sleep $(( (RANDOM % 5) + 2 )); continue
              else
                echo "ERROR: آپلود ناموفق ($HTTP_CODE)"; cat /tmp/upload_response.txt; exit 1
              fi
            done
            [ $RETRY -ge $MAX ] && { echo "ERROR: پس از $MAX تلاش ناموفق."; exit 1; }

            if [ "$AFTER" -eq 0 ]; then
              echo "✅ all_combinations_correlation.json خالی شد. به‌روزرسانی completed_correlation.json..."
              echo '["completed"]' > /tmp/completed_correlation.json
              SHA_COMP=$(gh api "repos/$THIRD_REPO/contents/completed_correlation.json" -q '.sha' 2>/dev/null || echo "")
              base64 -w0 /tmp/completed_correlation.json > /tmp/completed_base64.txt
              cat > /tmp/payload_completed.json <<EOF
          {
            "message": "correlation completed",
            "content": "$(cat /tmp/completed_base64.txt)",
            "branch": "main"
          }
          EOF
              if [ -n "$SHA_COMP" ]; then
                jq --arg sha "$SHA_COMP" '. + {sha: $sha}' /tmp/payload_completed.json > /tmp/payload_completed_with_sha.json
                mv /tmp/payload_completed_with_sha.json /tmp/payload_completed.json
              fi
              $CURL -s -X PUT -H "Authorization: token $GH_TOKEN" \
                -H "Content-Type: application/json" \
                --data-binary @/tmp/payload_completed.json \
                "https://api.github.com/repos/$THIRD_REPO/contents/completed_correlation.json" >/dev/null
            fi

            rm -f /tmp/current.json /tmp/new_content.json /tmp/new_content_base64.txt /tmp/payload.json /tmp/upload_response.txt /tmp/completed_*.json /tmp/completed_base64.txt /tmp/payload_completed.json
          fi

      - name: دانلود artifact های correlations.parquet رمزنگاری‌شده
        uses: actions/download-artifact@v4
        with:
          pattern: corr-parquet-*-${{ github.run_id }}
          path: /tmp/corr_artifacts
          merge-multiple: false
        continue-on-error: true

      - name: آپلود نهایی correlations.parquet.enc به مخزن سوم
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          THIRD_REPO: ${{ secrets.THIRD_REPO }}
        run: |
          ENC_FILE=$(find /tmp/corr_artifacts -name 'correlations.tar.gz.enc' 2>/dev/null | tail -1)
          if [ -z "$ENC_FILE" ] || [ ! -s "$ENC_FILE" ]; then
            echo "ℹ️ هیچ correlations.tar.gz.enc برای آپلود یافت نشد — رد می‌شود."
            exit 0
          fi
          DEST="analysis_results/correlations.parquet.enc"
          SHA_DEST=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$THIRD_REPO/contents/$DEST" | jq -r '.sha // empty' 2>/dev/null || echo "")
          base64 -w0 "$ENC_FILE" > /tmp/corr_b64.txt
          CORR_CONTENT=$(cat /tmp/corr_b64.txt)
          CORR_MSG="update correlations.parquet (run ${{ github.run_id }})"
          if [ -n "$SHA_DEST" ]; then
            curl -s -X PUT -H "Authorization: token $GH_TOKEN" -H "Content-Type: application/json" \
              -d "{\"message\":\"$CORR_MSG\",\"content\":\"$CORR_CONTENT\",\"sha\":\"$SHA_DEST\",\"branch\":\"main\"}" \
              "https://api.github.com/repos/$THIRD_REPO/contents/$DEST" >/dev/null \
              && echo "✅ correlations.parquet.enc آپلود شد." || echo "⚠️ آپلود ناموفق."
          else
            curl -s -X PUT -H "Authorization: token $GH_TOKEN" -H "Content-Type: application/json" \
              -d "{\"message\":\"$CORR_MSG\",\"content\":\"$CORR_CONTENT\",\"branch\":\"main\"}" \
              "https://api.github.com/repos/$THIRD_REPO/contents/$DEST" >/dev/null \
              && echo "✅ correlations.parquet.enc آپلود شد." || echo "⚠️ آپلود ناموفق."
          fi
          rm -f /tmp/corr_b64.txt

      - name: فراخوانی مجدد loop_analysis.yml
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/actions/workflows/loop_analysis.yml/dispatches \
            -X POST -f ref="main"
