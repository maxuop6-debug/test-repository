name: Loop Backup

on:
  workflow_dispatch:

concurrency:
  group: backup-loop
  cancel-in-progress: false

jobs:
  loop:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Wait before re-triggering
        run: |
          echo "⏳ انتظار ۳۰ ثانیه قبل از فراخوانی مجدد..."
          sleep 30

      - name: Trigger backup_pipeline
        env:
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 - <<'PYEOF'
          import os, requests

          token   = os.environ["GITHUB_TOKEN"]
          repo    = os.environ["GITHUB_REPOSITORY"]
          url     = f"https://api.github.com/repos/{repo}/actions/workflows/backup_pipeline.yml/dispatches"
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept":        "application/vnd.github+json",
          }
          resp = requests.post(url, json={"ref": "main"}, headers=headers, timeout=30)
          if resp.status_code in (200, 204):
              print("✅ backup_pipeline فراخوانی شد")
          else:
              print(f"❌ خطا: {resp.status_code} – {resp.text}")
              exit(1)
          PYEOF
