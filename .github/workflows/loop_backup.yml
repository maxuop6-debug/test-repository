name: Loop Backup

on:
  workflow_dispatch:

concurrency:
  group: backup-loop
  cancel-in-progress: false

jobs:
  loop:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --upgrade pip requests

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Wait then trigger backup_pipeline
        env:
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          sleep 30
          python backup_system.py trigger-loop --workflow backup_pipeline.yml
