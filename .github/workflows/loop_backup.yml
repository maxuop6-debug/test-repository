name: Loop Backup

on:
  workflow_dispatch:

concurrency:
  group: telegram-loop
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --upgrade pip requests

      # فقط backup_pipeline رو صدا میزنه و تمام
      - name: Trigger backup_pipeline
        env:
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python backup_system.py trigger-loop --workflow backup_pipeline.yml
